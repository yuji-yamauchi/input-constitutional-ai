      これがSoEの国際展開（特にUKパイロット）の根拠となる。
      Susan Scott-ParkerがSoEに注目した背景として重要。

  C4_phr_commons_timeline:
    location: "Section 10 Research Design"
    issue: "PHR Commons→SoEの思想的連続性が研究デザインセクションにのみ記載"
    suggestion: >
      Section 1（冒頭）またはSection 2（哲学基盤）に
      15年の思想的連続性の概要を配置すべき。
      SoEが「突然現れた概念」ではなく「15年の蓄積の結晶」であることを
      ドキュメント冒頭で明確にする。

