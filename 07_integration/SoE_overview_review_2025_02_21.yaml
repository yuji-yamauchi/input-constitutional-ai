overall_assessment:
  quality: "高品質。15以上のソースファイルから主要概念を的確に統合している"
  strengths:
    - "会計メタファーの体系的説明が非常に明確"
    - "Input CAI vs Output CAIの対比が正確"
    - "理論アーキテクチャマップが全体像を把握しやすい"
    - "用語集が包括的"
  overall_note: >
    VSClaude君が作成した総論は「2025年10月時点」の理論を正確に反映している。
    しかし、11月以降のセッション（特にSusan面談前後、粒度工学の発展）で
    生まれた重要な理論発展が反映されていない。以下に分類して指摘する。

# =====================================================
# カテゴリA: 重大な欠落（追記必須）
# =====================================================
category_A_critical_additions:

  A1_grain_engineering:
    location_in_doc: "Section 5（Implementation Framework）に新セクション追加"
    severity: "★★★ 最重要"
    what_is_missing: >
      粒度工学（Grain Engineering）が完全に欠落している。
      2025年11月のセッション群（2025_11_17_g1.yaml）で確立された概念であり、
      SoEの「技術コア」として位置づけられている。
    should_add:
      grain_engineering_overview:
        definition: "支援のどの粒度で観察・介入するかを設計する技術"
        design_goal: "LLM＝顕微鏡ではなく、当事者×支援者の共通眼鏡として機能させる"
        three_layer_model:
          tier_1_macro: "一般支援者のナイス層（30%）が扱える標準粒度"
          tier_2_meso: "SoE上級者が扱える中粒度（前兆検出、バイアス解析）"
          tier_3_micro: "専門家（Puu固有）の顕微鏡帯（分布的表象、微分カーブ）"
      record_exposure_model:
        principle: "支援者を評価する必要はない。記録の粒度が支援の質を自然に露光する"
        mechanism: "対話ログの粒度・選択肢の数・当事者の語りの扱い方が自動的に可視化される"
      connection_to_existing_content:
        - "Section 5.3 Co-LLM Sessionの前提技術として位置づけ"
        - "Section 5.4 NOCCの測定粒度との接続"
        - "Theoretical Architecture Mapに追加"

  A2_thirty_percent_strategy:
    location_in_doc: "Section 5.2の後に新サブセクション追加"
    severity: "★★★ 最重要"
    what_is_missing: >
      30%戦略（ナイス層戦略）が欠落。SoEの社会実装戦略の根幹であり、
      「誰でも使える支援法」という発想を根本的に否定する重要概念。
    should_add:
      core_principle: "技術はナイスな人に教えられるが、ナイスさは技術ある人には教えられない"
      target: "支援者全体の上位30%（高い共感性・倫理性・対話耐性）"
      implementation:
        - "SoEを『標準技術』とせず『選抜技術』として扱う"
        - "研修は上位3割に限定"
        - "記録は全員共有だが、粒度操作は3割が担当"
      expected_effect: "コミュニティ全体の非線形的質の向上"

  A3_forced_labour_framework:
    location_in_doc: "Section 3に新サブセクション 3.5 追加"
    severity: "★★★ 最重要"
    what_is_missing: >
      強制労働フレームワーク（三層理論統合）が完全に欠落している。
      2025年11月のSusan面談準備セッション（2025_11_25_s.yaml, s2.yaml）で
      確立された、SoEの国際展開における最も強力な理論的武器。
    should_add:
      three_layer_integration:
        layer_1_international_law:
          framework: "ILO Convention 29 + CRPD Article 27"
          explains: "『何が』強制労働か（定義）"
        layer_2_neuroscience:
          framework: "Polyvagal Theory (Stephen Porges)"
          explains: "『どう』神経系が反応するか（メカニズム）"
          measurement: "HRV（心拍変動）で客観測定可能"
        layer_3_psychotherapy:
          framework: "Schema Therapy (Jeffrey Young)"
          explains: "『なぜ』パターンが固定化するか（形成・維持）"
          measurement: "YSQ（Young Schema Questionnaire）"
      three_behavioral_types:
        type_1_submission: "従順型 - 古典的被害者像、検出しやすい"
        type_2_aggression: "攻撃型 - 加害者に見える被害者（K.K.事例）"
        type_3_ingratiation: "取り入り型 - 自発的に見える心理的束縛（特に女性）"
      synergy: >
        自尊感情10-20%ileでの「就労選択」は、
        Schema-driven behavior = 自律神経的生存反応 = 自由意思による選択ではない = 強制労働

  A4_constitutional_space:
    location_in_doc: "Section 2.3（SoE Three Stages）の拡張として"
    severity: "★★☆ 重要"
    what_is_missing: >
      Constitutional Space（憲法的空間）概念。
      SoE Three Stagesの介入環境として、三層理論統合の実装形態。
    should_add:
      definition: "ILO権利保護環境 × ポリヴェーガル的神経安全信号 × スキーマ療法的限定的再養育"
      evidence: "Y.Y.事例：3ヶ月で自尊感情改善→スキーマ修正→神経安全回復→ITスキル獲得"
      connection: "SoE Three Stagesの Stage 2（自己認知）を可能にする環境設計"

  A5_decimal_accumulation_theory:
    location_in_doc: "Section 2.5（Fire Culture）の後に新サブセクション追加"
    severity: "★★☆ 重要"
    what_is_missing: >
      小数点蓄積理論（Decimal Accumulation Theory）。
      2025年11月14日に発見された、Researcher Yの15年間の実践を説明する統一理論。
    should_add:
      core_concept: "0→1を一気に作るのではなく、+0.05 +0.1 +0.3...の欠片を集めて1.0にする"
      principles:
        - "失敗は資産（失敗 ≠ -1.0、失敗 = +0.05の学び）"
        - "すべてが使える（一見マイナスも+0.0Xの価値に変換可能）"
        - "不完全でも進む（60%で動き始め、動きながら残り40%を集める）"
        - "文脈が価値を決める（同じ0.05でも配置次第で0.2になる）"
      connection_to_soe: "SoEシステム自体が15年の小数点蓄積の結晶"

  A6_grain_based_cognition:
    location_in_doc: "Section 2に新サブセクション 2.7 追加"
    severity: "★★☆ 重要"
    what_is_missing: >
      Grain-Based Cognition（粒度型思考）とDistributed Representation（分布的表象）。
      SoEの認知科学的基盤として、2025年11月に体系化された概念。
    should_add:
      grain_based_cognition:
        definition: "経験・問題を『粒』として切り取り、配置・連結関係から構造を再構築する認知スタイル"
      distributed_representation:
        definition: "断片が単独で意味を持つのではなく、ネットワーク配置の中で意味を形成するモデル"
      soe_connection: "当事者の自尊・識字・意思決定を分布的に扱い、支援構造を再構成する理論基盤"

# =====================================================
# カテゴリB: 修正・精密化が必要な箇所
# =====================================================
category_B_corrections_and_refinements:

  B1_researcher_y_description:
    location: "Section 1, line 18"
    current: "'over 10 years of experience'"
    issue: "15年以上の理論的連続性があることが明記されていない"
    should_be: >
      "over 10 years of direct practice experience in disability employment support,
      building on 15 years of theoretical continuity beginning with PHR Commons (2011)"
    note: "Section 10でPHR時系列には触れているが、冒頭での文脈設定が不十分"

  B2_soe_ethical_equation:
    location: "Section 1, The Ethical Equation"
    issue: "Exploitation indicators に強制労働関連指標が含まれていない"
    should_add_to_exploitation_indicators:
      - "schema-driven 'choice' at low self-esteem"
      - "autonomic survival responses misidentified as voluntary decisions"
      - "psychological bondage masked as compliance"

  B3_lllm_role_definition:
    location: "Section 5.3 Co-LLM Session Protocol"
    issue: "LLMの役割が『バッファ・翻訳者』として描かれているが、粒度工学での役割が未記載"
    should_add:
      lllm_is_not: "顕微鏡（専門家の代替）"
      lllm_is:
        - "粒度の露光装置（developer）"
        - "ナイス3割の眼鏡"
        - "粒度変換器（Tier 3 → Tier 1への変換）"
        - "記録の構造可視化ツール"

  B4_sroi_hypothesis:
    location: "Section 9"
    issue: "仮説値29.4:1は維持でよいが、三層理論統合による正当化根拠が追加されるべき"
    should_add: >
      特にAnomie prevention（15.0）の正当化に、
      ILO強制労働×ポリヴェーガル×スキーマ療法の三層エビデンスを接続。
      「無敵の人因子」が実は強制労働脆弱性4要素と完全一致する点を明記。

  B5_nocc_assessment:
    location: "Section 5.4"
    issue: "NOCCテーブルにYSQ（Young Schema Questionnaire）とHRV（心拍変動）が未記載"
    should_add:
      ysq:
        account: "Early Maladaptive Schemas"
        accounting_analogy: "Hidden structural debt（隠れた構造的負債）"
      hrv:
        account: "Autonomic nervous system state"
        accounting_analogy: "Real-time cash flow indicator（リアルタイムCF指標）"

  B6_information_boundary_design:
    location: "Section 5.6"
    issue: "三者間情報境界に加えて、『雇用主への最小限開示原則』の強化が必要"
    should_clarify: >
      雇用主が見るのは「予測される困難とその合理的配慮」のみ。
      この設計がCRPD第12条（法的能力）とどう接続するかを明示。
      特にSchema情報やACE情報が雇用主に渡らないことの法的根拠。

