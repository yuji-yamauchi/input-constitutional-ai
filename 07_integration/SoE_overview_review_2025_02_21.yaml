  C1_theoretical_architecture_map_update:
    location: "Section 11"
    issue: "アーキテクチャマップに11月以降の概念が反映されていない"
    should_add:
      under_philosophical_foundations:
        - "Decimal Accumulation Theory"
        - "Grain-Based Cognition / Distributed Representation"
      under_social_theory:
        - "Three-Layer Forced Labour Framework (ILO × Polyvagal × Schema)"
        - "Constitutional Space"
        - "Three Behavioral Types (Submission / Aggression / Ingratiation)"
      under_implementation:
        - "Grain Engineering (3-tier model)"
        - "30% Strategy (Nice Layer deployment)"
        - "Record Exposure Model"
        - "YSQ + HRV integration into NOCC"

  C2_glossary_additions:
    location: "Section 12"
    missing_terms:
      - term: "Grain Engineering"
        definition: "Design of optimal observation/intervention granularity in support"
      - term: "30% Strategy"
        definition: "Deployment strategy targeting top 30% of ethically sensitive supporters"
      - term: "Constitutional Space"
