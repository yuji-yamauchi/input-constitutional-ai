      - term: "Decimal Accumulation Theory"
        definition: "Building 1.0 from fragments (+0.05, +0.1...) rather than 0→1 leap"
      - term: "Record Exposure Model"
        definition: "System where record granularity automatically reveals support quality"
      - term: "Three Behavioral Types"
        definition: "Submission/Aggression/Ingratiation as distinct forced labour manifestations"
      - term: "YSQ"
