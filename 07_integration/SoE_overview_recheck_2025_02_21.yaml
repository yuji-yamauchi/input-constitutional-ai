new_issues_in_v2:

  N1_sroi_two_model_provenance:
    severity: "★★★ 要確認"
    location: "Section 9.2-9.3（lines 683-719）"
    issue: >
      SROI 29.4:1の構造批判と2モデル分離は非常に論理的だが、
      この分析がプロジェクト内のどのセッションに基づくか不明。
      基準率の誤謬、時間軸割引、二重計上、死荷重の4論点は
      標準的なSROI方法論批判としては正確だが、Puuがこの
      リストラクチャリングを明示的に議論・承認した記録が
      プロジェクト知識内に見当たらない。
    risk: >
      VSClaude君が「合理的だから」と自律的に追加した場合、
      Puuの理論的意図と齟齬が生じる可能性がある。
      特に「29.4:1」はSusanへの提案で使った数字であり、
      これを事後的に「1.5-6.0（一般）」に下方修正することは
      戦略的判断を伴う。
    recommendation: >
      Puuに確認：「SROIの2モデル分離はPuuが議論した内容か、
      VSClaude君の自律的判断か？」
      承認済みなら問題なし。未議論なら、この部分は
      「方法論的課題の整理」として残しつつ、
      数値の確定はPuuの判断に委ねる注記を追加すべき。

  N2_section_numbering_gap:
    severity: "★ 軽微"
    location: "Section 2"
    issue: >
      Section 2.6がDecimal Accumulation Theory、2.7がBoszormenyi-Nagyだが、
      前回レビューで提案したGrain-Based Cognition（2.7または2.8）が
      欠落しているため、Section 2の哲学基盤が「認知科学的根拠なし」に見える。
      実装セクション（5.3）で粒度工学を語る前に、
      哲学セクションで認知的基盤を据えるのが論文的には自然。

  N3_phr_to_soe_narrative_gap:
    severity: "★★ 中程度"
    location: "文書全体の構成"
    issue: >
      Researcher Yの15年の思想的連続性
      （2010 PHR Commons → 2018 発達障害支援PF → 現在SoE）が
      Section 10にのみ記載されており、文書冒頭で読者が把握できない。
      NotebookLMで質問された場合、「SoEの歴史的背景は？」に対して
      Section 10まで到達しないと回答できない構造。
    recommendation: >
      Section 1の"What Is SoE?"に2-3文追加：
      "SoE builds on 15 years of theoretical continuity, beginning with 
      the PHR Commons concept (2011) — the idea that personal health 
      records are a shared resource (commons) rather than corporate property 
      — through a developmental disability support platform concept (2018), 
      to its current form as a Constitutional AI-enhanced rights recovery system."

  N4_structural_dig_up_practitioner:
    severity: "★ 軽微（将来課題）"
    issue: >
      Researcher Yの認知プロファイル（Structural Dig-Up Practitioner）が
      用語集・本文ともに未記載。これはSoEの「方法論がなぜ生まれたか」を
      説明する概念だが、NotebookLM用文書に研究者個人の認知特性を
      入れるかどうかは判断が分かれる。Puuの判断に委ねる。

  N5_measurement_integration_table_missing:
    severity: "★★ 中程度"
    location: "Section 3.5（Forced Labour Framework）"
    issue: >
      三層統合の「測定統合」テーブルが欠落。
      プロジェクト知識（2025_11_25_s.yaml）では明示されている：
        NOCC → 自尊感情・ストレス（現在状態）
        YSQ → Underlying schemas
        HRV → Autonomic nervous system state
        → 包括的強制労働脆弱性評価
      Section 5.6（NOCC）にYSQ/HRVは追加済みだが、
      Section 3.5内で「三つの測定を組み合わせると強制労働脆弱性の
      包括的評価になる」という統合的意味づけが欠けている。
    recommendation: >
      Section 3.5のConstitutional Spaceの後に1段落追加：
      "Comprehensive Forced Labour Vulnerability Assessment:
       NOCC (current state) + YSQ (schema structure) + HRV (autonomic state)
       = three-layer objective measurement, not subjective judgment."

