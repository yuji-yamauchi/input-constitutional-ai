  prompt_5_hubris_factor_connection:
    title: "ヒュノプス因子の実証的検証"
    target_ai: "GPT DeepResearch"
    prompt: |
      以下の理論的フレームワークとエプスタイン事件の事実を接続し、
      「ヒュノプス因子」の実証的検証を行ってください。

      【理論的基盤】
      1. David Owen, "Hubris syndrome: An acquired personality disorder?" Brain (2009)
         - 権力の座に長く留まることで後天的に発症する人格障害
         - 診断基準：自分と組織の同一視、判断への過度の自信、同僚の軽視、
           歴史や神に対してのみ説明責任を感じる

      2. Dacher Keltner, "The Power Paradox" (2016)
         - 権力獲得に必要な資質（共感・協調性）が権力保持後に最も損なわれる

      3. Sukhwinder Obhi et al., "Power changes how the brain responds to others" (2014)
         - 権力プライミング群でミラーニューロン系活動が有意に低下
         - 権力は文字通り「他者の痛みが見えなくなる」神経基盤を持つ

      4. Paul Piff (UC Irvine), Rigged Monopoly実験
         - 有利な条件を与えられたプレイヤーが勝利を「自分の戦略の優秀さ」に帰属

      5. Sykes & Matza, "Techniques of Neutralization" (1957)
         - 責任の否認、被害の否認、被害者の否認、非難者への非難、高次の忠誠への訴え

      【エプスタイン事件との接続点】
      A. エプスタイン個人のヒュノプス：
         - 有罪判決後も行動パターンを変えなかった
         - 学術・政治エリートとの関係を維持し続けた
         - 「慈善家」としての自己イメージ

      B. 関与者のヒュノプス：
         - NPA交渉における弁護団の「被害者は信用できない」主張
         - 有罪判決後もエプスタインとの関係を維持した人物
         - 伊藤穣一パターン（理念と行動の完全乖離）

      C. 制度的ヒュノプス：
         - 「被害者に通知しない」という判断
         - 「潜在的共犯者すべてに免責」という異常な条件
         - 2025-2026年の文書公開での選択的墨消し

      【出力形式】
      - 各理論的概念とエプスタイン事件の具体的事実の対照表
      - ヒュノプス因子の「閾値」に関する考察
      - SoE（Service of Empowerment）研究への含意

