      - date: "2006-07-19"
        event: "Palm Beach郡大陪審、エプスタインを売春勧誘罪1件のみで起訴"
        source: "Florida州裁判所記録"
        significance: |
          州検察Barry Krischerが事件を大陪審に付託。
          大陪審は被害者1名のみから証言を聴取し、軽微な罪1件のみの起訴。
          Palm Beach警察幹部はKrischerを公然と批判。FBIが捜査に参加。
      - date: "2007-05"
        event: "連邦検事補が60件の罪状を含む起訴状草案とエビデンスメモを作成"
        source: "DOJ Office of Professional Responsibility Report"
        significance: "この時点で連邦起訴は十分可能だった"
      - date: "2007-07"
        event: "エプスタインの弁護団がMiami連邦検事Alexander Acostaと司法取引交渉"
        source: "DOJ OPR Report / Miami Herald調査報道"
      - date: "2008-06-30"
        event: |
          エプスタインが州法違反（売春勧誘・未成年者の売春勧誘）2件で有罪答弁。
          懲役18ヶ月。連邦非起訴合意（NPA）締結。
        source: "Florida州裁判所記録 / DOJ OPR Report"
        npa_details:
          granted_immunity_to:
            - "エプスタイン本人"
            - "名指しの共犯者4名"
            - "潜在的共犯者すべて"
          victim_notification: "被害者には合意内容を通知せず（封印）"
          work_release: "週6日、1日最大12時間の外出許可付き服役"
          actual_sentence_served: "約13ヶ月"

  phase_3_interim:
    title: "出所後〜再逮捕（2009-2019）"
    events:
      - date: "2009-07"
        event: "エプスタイン出所"
      - date: "2009-05"
        event: "Virginia Roberts Giuffre が訴訟提起（エプスタインとMaxwellが性的接待を手配）"
        source: "民事訴訟記録"
      - date: "2010-06-18"
        event: "元執事Alfredo Rodriguez、エプスタインの活動記録日誌の隠匿・販売未遂で有罪判決"
        source: "裁判記録"
      - date: "2015"
        event: "Giuffre v. Maxwell 名誉毀損訴訟提起"
        source: "SDNY裁判記録"
      - date: "2018-11"
        event: "Miami Herald、Julie K. Brownの調査報道を掲載。Acostaの役割を追及"
        source: "Miami Herald 'Perversion of Justice' シリーズ"
        significance: "#MeToo時代の文脈で事件への関心が再燃"

  phase_4_federal_prosecution:
    title: "連邦起訴・死亡（2019）"
    events:
      - date: "2019-07-06"
        event: |
          エプスタインがパリからの帰国時にTeterboro空港で
          FBI-NYPD児童犯罪対策チームにより逮捕。
          性的人身売買と共謀の連邦罪で起訴。
        source: "SDNY起訴状（United States v. Epstein, 1:19-cr-00490）"
      - date: "2019-07-08"
        event: "NY邸宅の家宅捜索で数千枚の裸体・半裸写真を発見（未成年者含む）"
