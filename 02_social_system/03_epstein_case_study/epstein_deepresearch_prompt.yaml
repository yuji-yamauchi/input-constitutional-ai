      - date: "2019-07-12"
        event: "Alexander Acosta、労働長官を辞任"
        source: "公式発表"
      - date: "2019-08-10"
        event: "Metropolitan Correctional Centerの独房で死亡。公式には自殺と判定"
        source: "NYC Chief Medical Examiner Barbara Sampson"
        controversy: "死因については異論が継続"

  phase_5_maxwell_trial:
