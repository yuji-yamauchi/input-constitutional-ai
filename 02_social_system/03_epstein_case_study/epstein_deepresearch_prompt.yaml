metadata:
  purpose: "GPT DeepResearch / NotebookLM への入力用構造化プロンプト"
  research_context: "SoE（Service of Empowerment / Service or Exploitation）研究"
  target_concept: "ヒュノプス因子（Hypnos Factor）の実証的裏付け"
  language: "日本語（英語資料参照可）"
  created: "2026-02-03"

# ============================================================
# セクション1: 研究目的と調査フレーム
# ============================================================

research_objective:
  title: "エプスタイン事件の構造分析 — ヒュノプス因子の実証的検証"
  
  background: |
    本調査は、富と権力の偏重が人間の道徳認知回路に与える
    構造的影響（「ヒュノプス因子」）を検証するための
    実証データ収集を目的とする。
    
    ヒュノプス因子（Hypnos Factor）とは：
    権力や富の偏重が一定閾値を超えたとき、法治的感性・道徳認知回路が
    構造的に「眠る」現象。個人の道徳的欠陥ではなく、権利非対称性が
    閾値超過時に確率論的に発現する構造的認知変容。

    先行研究として David Owen（Hubris Syndrome, 2008）、
    Dacher Keltner（The Power Paradox, 2016）、
    Sukhwinder Obhi（権力プライミングによるミラーニューロン抑制実験）
    が理論的基盤を提供するが、本研究では「傲慢（Hubris）」という
    道徳的帰責を含む用語ではなく、「眠り（Hypnos）」という
    構造的・確率論的概念として再定義する。
    
    エプスタイン事件は、この因子が個人・制度・社会の
    三レベルで同時発現した歴史的ケーススタディである。

  research_questions:
    q1: "エプスタインネットワークに関与した人物の権力構造はどうなっていたか？"
    q2: "司法・学術・メディア等の制度的免疫がなぜ20年間機能しなかったか？"
    q3: "非起訴合意（NPA）に至る過程で、どのような権力の作用があったか？"
    q4: "関与者の公的理念と実際の行動の乖離はどの程度だったか？"
    q5: "被害者の権利はどのように構造的に剥奪されていたか？"

# ============================================================
# セクション2: 事件概要（検証済み事実）
# ============================================================

case_overview:
  subject:
    name: "Jeffrey Edward Epstein"
    born: "1953-01-20, Brooklyn, New York"
    died: "2019-08-10, Metropolitan Correctional Center, Manhattan"
    cause_of_death: "首吊り自殺（公式発表。異論あり）"
    occupation: "金融業者（具体的な資産運用の実態は不透明）"
  
  co_conspirator:
    name: "Ghislaine Maxwell"
    role: "エプスタインの長年のパートナー・共犯者"
    conviction: "2021-12-30 有罪評決（性的人身売買等）"
    sentence: "懲役20年（2022-06-28宣告）"
  
  crime_scale:
    victims_identified: "40名以上（FBI確認済み未成年者）"
    youngest_victim: "14歳"
    period: "2002年〜2005年（連邦起訴対象期間。実際はそれ以前から）"
    geographic_scope:
      - "Palm Beach, Florida（邸宅）"
      - "New York City（タウンハウス）"
      - "Little St. James Island, U.S. Virgin Islands（私有島）"
      - "New Mexico（牧場）"
      - "Paris, France"

