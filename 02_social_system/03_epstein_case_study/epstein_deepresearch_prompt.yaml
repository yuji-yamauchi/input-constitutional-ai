deepresearch_prompts:

  prompt_1_structural_analysis:
    title: "構造分析：権力と免責のメカニズム"
    target_ai: "GPT DeepResearch"
    prompt: |
      以下の一次資料を参照し、エプスタイン事件における
      「権力による免責構造」を構造的に分析してください。

      【一次資料】
      1. DOJ Epstein Library: https://www.justice.gov/epstein
      2. DOJ OPR Report: https://www.justice.gov/opr/page/file/1336471/dl
      3. Epstein Files Transparency Act: https://www.congress.gov/119/plaws/publ38/PLAW-119publ38.pdf
      4. CourtListener docket: https://www.courtlistener.com/docket/15887848/united-states-v-epstein/

      【分析の焦点】
      A. 2007年の非起訴合意（NPA）に至るプロセス：
         - 60件の罪状を含む起訴状草案が存在したのに、なぜ州法2件に減じられたか
         - 被害者への通知義務がなぜ回避されたか
         - 「潜在的共犯者すべて」への免責がなぜ含まれたか

      B. 制度的免疫の機能不全：
         - Palm Beach州検察の対応（大陪審への付託、被害者1名のみの証言聴取）
         - 連邦検事Acostaの交渉過程での譲歩パターン
         - 20年間にわたる司法の不作為

      C. 2019年再逮捕から死亡までの経緯：
         - SDNYがNPAに拘束されないと判断した法的根拠
         - Metropolitan Correctional Center での死亡の状況

      【出力形式】
      - 時系列に沿った構造分析
      - 各段階での「権力の作用点」の特定
      - 制度的免疫が機能停止した具体的メカニズムの列挙
      - 学術文献との接続（David Owen Hubris Syndrome、Dacher Keltner Power Paradox）

  prompt_2_network_mapping:
    title: "ネットワーク分析：関与者の権力構造"
    target_ai: "GPT DeepResearch"
    prompt: |
      エプスタイン事件の公開文書に基づき、
      関与者のネットワーク構造を分析してください。

      【一次資料】
      1. DOJ Epstein Library: https://www.justice.gov/epstein
      2. House Oversight Committee Records: https://oversight.house.gov/
      3. COURIER Database: https://journaliststudio.google.com/pinpoint/search?collection=c109fa8e7dcf42c1

      【分析の焦点】
      A. ネットワークの構造的特徴：
         - 飛行記録に基づく移動パターン
         - メール記録に基づくコミュニケーション構造
         - 資金フロー（寄付・投資・贈与）

      B. 理念と行動の乖離パターン：
         - 伊藤穣一（MIT Media Lab）：Web3.0/分散型/透明性を提唱しながら
           不透明な資金を受領し隠蔽
         - 学術機関（MIT等）：知的権威が富の前で免疫不全を起こした構造
         - その他の公的理念を持つ人物の行動との矛盾

      C. 被害者側の権利構造：
         - 被害者の社会経済的背景
         - リクルートメントの構造（pyramid scheme的構造）
         - 「契約的対等性」の不在

      【出力形式】
      - ネットワーク構造の図式的記述
      - 権力の偏重度（asymmetry）の定量的推定
      - 「ヒュノプス因子」発現の条件分析

  prompt_3_institutional_failure:
    title: "制度的免疫の失敗：20年間の不作為の構造"
    target_ai: "GPT DeepResearch / NotebookLM"
    prompt: |
      以下の資料を参照し、エプスタイン事件において
      司法・学術・メディアの制度的免疫がなぜ20年間機能しなかったかを分析してください。

      【一次資料（NotebookLMにアップロード推奨）】
      1. DOJ OPR Report（PDF）: https://www.justice.gov/opr/page/file/1336471/dl
      2. Epstein Files Transparency Act（PDF）: https://www.congress.gov/119/plaws/publ38/PLAW-119publ38.pdf
      3. DOJ Congressional Letter（2026-01-30）: https://www.justice.gov/opa/media/1426091/dl

      【分析の焦点】
      A. 司法の失敗：
         - 州→連邦のエスカレーション失敗
         - NPA（非起訴合意）の異常性
         - 被害者権利法（Crime Victims' Rights Act）の不適用
         - 2025-2026年の文書公開でも続く墨消し問題

      B. 学術機関の失敗：
         - MIT Media Labのエプスタイン資金受領と隠蔽
         - 学術的権威が「慈善家」の仮面を検証しなかった構造

      C. メディアの失敗と成功：
         - 2005-2018年の13年間の沈黙
         - 2018年Miami Herald調査報道が転換点になった理由
         - #MeToo運動の文脈的影響

      D. 2025-2026年の文書公開プロセス：
         - 法定期限（12/19）の不遵守
         - 600万ページ中350万ページのみの公開
         - 被害者保護と透明性のトレードオフ

      【理論的フレームワーク】
      - David Owen, "Hubris Syndrome" (2008)
      - Dacher Keltner, "The Power Paradox" (2016)
      - Sukhwinder Obhi, 権力プライミングによるミラーニューロン抑制研究
      - Sykes & Matza, "Techniques of Neutralization" (1957)
      - Walter Scheidel, "The Great Leveler" (2017)

  prompt_4_notebooklm_source_list:
    title: "NotebookLM用ソースリスト"
    target_ai: "Google NotebookLM"
    instruction: |
      以下のPDFおよびWebページをNotebookLMのソースとしてアップロードし、
      「制度的免疫の失敗パターン」について横断的に質問してください。

    sources_to_upload:
      pdfs:
        - url: "https://www.justice.gov/opr/page/file/1336471/dl"
          description: "DOJ OPR Report — 2006-2008年連邦捜査処理の内部調査"
        - url: "https://www.congress.gov/119/plaws/publ38/PLAW-119publ38.pdf"
          description: "Epstein Files Transparency Act 法律全文"
        - url: "https://www.justice.gov/opa/media/1426091/dl"
          description: "DOJから議会への報告書（2026-01-30）"

      web_pages:
