# ==========================================
# 7. SoE研究との接続メモ
# ==========================================
soe_research_connection:
  note: >
    虐待防止法制は、SoEフレームワークにおける
    「搾取構造の可視化」の法的基盤を提供する。
    特に以下の接点が重要:
  connections:
    - point: "障害者虐待防止法の経済的虐待（第2条）"
      soe_relevance: "就労支援における工賃搾取・不当処分の法的定義"
    - point: "身体拘束の適正化（3要件: 切迫性・非代替性・一時性）"
      soe_relevance: "行動制限の正当化プロセス → Input Constitutional AIの判断基準モデル"
    - point: "通報義務と早期発見（法第16条等）"
      soe_relevance: "構造的搾取の早期検知システムとしてのSoEプラットフォーム"
    - point: "虐待防止委員会の義務化（令和4年度〜）"
      soe_relevance: "組織レベルのガバナンス構造 → SoE監査機能との対応"

