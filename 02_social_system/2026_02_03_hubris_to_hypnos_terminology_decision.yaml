# ============================================================
# 用語決定記録：ヒュブリス（Hubris）→ ヒュノプス（Hypnos）
# ============================================================
# 決定日: 2026-02-03
# 決定者: Puu（研究者Y）
# 記録者: Claude Opus 4.5
# ============================================================

decision_summary:
  from: "ヒュブリス因子（Hubris Factor）"
  to: "ヒュノプス因子（Hypnos Factor）"
  scope: "SoE研究における富・権力の偏重による上方逸脱の正式名称"
  effective_date: "2026-02-03"

# ============================================================
# 背景：二つの用語の並走状態
# ============================================================

background:
  situation: |
    2026-02-02の深夜セッションで「ヒュノプス因子」が着想され、
    翌日のGPT Deep Researchでは「ヒュブリス因子」が使用された。
    結果として二つの用語が並走する状態が発生。

  sources_with_hubris:
    - "エプスタイン文書とSoE研究の関連性.md（GPT Deep Research生成）"
    - "epstein_deepresearch_prompt.yaml（初版）"

  sources_with_hypnos:
    - "2026_02_02_c1.yaml（深夜セッション生ログ）"
    - "2026_02_02_c1_hypnos_factor_final.yaml（完全統合版）"

# ============================================================
# 決定理由：なぜヒュノプスを採用するか
# ============================================================

rationale:

  core_distinction:
    hubris:
      meaning: "傲慢（ギリシャ語で神に対する不遜）"
      implication: "道徳的帰責を含む"
      consequence: "「悪い人が傲慢になった」という物語で終結"
      intervention: "罰する・教育する（個人への働きかけ）"

    hypnos:
      meaning: "眠り（ギリシャ神話の眠りの神）"
      implication: "構造的・確率論的現象として記述"
      consequence: "「構造的条件下で誰にでも起きうる」という認識"
      intervention: "構造を変える（システムへの働きかけ）"

  key_insight_from_session:
    puu_statement: |
      「善い人にも起きる。娘がいても起きる。」
      （Gates・Clinton・Prince Andrew——全員に娘がいる）
    significance: |
      この観察を保持できるのはヒュノプス（眠り）の概念。
      ヒュブリス（傲慢）では「あいつが傲慢だった」で終わり、
      「なぜ制度全体が20年間眠っていたのか」が説明できない。

  theoretical_positioning:
    prior_research: |
      David Owenの「Hubris Syndrome」は先行研究として参照する。
      ただし、SoE独自の理論枠組みでは「ヒュノプス因子」を正式採用。
    differentiation: |
      「Owenが記述した現象を、道徳的帰責から切り離し、
      構造的・確率論的フレームで再定義したもの」

  public_health_framing:
    puu_approach: |
      Robeynsのリミタリアニズムは規範的主張（べき論）。
      リバタリアンには通じない：「なぜお前が俺の財産権に口を出すのか」

      ヒュノプス因子は記述的・確率論的主張（である論）。
      「権利の偏重が閾値を超えると、確率論的にこの現象が発現する」
      という公衆衛生学的アプローチでリミタリアニズムを展開可能。

# ============================================================
# 確定した理論構造
# ============================================================

confirmed_framework:

  dual_factor_model:
    anomie_factor:
      direction: "底辺 → 社会破壊"
      trigger: "権利の絶対的欠如（失うものがない）"
      mechanism: "法治に従う動機の喪失"
      example: "無敵の人"

    hypnos_factor:
      direction: "頂点 → 他者の資源化"
      trigger: "権利・資源の過度な偏重（法に服す必要がない）"
      mechanism: "法治的感性・道徳認知回路の構造的停止"
      example: "エプスタイン、伊藤穣一パターン"

  what_hypnos_puts_to_sleep:
    - "法治的感性（法の下の平等への内的コミットメント）"
    - "道徳認知回路（相手を同じ人間と認識する回路）"
    - "制度的免疫（組織の自浄作用・内部告発機能）"
    - "人間認識回路（「娘と同年齢の少女＝同じ人間」認識）"

  properties:
    structural_not_moral: "善い人にも起きる認知変容"
    threshold_dependent: "閾値以下では発現しない・超えると確率論的に発現"
    scale_invariant: "福祉ミクロ搾取もエプスタインマクロ搾取も同一因子"
    affects_institutions: "MIT・司法・メディアなど制度全体が眠る"

