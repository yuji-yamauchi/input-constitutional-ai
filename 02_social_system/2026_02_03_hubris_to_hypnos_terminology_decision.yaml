      - Owen「Hubris Syndrome」は先行研究として明示
    status: "completed"

# ============================================================
# Owen先行研究との関係
# ============================================================

owen_relationship:
  citation_policy: |
    David Owen "Hubris Syndrome" (2008) は先行研究として引用する。
    「Hubris Syndrome」という用語はOwenの原著用語として尊重。
    ただし、Puuの理論枠組みでは「ヒュノプス因子」が正式名称。

  distinction: |
    Owen: 「権力の座に長く留まることで発症する後天的な人格障害」
    Puu: 「権利非対称性が閾値超過時に確率論的に発現する構造的認知変容」

    Owenは個人の人格変容として記述。
    Puuは構造的条件下での確率論的発現として再定義。

