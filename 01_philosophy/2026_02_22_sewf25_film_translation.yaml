        「エンパワーメント」「分散化」という文脈で語っている。

    Q2_small_scale_ai:
      audrey_tang_actual_references:
        - "軽量モデル（lightweight model）"
        - "プレーンテキストでの行動規範の共同作成（co-create a code of conduct in plain text）"
        - "数千ドル規模の訓練予算"
        - "先住民によるインフラ全体の所有（祖先の知能 / ancestral intelligence）"
        timestamp: "00:15:12 - 00:15:35"
      correction:
        apotus_bloom_enclave: "これらはTangではなくナレーターが紹介したモデル名"
      coffee_hotel_analogy:
        speaker: "Nikoline Arns（分散型AI専門の女性技術者）"
        not: "Audrey Tang"
        actual_quote: >
          コーヒー1杯のために、巨大ホテル全館のシステムを使い、
          自分が昨夜飲み明かして二日酔いであることまで全室に知らせる必要はない。
          ただコーヒーを淹れればいいだけだ。
        timestamp: "00:21:14 - 00:21:51"
      dependency_risk_tang:
        quote: >
          何万もの訓練素材のキュレーションや数百万ドルの訓練予算が必要になれば、
          コミュニティには手が出せない（＝コントロール権を失う）
        timestamp: "00:14:50 - 00:15:06"

    Q3_data_sovereignty:
      fpic_implementation:
        - "オプトイン/オプトアウトの選択権"
        - "データはコミュニティのものと規定"
        - "使用データは6ヶ月後に削除しコミュニティに返還"
      strip_mining_speaker: "Audrey Tang（First Nations事例直後のカット）"
      forced_removal_case:
        country: "オーストラリア"
        event: "盗まれた世代（Stolen Generations）"
        mechanism: "子供の強制隔離（forced removal of children）のテコとしてデータが使われた"

    Q4_addictive_intelligence:
      speaker: "Audrey Tang"
      definition: >
        「Assistive intelligence（支援的知能）」の対義語。
        監視資本主義がユーザーを依存させ、許可なく個人データを
        海外の計算センターに送る構造を指す。
        timestamp: "00:19:48 - 00:20:01"
      hamster_connection: >
        回し車のハムスターは「運動が必要だから興奮している（＝依存状態）」が
        「どこに向かっているかのコントロール権を全く持っていない」という
        構造的無力さを表す。これがAddictive intelligenceの末路（コミュニティの空洞化）。

    Q5_primary_sources_only:
      note: "以下はGeminiによる一次情報抽出。解釈なし。"
      data_sovereignty:
        - speaker: "Audrey Tang"
          quote_en: "instead of bringing personal data to compute, we need to bring compute to data"
          quote_ja: "個人データを計算処理に持っていくのではなく、計算処理をデータ側に持ってくる必要がある"
        - speaker: "First Nations Economics"
          quote_en: "we don't own the data it's community's data"
          quote_ja: "私たちがデータを所有するのではない、データはコミュニティのものだ"
      process_alignment:
        speaker: "Audrey Tang"
        timestamp: "00:03:33 - 00:04:12"
        quote_en: >
          many AI systems are trained in what's called a utilitarianism logic
          which means it just want to maximize some number without any scrutiny...
          care ethics is very different... it cares about the health between people
          not just the achievements of individuals...
          it's not trying to maximize anything it's trying to satisfies
        quote_ja: >
          多くのAIは数字を最大化する功利主義で訓練されている…
          ケアの倫理は異なる。個人の達成度ではなく、人々の間の健全性を気にかける。
          何かを最大化するのではなく、満たす（十分である）ことを目的とする
      local_ai:
        - speaker: "Audrey Tang"
          quote_en: >
            indigenous nations they are now finally being able to own the entire infrastructure
            including the hardware the solar panels and so on to do their ancestral intelligence
          quote_ja: >
            先住民たちは今、ハードウェアやソーラーパネルを含むインフラ全体を所有し、
            彼らの「祖先の知能」を実行できるようになった
        - speaker: "分散型AI専門家（Nikoline Arns）"
          quote_en: >
            using this like huge models with huge data centers with really big absorption of data
            that you don't know what is going to happen to it for just doing one simple task
          quote_ja: >
            たった1つの単純なタスクをするために、データに何が起こるか分からないような
            巨大なデータセンターを持つ巨大モデルを使うことへの懸念
