overall_assessment:
  score: "8.5/10"
  quality: "非常に高い。学術的正確性と物語的魅力を両立している"
  strengths:
    - "Nagyの5次元→SoEへの接続が論理的に明快"
    - "Revolving Slate→Tobashiのマッピングが秀逸"
    - "Exoneration ≠ Forgiveness の区別が正確かつ重要"
    - "Multidirected Partiality→複式簿記構造の接続が独創的"
    - "冒頭と結末の火文化圏引用による円環構造が美しい"
    - "参考文献が適切に付されている"
  target_audience_fit: "研究者・家族療法家・政策立案者向けとして適切なトーン"

# =====================================================
# カテゴリA: 事実確認・学術的正確性
# =====================================================
category_A_factual_accuracy:

  A1_nagy_birth_year:
    location: "lines 9, 33"
    current: "1920"
    status: "✅ 正確"
    note: "Nagy (1920-2007) Budapest生まれ。"

  A2_nagy_works_dates:
    location: "lines 43-45"
    status: "✅ 正確"
    detail:
      invisible_loyalties: "1973, with Geraldine Spark — 正確"
      between_give_and_take: "1986, with Barbara Krasner — 正確"
      foundations: "1987 — 正確"

  A3_five_dimensions:
    location: "lines 55-64"
    status: "⚠️ 要精密化"
    issue: >
      5次元モデルの提示自体は正確だが、第5次元（The Ontic）を
      「Added later in his career」と記述している。
      より正確には、Nagy自身は初期から存在論的関心を持っており、
      第5次元の「明示的な分離」が後期にされた形。
      ただし動画台本としてはこの簡略化は許容範囲。
    recommendation: "変更不要。学術論文なら注記が必要だが台本としては適切。"

  A4_forgiveness_vs_exoneration:
    location: "lines 145-151"
    status: "⚠️ 微修正推奨"
    issue: >
      台本ではForgiveness を "What was done to you was acceptable" と定義しているが、
      これはやや強すぎる。Forgivenessは「harm was acceptable」ではなく
      「I release my claim against you」に近い。Nagyの批判は、
      Forgivenessが「加害者の参加を必要とする」点と、
      「被害を最小化するリスク」がある点。
      台本の「It risks minimising the harm」は正確だが、
      "What was done to you was acceptable" は過剰表現。
    recommendation: >
      line 148を以下に修正：
      'Forgiveness says: "I release the claim against you — 
      and the pressure to forgive risks minimising what was done."'

  A5_nagy_holocaust_connection:
    location: "lines 33-36"
    status: "✅ 正確だが補足可能"
    note: >
      「lost many family members」は正確。Nagyはユダヤ系ハンガリー人で
      ホロコーストの直接的影響を受けた。この経験が「正義の台帳」の
      根本的動機であることを述べている点は非常に重要。

  A6_references:
    location: "lines 237-253"
    status: "✅ 良好"
    note: >
      Nagy主要3著作、SoE文書、ACEs（Felitti）、Schema Therapy（Young）、
      Polyvagal（Porges）が適切に引用されている。

# =====================================================
# カテゴリB: SoEとの接続の正確性
# =====================================================
category_B_soe_connection_accuracy:

  B1_ledger_to_balance_sheet:
    location: "PART 3（lines 73-92）"
    status: "✅ 非常に正確"
    note: >
      Merit→Assets、Debt→Liabilities のマッピングが明快。
      「society itself keeps a fraudulent ledger」→Tobashiへの接続も正確。

  B2_revolving_slate_to_tobashi:
    location: "PART 5（lines 113-133）"
    status: "✅ 秀逸"
    note: >
      世代間債務回転→Tobashiの接続が的確。
      「misattribution of liabilities」という会計用語での説明が
      SoE会計メタファーとの統一性を高めている。

  B3_exoneration_to_three_stages:
    location: "PART 6（lines 137-159）"
    status: "✅ 正確"
    note: >
      Good Will Hunting→Exoneration→SoE三段階の接続が自然。
      「It's not your fault」をLedger Correctionの情緒的実装として
      正確に位置づけている。

  B4_multidirected_partiality_to_icai:
    location: "PART 7（lines 163-183）"
    status: "✅ 独創的で正確"
    note: >
      Multi-stakeholder recording（当事者・支援者・家族・社会の4台帳）として
      ICAIを位置づけるのは、SoE総論には明示されていない新しい表現だが、
      Information Boundary Design + 複式簿記構造と完全に整合している。

  B5_three_reasons_closing:
    location: "PART 8（lines 186-200）"
    status: "✅ 優秀"
    note: >
      3つの理由（理論的基盤、AIの役割定義、倫理的核心）が
      それぞれ異なる読者層（学者、技術者、政策立案者）に訴求する構成。

# =====================================================
# カテゴリC: 追記推奨（台本の射程を広げる要素）
# =====================================================
category_C_recommended_additions:

  C1_parentification_deserves_expansion:
    severity: "★★☆ 中程度"
    location: "PART 4（line 99）"
    current_state: "Parentificationが1段落で言及されているのみ"
    why_expand: >
      Parentificationは支援者のバランスシートに直結する概念。
      SoE総論のSection 7「Support Worker's Balance Sheet」で
      「教育・医療・家族の累積債務を個々の支援者が吸収する」問題を
      提起しているが、台本ではこの接続がない。
    recommendation: >
      PART 4の末尾に2-3文追加：
      "And here is SoE's most uncomfortable extension of this insight:
      many support workers are themselves parentified children, now performing
      the same role professionally. The accumulated debt of education,
      medicine, and family is ultimately absorbed by individual support workers.
      When their personal balance sheets break — when the invisible liabilities
      exceed what one person can carry — the support system collapses.
      SoE asks: Who holds the duty of care for the person providing duty of care?"

  C2_forced_labour_connection_absent:
    severity: "★★★ 重要"
    location: "台本全体"
    issue: >
      三層強制労働フレームワーク（ILO×Polyvagal×Schema）への接続が
      完全に欠落している。台本はNagy×SoEの「哲学的系譜」に焦点を
      当てているため意図的な省略かもしれないが、
      Schema Therapy（Jeffrey Young）は参考文献に含まれており（line 250）、
      NagyのDestructive Entitlement→Schemaの形成メカニズムへの接続は
      理論的に自然かつ強力。
    recommendation: >
      PART 5（Revolving Slate）の末尾に1段落追加：
      "The Revolving Slate also explains why SoE integrates Schema Therapy 
      into its framework. Jeffrey Young's Early Maladaptive Schemas — 
      Defectiveness, Failure, Dependence — are precisely the psychological 
      structures that form when the Revolving Slate delivers unresolved 
      parental debt to children. In SoE's Forced Labour Framework, these 
      schemas become the mechanism by which low self-esteem becomes 
      fixed — creating the conditions that international law recognises 
      as forced labour vulnerability. Nagy's Revolving Slate is, in effect, 
      the intergenerational transmission mechanism of forced labour risk."
    impact: >
      この追加により、台本の射程が「哲学的系譜」から
      「国際法的射程」まで一気に拡張される。
      Susanや政策立案者向けの説得力が飛躍的に向上。

  C3_database_exclusion_not_mentioned:
    severity: "★★ 中程度"
    location: "台本全体"
    issue: >
      Input CAIの「データベースからの排除」問題（13億人）への言及がない。
      台本のフォーカスはNagy→SoEの系譜であるため必須ではないが、
      「不正確な台帳」の最も大規模な例として言及すると
      Nagyの理論のスケール感が伝わる。
    recommendation: >
      PART 8（なぜこの系譜が重要か）の「Second reason」の末尾に1文追加：
      "And this matters at civilisational scale: 1.3 billion people with 
      disabilities worldwide are systematically excluded from databases — 
      the largest unrecorded ledger in human history."

  C4_15year_continuity_missing:
    severity: "★☆ 軽微"
    location: "INTRO（line 25）"
    current: "'a disability employment researcher developed a framework called SoE'"
    issue: >
      SoEが「15年の思想的連続性（PHR Commons 2011→SoE）」の上に
      構築されたことが伝わらない。SoE総論でも同じ問題が指摘済み。
    recommendation: >
      line 25を修正：
      "...a disability employment researcher with over 15 years of 
      cross-domain experience — from tax administration to IT to welfare — 
      developed a framework called SoE..."

  C5_key_concepts_table_addition:
    severity: "★ 軽微"
    location: "Key Concepts Reference（lines 222-234）"
    issue: "Support Worker's Balance Sheet がテーブルにない"
    recommendation: >
      以下の行を追加：
      | Parentification | 親代わり化 | Support Worker's Balance Sheet insolvency |

# =====================================================
# カテゴリD: 構成・表現上の改善提案
# =====================================================
category_D_structural_and_stylistic:

  D1_time_estimate:
    location: "Metadata, line 6"
    current: "~12-15 min"
    issue: >
      全8パート＋INTRO＋OUTROで253行。NotebookLMの音声生成は
      概ね1分あたり150-180語。現在の台本は約4,000語。
      4,000 / 160 ≈ 25分。12-15分には収まらない可能性が高い。
    recommendation: >
      時間見積もりを「~20-25 min」に修正するか、
      PART 4-5を統合して圧縮するか判断が必要。
      ただしNotebookLMの音声速度は調整可能なので、放置でもよい。

  D2_good_will_hunting_placement:
    location: "PART 6（line 139）"
    status: "構成上の提案"
    note: >
      Good Will Huntingの「It's not your fault」シーンは
      SoE総論のSection 2.3（SoE Three Stages）でも使われている。
      台本ではPART 6に配置されているが、INTROの冒頭フックとして
      使うことも検討可能。ただし現在の構成（簿記メタファーで始まる）は
      会計的フレーミングの一貫性があり、変更不要とも判断できる。
    recommendation: "現在の構成を維持。変更不要。"

  D3_outro_strength:
    location: "OUTRO（lines 204-217）"
    status: "★ 秀逸。修正不要"
    note: >
      Destructive Entitlement→火文化圏→「帳簿を正直に保つことは
      倫理的行為である」という収束が見事。
      最終問い「Are we keeping the books honestly? Or are we hiding the debt?」は
      全セクションの内容を一文に凝縮している。
      NotebookLMのポッドキャスト形式で最後に読み上げられると
      非常にインパクトがある。

  D4_japanese_terms_consistency:
    location: "Key Concepts Reference"
    issue: >
      日本語訳が一部SoE内の標準用語と若干異なる。
      - "多方向的部分肩入れ" — SoEでは通常この概念の日本語定訳は
        使われていない。Nagyの用語としては正確だが、
        台本内でSoEとして使うならカッコ書きで注記がよい。
    recommendation: "軽微。放置可。"

# =====================================================
# カテゴリE: 学術的整合性の警告
# =====================================================
category_E_academic_integrity_warnings:

  E1_nagy_discovery_narrative:
    location: "INTRO（line 25）"
    current: "'When he discovered Nagy's work, the connection was immediate'"
    issue: >
      この記述は「Researcher YがNagyを後から発見した」という時系列を
      示唆している。これがPuuの実際の経験と一致するか要確認。
      もしPuuがNagyを先に知っていてSoEを発展させたなら、
      「発見」というフレーミングは不正確。
      逆に、もし本当にSoEの会計メタファーを独立に構築した後で
      Nagyの存在を知ったなら、この「独立再発見」のナラティブは
      学術的に非常に強力（convergent discovery）。
    recommendation: >
      Puuに確認：「Nagyの文脈療法を先に知っていたか、
      それともSoEの会計メタファーを独立に構築した後で発見したか？」
      後者なら「convergent discovery」として明記する価値がある。
      前者なら「discovered」を「reconnected with」等に修正。

  E2_sole_authorship_claim:
    location: "References（line 245）"
    current: "'Yamauchi, Y. (2026). SoE Framework Complete Overview.'"
    issue: >
      SoE総論のv2末尾には「Compiled by Claude Code (Opus 4.6)」と
      記載されている。台本の参考文献ではYamauchi単独著者表記。
      AI支援による文書作成の帰属について、学術的慣行では
      「AI-assisted」を明記する方向に向かっている。
      ただし台本の参考文献としては単独著者表記で問題ない場合も多い。
    recommendation: >
      学術発表を想定するなら確認事項。動画台本としては現状維持で可。

