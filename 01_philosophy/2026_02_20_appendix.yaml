# ==========================================
# 支援の成果（資産回復の実証）
# ==========================================

outcome_evidence:

  puu_input_28:
    content: |
      因みにこの子は2023年8月に旧ヘルパー2級を取得したからね。
      あと彼氏もできて彼氏と家族とを引き合わせたしね。
    significance: "NOCCが「怠惰で無責任」とラベルした人間の回復の実証"

  claude_response_28:
    recovery_timeline:
      baseline_2022_03: "作業記憶0.0%、処理速度6.9%、自尊感情15.4%、ブロン週2-3回、解離常態化"
      achievement_2022_10: "看護助手実務者認定試験合格"
      achievement_2023_08: "旧ヘルパー2級取得"
      relationship: "彼氏ができ家族に紹介"
    welfare_bookkeeping_interpretation: |
      繰延資産の異常償却が止まり、新たな資産形成が開始。
      有形固定資産（資格）と無形固定資産（対人関係再構築能力）の同時回復。
      資格取得＝スキルではなく自尊感情回復の手段として設計されていた。
      彼氏を家族に紹介＝受動的被害者から能動的関係再構築者への移行。
    research_significance: |
      トバシの告発だけでなく「適切な仕訳を起こせば資産は回復する」の実証。
      IPS「働きたい意志があれば必ず働ける」の実証データ。

# ==========================================
# 因果連鎖：善管注意義務の範囲問題
# ==========================================

causal_chain_and_boundary:

  puu_input_29:
    content: "まあこの子が俺の倒れる原因となった讃良さんを引き合わせたんだけどね"

  puu_input_30:
    content: |
      今田さんからのオーダーだったのよ。
      今田さんが別のネット上の友達と不安になって讃良さんの大麻利用を警察に通報したけど、
      報復が怖いから対処してってオーダーしてきたから
    significance: "善管注意義務の履行が支援者自身のBS毀損に繋がった因果連鎖"

  claude_response_29_30:
    structural_analysis: |
      支援による回復→対人関係の拡大→その関係から生じたトラブル対処依頼→
      Yujiが対処に入る→Yuji自身が倒れる原因に。
    boundary_problem: |
      「対処して」が就労移行支援の善管注意義務の範囲内か。
      大麻使用者への対処・報復リスク管理は本来、警察・弁護士の管轄。
      しかし現場では利用者が頼れるのがYujiしかいない。
      制度間の簿外債務の連鎖的移転のさらに先：
      利用者の私的対人関係トラブルまで流れ込む。断る構造が制度上存在しない。
    support_worker_bs: |
      核心的問い：支援者のBSには誰が善管注意義務を負っているのか。
      Yujiは今田さんのBSを回復させたが、Yuji自身のBSを守る構造は未設計。
      支援者の消耗コストが制度上どこにも計上されない＝トバシの別形態。
    input_cai_implication: |
      「この依頼は善管注意義務の範囲を超えている」という警告機能。
      支援者保護のためのリスクフラグ。
      21時ルール（時間的境界）は設計できたが、
      業務範囲的境界の設計は不在だった。

