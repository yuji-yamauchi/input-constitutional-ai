pending_research:
  - topic: "押印慣行の法的根拠の確定"
    target_ai: "GPT / Gemini"
    scope: "厚労省省令・告示・通知の全階層で押印要求の有無を確認"

  - topic: "電子署名法との関係"
    scope: "電子記録への移行における法的要件"

  - topic: "子どもの権利条約 × SoE"
    note: "別途プロンプト作成済（outputs/2026_02_19_CRC_deep_research_prompt.md）"

