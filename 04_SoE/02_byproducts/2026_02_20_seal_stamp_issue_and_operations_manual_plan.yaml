# ============================================================
# 発端: 実績記録票への利用者押印慣行の根拠調査
# 日付: 2026-02-20
# 記録者: Claude Code (Opus 4.6)
# ============================================================

origin:
  trigger: "就労移行支援の実績記録票に利用者が印鑑を押す慣行に法的根拠はあるか？"
  finding: |
    障害者総合支援法・指定基準（省令）レベルでは
    「利用者の押印」を義務づける明確な規定は確認されていない。
    慣行の発生源は以下と推定：
    - 厚労省参考様式の「利用者確認欄」の拡大解釈
    - 自治体指導監査基準での「確認の証跡」要求
    - 介護保険制度からの類推的流入
    - 不正請求防止の文脈（だが本来は事業者側の立証責任）
  soe_analysis: |
    SoE会計メタファーにおける「トバシ」の典型例。
    事業者（親会社）が負うべき監査対応コスト（請求正当性の証明）を
    利用者（子会社）のBS上に付け替えている構造。
    障害特性により押印困難な利用者への強制は
    障害者差別解消法上の合理的配慮不提供に該当しうる。

# ============================================================
# 構想: 事業所運営マニュアル ＋ システム
# ============================================================
project_plan:
  title: "SoE準拠 就労支援事業所 運営マニュアル＆システム"
  subtitle: "権利ベースの事業所運営標準"
  status: "構想段階"

  vision: |
    SoEフレームワークに基づき、利用者の権利保障を前提とした
    就労支援事業所の運営マニュアルとITシステムを構築する。
    既存の「行政監査対応のための書類作成」から
    「利用者のBS/PL/CF改善のためのエビデンス記録」へ転換する。

  scope:
    manual:
      - 運営基準の法的根拠の整理（省令・告示・通知の階層明確化）
      - 慣行と法的義務の峻別（押印問題等）
      - SoE準拠の記録様式（複式簿記メタファー対応）
      - 合理的配慮のデフォルト実装
      - 利用者の記録主権（火文化圏思想の実装）

    system:
      - 実績記録の電子化（押印不要の本人確認方式）
      - 支援記録のBS/PL/CF自動分類
      - Input Constitutional AI統合（記録時の権利侵害検出）
      - NOCC（会話型アセスメント）との連携
      - 利用者ポータル（自分の記録を閲覧・確認できる権利）

  priority_issues:
    - id: "SEAL-001"
      title: "実績記録票の押印慣行"
      question: "法的根拠の確定調査（厚労省通知・自治体指導監査基準）"
      status: "要Deep Research"

    - id: "FORM-001"
      title: "実績記録票様式の再設計"
      question: "SoE準拠の記録様式はどうあるべきか"
      status: "未着手"

    - id: "RIGHTS-001"
      title: "利用者の記録アクセス権"
      question: "自分の支援記録を閲覧・取得する権利の法的根拠"
      status: "未着手"

# ============================================================
# 未調査事項（Deep Research候補）
