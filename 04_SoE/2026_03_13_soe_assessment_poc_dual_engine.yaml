# SoE理論との接続
# ============================================================
soe_theoretical_alignment:
  grain_based_cognition: |
    Engine 1 = macro-grain → meso-grainへの構造化測定
    Engine 2 = ナラティブ → micro-grainへの粒度抽出
    両エンジンの統合 = 粒度型思考の完全な操作化

  three_factor_model:
    hubris: "Engine 2の仕訳分析で、支援者側のHubris因子を検出可能"
    anomie: "Engine 1の環境因子測定で、制度的Anomieを可視化"
    hypnos: "Engine 2の「普通だと思ってた」型エピソードでHypnosを検出"

  fire_culture: |
    Engine 2は「帳簿に記入されなかった火」を再燃させる装置。
    記録されなかった出来事を、当事者自身の語りから復元し、
    構造化された記録として残す。
    これは火文化圏思想の技術的実装。

  research_implication: |
    このPoC自体が修士論文の方法論セクションになりうる。
    「LLMを用いた本人主権型アセスメントの設計と予備的検証」
    として、Engine設計→実装→パイロットテスト→考察の構造。
