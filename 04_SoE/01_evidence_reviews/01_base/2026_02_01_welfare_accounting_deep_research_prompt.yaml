liability_categories:

  # ========== 固定負債（長期的な課題） ==========
  fixed_liabilities:
    
    early_maladaptive_schemas:
      description: "早期不適応的スキーマ（幼少期に形成された認知パターン）"
      search_queries:
        - "Young Schema Questionnaire psychometric review"
        - "early maladaptive schemas disability population"
        - "schema therapy effectiveness mental health meta-analysis"
        - "スキーマ療法 YSQ 日本語版 信頼性 妥当性"
        - "早期不適応的スキーマ 障害者 測定"
      target_scales:
        - "YSQ-S3（Young Schema Questionnaire Short Form 3）"
        - "SMI（Schema Mode Inventory）"
        - "日本語版YSQ"
      accounting_analogy: "長期借入金（長期にわたり返済が必要）"
      priority: "HIGH - 根本的な認知パターン"
    
    adverse_childhood_experiences:
      description: "逆境的小児期体験（トラウマ歴）"
      search_queries:
        - "ACE questionnaire psychometric properties"
        - "adverse childhood experiences disability outcomes"
        - "childhood trauma measurement adult population"
        - "ACEs 逆境的小児期体験 測定 日本"
        - "小児期トラウマ 成人 アウトカム 縦断"
      target_scales:
