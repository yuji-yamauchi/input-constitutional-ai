# ============================================
# 福祉簿記メタファー：勘定科目設計のための
# Deep Research プロンプト
# ============================================
# 作成日: 2026-02-01
# 目的: エピソード→仕訳、勘定科目→アセスメント指標
#       のエビデンス基盤構築
# ============================================

research_context:
  
  core_concept: |
    「福祉簿記メタファー」とは、当事者の状態を会計フレームワークで
    可視化する試みである。
    
    - 貸借対照表（B/S）: 当事者の「資産」と「負債」の現在価値
    - 損益計算書（P/L）: 支援期間中の「増減」
    - キャッシュフロー計算書（C/F）: 実際の行動・活動の流れ
    
    エピソード（支援記録、生活上の出来事）が「仕訳」として機能し、
    勘定科目は心理学・福祉学のエビデンスベースの指標で構成される。

  research_question: |
    障害者就労支援における当事者の状態変化を、
    会計的フレームワーク（B/S, P/L, C/F）で測定・可視化するために、
    どのようなアセスメント指標が「勘定科目」として適切か？
    
    各指標について以下を明らかにする：
    - 理論的基盤
    - 測定ツール（尺度）
    - 信頼性・妥当性のエビデンス
    - 障害福祉領域での適用事例
    - 縦断的測定（変化の追跡）への適合性

# ============================================
# 勘定科目候補：資産サイド
# ============================================

asset_categories:

  # ========== 固定資産（変動しにくい基盤） ==========
  fixed_assets:
    
    cognitive_capital:
      description: "認知的資本（知的能力、学習能力）"
      search_queries:
        - "cognitive assessment disability employment evidence-based"
        - "intellectual functioning measurement vocational rehabilitation"
        - "WAIS-IV reliability validity intellectual disability"
        - "認知機能評価 就労支援 信頼性 妥当性"
      target_scales:
        - "WAIS-IV（ウェクスラー成人知能検査）"
        - "NOCC（神経心理学的オンライン総合チェック）"
        - "MoCA（モントリオール認知評価）"
      accounting_analogy: "土地・建物（減価しにくい基盤能力）"
    
    personality_traits:
      description: "性格特性（比較的安定した特性）"
      search_queries:
        - "Big Five personality traits stability change longitudinal"
        - "NEO-PI-R vocational rehabilitation disability"
        - "personality assessment employment outcomes meta-analysis"
        - "BIG5 性格特性 安定性 変化 縦断研究"
      target_scales:
        - "NEO-PI-R / NEO-FFI"
        - "BFI-2（Big Five Inventory-2）"
        - "TIPI（Ten Item Personality Inventory）"
      accounting_analogy: "のれん（企業買収時の無形資産）"
    
    educational_capital:
      description: "教育的資本（学歴、資格、スキル）"
      search_queries:
        - "human capital measurement disability employment"
        - "vocational skills assessment supported employment"
        - "educational attainment disability outcomes systematic review"
        - "職業スキル評価 障害者雇用 アウトカム"
      target_scales:
        - "GATB（一般職業適性検査）"
        - "日本語能力検定"
        - "各種資格・検定"
      accounting_analogy: "特許権・ライセンス（取得した権利）"

  # ========== 流動資産（変動しやすい状態） ==========
  current_assets:
    
    self_esteem:
      description: "自尊感情（自己価値の認識）"
      search_queries:
        - "Rosenberg Self-Esteem Scale reliability validity meta-analysis"
        - "self-esteem measurement disability population psychometric"
        - "self-esteem intervention employment outcomes longitudinal"
        - "自尊感情 測定 障害者 信頼性 妥当性 縦断"
        - "RSES-J 日本語版 心理測定特性"
      target_scales:
        - "RSES（Rosenberg Self-Esteem Scale）"
        - "RSES-J（日本語版）"
        - "State Self-Esteem Scale"
      accounting_analogy: "現金・預金（最も流動性の高い資産）"
      priority: "HIGH - SoEの中核指標"
    
    self_efficacy:
      description: "自己効力感（目標達成への確信）"
      search_queries:
        - "General Self-Efficacy Scale psychometric properties"
        - "self-efficacy vocational rehabilitation systematic review"
        - "Bandura self-efficacy measurement disability"
        - "自己効力感 就労支援 効果 メタ分析"
        - "GSE尺度 日本語版 信頼性"
      target_scales:
        - "GSE（General Self-Efficacy Scale）"
        - "CDSE（Career Decision Self-Efficacy Scale）"
        - "職業的自己効力感尺度"
      accounting_analogy: "売掛金（将来回収予定の価値）"
    
    resilience:
      description: "レジリエンス（回復力・適応力）"
      search_queries:
        - "Connor-Davidson Resilience Scale psychometric review"
        - "resilience measurement disability mental health"
        - "resilience intervention vocational outcomes"
        - "レジリエンス尺度 日本語版 心理測定特性"
      target_scales:
        - "CD-RISC（Connor-Davidson Resilience Scale）"
        - "BRS（Brief Resilience Scale）"
        - "精研式レジリエンス検査"
      accounting_analogy: "棚卸資産（消費・補充を繰り返す）"
    
    hope_optimism:
      description: "希望・楽観性（将来への期待）"
      search_queries:
        - "Adult Hope Scale Snyder psychometric properties"
        - "optimism measurement LOT-R disability population"
        - "hope theory vocational rehabilitation"
        - "希望尺度 楽観性 就労支援 効果"
      target_scales:
        - "Adult Hope Scale（Snyder）"
        - "LOT-R（Life Orientation Test-Revised）"
        - "日本語版希望尺度"
      accounting_analogy: "有価証券（将来価値への期待）"
    
    social_capital:
      description: "社会関係資本（人間関係、支援ネットワーク）"
      search_queries:
        - "social capital measurement disability employment"
        - "social support scale psychometric review"
        - "social network analysis vocational rehabilitation"
        - "ソーシャルサポート尺度 社会関係資本 障害者"
      target_scales:
        - "MSPSS（Multidimensional Scale of Perceived Social Support）"
        - "SSQ（Social Support Questionnaire）"
        - "ソーシャルサポート尺度（日本語版）"
      accounting_analogy: "投資有価証券（長期的関係性への投資）"

  # ========== ケイパビリティ資産（機能的能力） ==========
  capability_assets:
    
    icecap_capability:
      description: "ケイパビリティ（Sen/Nussbaum理論に基づく）"
      search_queries:
        - "ICECAP-A psychometric properties systematic review"
        - "capability approach measurement disability"
        - "Sen capability operationalization empirical"
        - "ケイパビリティアプローチ 測定 障害福祉"
        - "ICECAP 日本語版 妥当性"
      target_scales:
        - "ICECAP-A（成人用）"
        - "ICECAP-O（高齢者用）"
        - "OxCAP-MH（精神保健版）"
      accounting_analogy: "営業権（事業を営む能力の価値）"
      priority: "HIGH - ケイパビリティアプローチの核心"
    
    functioning_icf:
      description: "ICF機能分類に基づく活動・参加"
      search_queries:
        - "WHODAS 2.0 psychometric properties disability"
        - "ICF Core Sets vocational rehabilitation"
        - "functioning measurement WHO disability assessment"
        - "WHODAS 2.0 日本語版 信頼性 妥当性"
        - "ICF 就労支援 アセスメント"
      target_scales:
        - "WHODAS 2.0"
        - "ICF Core Sets（就労版）"
        - "生活機能評価表"
      accounting_analogy: "機械設備（生産活動を可能にする資産）"
    
    vocational_readiness:
      description: "職業準備性（就労に向けた準備状態）"
      search_queries:
        - "vocational readiness assessment disability evidence"
        - "work readiness scale psychometric properties"
        - "職業準備性ピラミッド エビデンス 測定"
        - "就労準備性 評価尺度 信頼性"
      target_scales:
        - "職業準備性チェックリスト"
        - "就労移行支援アセスメントシート"
        - "Work Readiness Inventory"
      accounting_analogy: "仕掛品（完成に向けて価値が蓄積中）"

