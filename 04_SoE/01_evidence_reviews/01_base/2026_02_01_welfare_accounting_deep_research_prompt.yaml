  administration: "支援者またはLLMで実施可能"
  
  theoretical_alignment:
    - "ケイパビリティアプローチとの整合性"
    - "ICFフレームワークとの整合性"
    - "CRPD原則との整合性"
    - "準委任契約論（善管注意義務）との整合性"

