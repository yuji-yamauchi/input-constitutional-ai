        - "CTQ（Childhood Trauma Questionnaire）"
        - "日本語版ACE質問票"
      accounting_analogy: "社債（過去の資金調達の返済義務）"
      note: "一度形成されると変化しにくいが、影響は軽減可能"
    
    internalized_stigma:
