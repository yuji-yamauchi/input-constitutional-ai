# ==========================================
# セッションの理論的意義
# ==========================================

theoretical_significance:

  breakthrough_1:
    title: "福祉簿記の棚卸しに必要な多層的データ構造の実証"
    content: |
      一人のケースに対してNOCC（2回）、ケース記録、チャットログ、
      自傷行為記録、LINEログ、訪問看護記録、面談音声という
      7層の一次資料が存在。NOCCの単一アセスメントでは棚卸し不可能。
      この統合がInput Constitutional AIの中核機能。

  breakthrough_2:
    title: "NOCCの自動生成総評とトバシの実体の同定"
    content: |
      「怠惰で根気がなく無責任」という総評が、
      作業記憶0.0%・処理速度6.9%の人間に対して発行される。
      評価損の相手勘定が自動的に個人に帰属される仕組み＝
      制度化されたトバシ。

  breakthrough_3:
    title: "制度間の簿外債務の連鎖的移転の具体的記述"
    content: |
      教育→医療→家庭→就労移行支援という債務の移転経路が、
      一つのケースの一次資料で具体的に追跡可能。
      各機関が計上すべき債務を計上せずスルーした結果、
      末端のYuji個人のBSに全額が載る構造。

  breakthrough_4:
    title: "2022年チャットベース支援＝Input CAI のプロトタイプ"
    content: |
      電話ではなくチャット、21時ルール、全スタッフ共有スペース、
      日次記録という設計が：
      - 危機介入・記録作成・医療連携の三機能同時実現
      - 監査証跡の自動生成
      - 公開帳簿としてのトバシ防止
      として機能。LLMで拡張するための基盤が既に存在。

  breakthrough_5:
    title: "「きれいな家」問題：デューデリジェンスの構造的限界"
    content: |
      外形的に正常な家庭からの情緒的不在による繰延資産の不可視的減損。
      ACEsスクリーニングでは「作為」は検出できるが
      「不作為」は拾いにくい。
      Complex領域の判定として位置づけ。

  breakthrough_6:
    title: "IPSの論理による問題の再定義"
    content: |
      「この状態の子がなぜ就労移行に来ているのか」ではなく
      「働きたいなら、ここまでの支援が提供されて当然」。
      行使条件の整備は社会側の義務であり上限はない。
      善管注意義務の履行コストが制度上計上されていない＝トバシ。

