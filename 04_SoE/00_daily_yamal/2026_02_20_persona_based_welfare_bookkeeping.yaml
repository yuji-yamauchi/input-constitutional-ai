      - 無形固定資産：教育権（高卒）、CRPD由来の追加的権利
      - 繰延資産：異常償却を強く示唆するプロファイル

# ==========================================
# NOCC一次資料の投入と分析
# ==========================================

nocc_first_assessment:

  puu_input_08:
    content: "NOCC_I氏職員用_20220303.pdf をアップロード"
    label: "入所時のNOCC評価"

  claude_response_08:
    cognitive_ability:
      fluid_reasoning: "22.5%"
      working_memory: "10.6%"
      processing_speed: "0.2% — 壊滅的"
    non_cognitive:
      family_stressor: "86.7% — 最大のストレス源"
      family_social_support: "13.3% — ほぼ機能していない"
      home_satisfaction: "13.3%"
      life_satisfaction: "18.7%"
    interpretation: |
      繰延資産（家庭環境）は異常償却が現在進行形で継続。
      友人サポート71.1%、先生サポート75.6%と外部は機能。
      会計的に言えば、連結グループ内の親会社（家族）が子会社（本人）を毀損し、
      外部取引先（友人・先生）の方が価値提供している構造。

  puu_input_09:
    content: "あくまで主観的評価なのよね。"
    significance: "棚卸し資料の信頼性問題を提起"

  claude_response_09:
    analysis: |
      NOCCの非認知能力は本人の自己申告＝帳簿棚卸。
      統合失調症・パーソナリティ障害下での自己評価バイアスの可能性。
      初BS作成には複数ソースの突合が必要：
      - NOCC（主観的・帳簿棚卸）
      - GATB（客観的認知能力・実地棚卸の一部）
      - ACEsスクリーニング（過去の環境因子）
      - 支援者の行動観察（もう一つの実地棚卸）
      棚卸差異自体が診断的意味を持つ。

