# ==========================================
# スタッフへの支援方針
# ==========================================

support_strategy:

  puu_input_11:
    content: |
      ちなみにスタッフにはスタッフの評価は自尊感情をあげること。
      手段は基本問わないってしてた。
    significance: "KPI設定と手段の裁量委任という準委任契約的構造の実践"

  claude_response_11:
    analysis: |
      自尊感情15.4%を動かさない限り何も始まらないという判断。
      まさに準委任契約の構造：
      - 「自尊感情を上げろ」という目的を設定
      - 善管注意義務の範囲内で手段は裁量に委ねる
      認知的制約よりも「自己に対する攻撃性」が最大のボトルネック。
      就労スキルを教える前に「自分は存在していい」という土台が必要。
      棚卸し結果から最大の評価損項目を特定し資源を集中投下する合理的意思決定。

# ==========================================
# チャットログの投入
# ==========================================

chat_log_analysis:

  puu_input_12:
    content: "20220718I氏チャットログ.xlsx をアップロード"
    structure: |
      3シート構成（Google Chat）：
      - Sheet1: メインチャット
      - I氏オンラインスペース: 事業所全体
      - I氏個別チャット: Yujiとの直接やりとり

  claude_response_12:
    key_observations: |
      NOCCの「怠惰で無責任」とチャットログの実態の乖離：
      - 摂食障害の友人を心配して大阪に駆けつける人
      - 誕生日会の準備を引き受けている人
      - 寝坊を正直に報告できる信頼関係の構築
      Yujiの対応パターン：
      - 「怒らないから（課題は増えるけど）」
      - 「体調に影響ある無理はしない」
      - 失敗を罰するのではなくリカバリープランを一緒に考える
    welfare_bookkeeping_significance: |
      チャットログは帳簿棚卸（NOCC）と実地棚卸（行動観察）の
      棚卸差異を記録している証拠資料。
      NOCCが「怠惰」と帳簿に載せたものの実態が全く違う。

# ==========================================
# ケース記録の投入
# ==========================================

case_record_analysis:

  puu_input_13:
    content: "ケース記録__I氏様_2022年度.pdf をアップロード"
    label: "スタッフのケース記録（2022年9月〜10月）"

  claude_response_13:
    key_findings:
      dissociation_pattern: |
        解離が日常的に発生。「不安定ちゃん」「あさひ君」「遊びたいちゃん」
        「過食ちゃん」「拒食ちゃん」の5人の交代人格。
        トリガー：父親のテレビ、ニュース、人の泣き声、人が多い環境
      concurrent_achievement: |
        解離・OD・自傷の中でも：看護助手試験合格、アロマ勉強継続、
        ハロウィン大賞受賞、看護学校への志望表明
      yuji_intervention_record: |
        10/28面談記録にYujiの言葉が記録：
        「自尊感情をあげていく必要がある。
        対人関係において対等の関係を築けるように（資格をとる等）していこう。」
    family_due_diligence: |
      家庭環境が解離の直接トリガー：父親のテレビ、母親の服装指摘、
      親族の集まり。しかし母親は送迎もしている。
      単純なポジティブ/ネガティブで切れない構造。

# ==========================================
# 自傷行為記録の投入
# ==========================================

self_harm_record_analysis:

  puu_input_14:
    content: "自傷行為記録_I氏20221107_.xlsx をアップロード"
    structure: "複数シート、日次データ、リスカ・OD・過食・遁走・希死念慮を記録"

  claude_response_14:
    data_pattern: |
      ブロンOD：週2〜3回ペース（12〜15錠/回）
      過食嘔吐：繰り返し発生、具体的食事内容と嘔吐まで記録
      リスカ：9月に〇が2回
      遁走：複数回記録
      希死念慮：最終行に「強い」
      11月東京コンサート前後にブロン12錠×3回/日まで悪化
    claude_observation: |
      NOCCの数値一枚で棚卸しすると資産の実態が全く見えない。
      この多層的記録全体が棚卸し資料であり、統合して初めて初BSが作成できる。
      「怠惰で根気がなく無責任」と、ブロン12錠飲みながら翌朝事業所に来る
      人間の現実。この乖離こそがトバシの実体。

# ==========================================
# LINEログ・スクリーンショットの投入
# ==========================================

line_log_and_screenshot_analysis:

  puu_input_15:
    content: |
      I氏スクショ.pdf（LINEスクリーンショット）
      I氏LINEログ.xlsx（8600行超のチャットログ）
    label: "危機介入の生記録"

  claude_response_15:
    critical_episode_6_19:
      timeline: |
        20:04 「希死念慮にやられてます リスカしたいし、死にたいです」
        20:05 Yuji対応開始
        20:33 認知行動療法の提案まで到達
        20:48 「おやすみなさい」で着地
      duration: "44分間の危機介入"
      quality: "臨床レベルの対話品質"

    critical_episode_6_22:
      timeline: |
        01:49 「もう死にたいです」「飛び降りたいです」「死んだ方がいいんです」
        02:51 「一通りギャン泣きして 薬飲んだので寝ます」
        07:03 「お願いします 今日お休みするか悩み中です」
        08:47 モーニングの写真「自分のご機嫌とるためにモーニング来ました」
      significance: "12時間の中でこれだけ振れる。日次の時価評価の困難さの実証"

    welfare_bookkeeping_implication: |
      四層の棚卸し資料が揃った：
      1. NOCC（主観的・スナップショット）
      2. ケース記録（第三者・連続観察）
      3. チャットログ（関係性・リアルタイム）
      4. 自傷行為記録（日次・行動データ）
      一人の利用者にこれだけの多層的縦断データが揃う事業所は極めて稀。
      Input Constitutional AIの必然性：この多層データを人間が統合判断するには
      Yujiレベルの実務者が必要。LLMがこの統合と原因帰属を担う。

# ==========================================
# 「主観的評価」問題の深化
# ==========================================

subjectivity_problem_deepened:

  puu_input_16:
    content: "いやー難しいよね"
    context: "四層の記録を初BSの勘定科目にマッピングする困難"

  claude_response_16:
    complexity_analysis: |
      複雑性理論の分類でComplex領域にいる。
      NOCC→有形固定資産のマッピングはComplicated。
      自傷行為記録とケース記録と解離パターンからの「評価損の原因帰属」はComplex。
      12時間で希死念慮から「今日は頑張ります」まで振れる変動を
      勘定科目に落とし込むのは日次時価評価と同等の困難。
    practical_resolution: |
      SoE Ver.1は日次変動の全仕訳ではなく、
      初BS作成時点でのスナップショットがPoCの射程。
      Yujiが現場でやっていた「自尊感情という単一KPIへの絞り込み」は、
      「棚卸し結果から最大の評価損項目を特定し資源を集中投下する」
      という合理的意思決定だった。

# ==========================================
# 家族のデューデリジェンスの現実
# ==========================================

family_due_diligence_reality:

  puu_input_17:
    content: |
      ちなみにご家族とは何回かお話してる。お父さんともお母さんとも。
      ご自宅もきれいだったんだよ。
    significance: "外形的観察とNOCCデータの不一致。デューデリジェンスの限界問題"

  claude_response_17:
    analysis: |
      家庭環境ストレッサー86.7%、家族サポート13.3%の申告と、
      「家はきれい」「両親と話ができる」という外形の不一致。
      企業デューデリでも同じ構造：工場はきれい、帳簿も整っている、
      しかし簿外債務が隠れている。
    three_possibilities:
      - "不作為の問題：暴力ではなく感情的不在、精神疾患への無理解"
      - "本人の知覚バイアス：統合失調症・PD下での家庭環境知覚"
      - "両方の重複"
    bookkeeping_implication: |
      繰延資産の減損が目に見えない形で進行していたケース。
      外形的資産は存在する（家がきれい、親が送迎する）が、
      実質的な償却（愛着形成、情動調整、自尊感情の発達）が正常に行われなかった。
      ACEsスクリーニングも「作為」には反応するが
      「きれいな家での情緒的不在」は拾いにくい。

# ==========================================
# チャットベース支援の構造設計（2022年時点）
# ==========================================

chat_based_support_design:

  puu_input_18:
    content: |
      Teamsのチャットだったけど今ならGPT共有チャットでやり取りしとけば
      もうちょい俺の負担が楽になったかな。
    significance: "現在のLLM技術で過去の支援負荷を軽減できた可能性の示唆"

  claude_response_18:
    analysis: |
      LLMが一次的な傾聴と安全確認を代行できる。
      Yujiの対応パターンのうちシステム化可能な部分：
      - 緊急度のトリアージ（Simple）
      - 安全確保の確認（Complicated）
      人間にしかできない部分：
      - 関係性に基づく感情的安定化（Complex）
      SoEの解像度向上サイクルそのもの。
      44分の危機介入のうち最初の15分はLLMが担えた可能性。

  puu_input_19:
    content: |
      実は3年前の時点でこれは革新的だったと思うのよ。
      基本電話では対応しない。
      チャットだと録音等しなくてもログが残る。
      チャット対応は21時までってルール付けして主治医にも伝えてた。
      自殺行動した子に対するコスパでは凄く良かったのよ。
    significance: "2022年時点での先進的な支援設計の自己評価"

  claude_response_19:
    structural_analysis:
      why_chat_not_phone:
