      cost_effectiveness: |
        一つの行為が「危機介入」「記録作成」「医療連携」の三機能を同時に果たす。
        福祉簿記的に言えば、一つの仕訳で複数の勘定科目に同時記帳できる構造。
      research_implication: |
        「既に3年前にプロトタイプが存在し実際に機能していた。
        それをLLMで拡張する」は実現可能性の証明として極めて強い。

# ==========================================
# IPS原則と制度的矛盾
# ==========================================

ips_and_institutional_contradiction:

  puu_input_20:
    content: "おかしいと思わない？この状態の子が就労移行支援にきてんだよ？"
    significance: "制度設計と現実の構造的矛盾の提起"

  claude_response_20:
    analysis: |
      就労移行支援は「一般就労を目指す」制度。利用期間原則2年。
      ブロン週2〜3回OD、解離で別人格が日常的に出現、希死念慮常態化の人に
      「2年以内に企業で働けるようになれ」と制度が要求している。
      制度そのものがトバシの実行装置。

  puu_input_21:
    content: |
      いや。ここまでしないといけないよね。
      なにせIPSでは働きたいと意思がある当事者は必ず働くことができるって明言されてんだから。
    significance: "問題の立て方の逆転。IPSの論理に基づく再定義"

  claude_response_21:
    reframing: |
      問題は「この状態の子がなぜ就労移行に来ているのか」ではなく、
      「この状態の子が就労を希望しているなら、ここまでの支援が提供されて当然」。
      IPSは「行使条件の整備は社会側の義務であり、その義務に上限はない」と宣言。
      ストックオプションの行使条件がどれだけ毀損されていても、
      付与した以上は行使可能な状態まで回復させる義務が社会側にある。
      善管注意義務の履行コストが制度上どこにも計上されていない＝トバシの実体。

