# ==========================================
# セッションの理論的意義
# ==========================================

theoretical_significance:

  breakthrough_1:
    title: "トバシの会計的正体の同定"
    content: >
      SoEで「トバシ」と呼んできた構造が、ストックオプションの簿外処理と
      構造的に同一であることが判明。メタファーではなく同一メカニズム。

  breakthrough_2:
    title: "自己責任論の会計的解体"
    content: >
      自己責任論 = 行使条件整備義務の簿外処理 ＋ 権利失効責任の権利保有者帰属。
      企業法では行使条件不公正のストックオプションは付与無効になりうる。

  breakthrough_3:
    title: "教育の定義不在の発見"
    content: >
      憲法にも教育基本法にも「教育とは何か」の定義が存在しない。
      無形固定資産の測定基準が未定義のため減損テスト不可能。
      CRC第29条＋一般的意見が補完的会計基準として機能する可能性。

  breakthrough_4:
    title: "人権＝資本金、権利＝資産という二層構造"
    content: >
      人権の普遍性（全員の資本金は等価）と個人の多様性（借方構成比の差異）を
      貸借一致の原則を満たしつつ同時に記述する構造の確立。

  breakthrough_5:
    title: "複式簿記の福祉的必然性"
    content: >
      複式簿記の本質的機能は「因果関係の強制的記録」。
      相手勘定の存在が、損失の原因帰属を構造的に強制する。
      トバシ＝相手勘定の改竄（エンロンと同構造の粉飾）。
      Input Constitutional AI ＝ 取引の実質判定を行う会計監査機能。

  breakthrough_6:
    title: "義務教育の準委任契約としての再解釈とPoC設計"
    content: >
      教育基本法第1条の目的＝準委任契約の目的、第2条の目標＝善管注意義務の履行基準。
      義務教育終了時の成績表を棚卸し資料として、
      教育権の評価益・評価損を測定し、評価損の原因帰属をInput CAIで判定するPoC。
      既存ツール（NOCC＋GATB＋ACEs＋成績表）で実装可能な射程。

