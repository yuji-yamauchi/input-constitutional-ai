SoE_PoC_tool_recommendation:
  context:
    user: "Puuさん"
    project: "SoE (Service of Empowerment) 研究PoC"
    constraints:
      - "コーディング経験: 限定的（YAML/Excel中心）"
      - "目的: 研究データの蓄積と理論検証"
      - "時間: 最短でPoCを動かしたい"
      - "将来: 博士課程での研究基盤として発展可能性"

  my_recommendation:
    primary: "Lovable + Supabase"
    priority: "High"

  reasoning:
    why_lovable_supabase:
      fit_for_research:
        - "監査ログ・判定履歴のDB蓄積が研究に必須"
        - "SoEの『測定装置』としてデータの永続化が前提"
        - "認証機能により、複数ケースの追跡が可能"
      fit_for_puusan:
        - "Excel/CSVからの移行が直感的"
        - "UIコード不要で『指示→生成』"
        - "YAML的な構造思考との親和性が高い"
      future_extensibility:
        - "Supabaseはオープンソース（ベンダーロックイン回避）"
        - "研究が進んだ際のAPI連携・拡張が容易"
        - "博士課程での本格システム化への橋渡し"

    why_not_bolt_new:
      role: "否定ではなく『用途が違う』"
      適切な用途:
        - "ロジック単体の動作確認"
        - "『これで合ってる？』の30分検証"
        - "捨てても惜しくないプロト"
      SoEには不向きな理由:
        - "データ永続化が弱い"
        - "研究用ログ蓄積の設計思想がない"
        - "作って終わり型のツール"

    why_not_cursor:
      role: "将来の選択肢として保留"
      現時点で不要な理由:
        - "コードベースの管理が前提"
        - "Puuさんの強みはロジック設計であってコーディングではない"
        - "『書く』より『指示する』方が効率的な段階"
      将来使うタイミング:
        - "Lovableで生成したコードを細かく改修したい時"
        - "複数ファイルにまたがる複雑な改修が必要になった時"
        - "研究が進んで『自分で制御したい』欲求が出た時"

  strategic_workflow:
    phase_1_immediate:
      tool: "Bolt.new"
      purpose: "Excelロジックの動作検証（30分）"
      output: "『SoE判定が動く』という感覚を掴む"
      disposable: true

    phase_2_main:
      tool: "Lovable + Supabase"
      purpose: "研究用PoCの本体構築"
      components:
        - "ICFコード・ケイパビリティ指標のマスタDB"
        - "判定ロジックのUI化"
        - "監査ログの蓄積機能"
        - "認証（研究協力者ごとのデータ分離）"
      output: "博士課程まで使える研究基盤"

    phase_3_optional:
      tool: "Cursor or Windsurf"
      trigger: "Lovable生成コードの限界を感じた時"
      purpose: "細かいカスタマイズ・拡張"

  caution:
    過剰投資回避:
      - "最初から完璧を目指さない"
      - "Phase 1で『動く感覚』を得てからPhase 2へ"
      - "ツール学習に時間を使いすぎない"
    研究目的の維持:
      - "ツールは手段であって目的ではない"
      - "SoEの理論構築が本丸"
      - "PoCは『検証装置』に過ぎない"

  summary:
    一言: "Lovable + Supabaseを本命に、Bolt.newで助走"
    理由: "研究データの蓄積という要件がSoEの本質に直結するため"

cursor_assessment:
  verdict: "現時点ではPuuさんに不要"

  reasoning:
    mismatch_with_strengths:
      puusan_strength: "ロジック設計・構造化・理論構築"
      puusan_not_strength: "コードを書くこと自体"
      cursor_premise: "コードを書く人のための支援ツール"
      gap: "支援対象がそもそも合っていない"

    opportunity_cost:
      cursor_learning_curve:
        - "エディタ操作の習得"
        - "ファイル構成の理解"
        - "Git/バージョン管理"
        - "デバッグの作法"
      time_investment: "数十時間〜"
      trade_off: "その時間でSoE理論を1本論文に近づけられる"

    現段階の最適解:
      principle: "『書く』より『指示する』"
      tools:
        - "Lovable: 指示 → UI生成"
        - "Supabase: ドラッグ&ドロップ → DB構築"
        - "Claude/Gemini: 対話 → ロジック検証"
      result: "コードに触れずに動くものができる"

  when_cursor_becomes_relevant:
    trigger_conditions:
      - "Lovable生成コードの『ここだけ直したい』が頻発"
      - "研究システムが複雑化してAI生成だけでは限界"
      - "共同研究者とコードベースを共有する必要性"
      - "『自分で制御したい』という内発的欲求"
    timing: "おそらく博士課程中盤以降、あるいは永遠に来ない"

  analogy:
    situation: "論文を書くのにLaTeXを覚えるべきか"
    answer: "Wordで十分なら不要。必要になったら覚える"
    同様に: "コードを書かずに済むなら書かない"

  summary:
    結論: "Cursorは『良いツール』だが『Puuさんに今必要なツール』ではない"
    優先順位: "理論構築 > PoC実装 > コーディングスキル"

good_question:
  short_answer: "厳密にはコーディングツールだが、使い方が違う"

clarification:
  cursor:
    interaction_model: "人間がコードを書く → AIが補助・補完"
    prerequisite:
      - "コードの読み書き能力"
      - "ファイル構造の理解"
      - "エラーの解釈力"
    metaphor: "AIアシスタント付きの執筆作業"

