soe_database_design:
  philosophy: |
    「何を測定するか」= 「何をテーブルにするか」
    SoEの測定装置としての構造をそのままDB化

  tables:

    # === マスタデータ（参照用、変更頻度低） ===
    
    01_schemas:
      description: "18スキーマの定義マスタ"
      columns:
        - id: "PK, auto"
        - code: "例: abandonment, defectiveness"
        - name_ja: "見捨てられ、欠陥/恥"
        - name_en: "Abandonment, Defectiveness"
        - domain_id: "FK → domains"
        - description: "説明文"
        - linguistic_markers: "JSON配列"
        - thematic_patterns: "JSON配列"
        - behavioral_cues: "JSON配列"
      
    02_domains:
      description: "5ドメインの定義"
      columns:
        - id: "PK"
        - code: "disconnection_rejection, impaired_autonomy, etc."
        - name_ja: "断絶と拒絶、自律性と遂行の障害"
        - name_en: "英語名"

    03_coping_styles:
      description: "3コーピングスタイル定義"
      columns:
        - id: "PK"
        - code: "surrender, avoidance, overcompensation"
        - name_ja: "服従、回避、過剰補償"
        - description: "説明"
        - behavioral_examples: "JSON配列"

    04_modes:
      description: "スキーマモード定義"
      columns:
        - id: "PK"
        - code: "vulnerable_child, angry_child, etc."
        - name_ja: "傷つきやすいチャイルド"
        - category: "child, maladaptive_coping, maladaptive_parent, healthy"
        - description: "説明"

    # === トランザクションデータ（蓄積用） ===

    05_clients:
      description: "クライアント（匿名化）"
      columns:
        - id: "PK, UUID"
        - created_at: "timestamp"
        - pseudonym: "仮名（研究用識別子）"
        - demographic_json: "年代、性別等（任意）"
        - notes: "備考"

    06_assessment_series:
      description: "10回セッションの1サイクル"
      columns:
        - id: "PK"
        - client_id: "FK → clients"
        - started_at: "開始日"
        - completed_at: "完了日（null許容）"
        - status: "in_progress, completed, abandoned"
        - overall_confidence: "総合信頼度 0-1"

    07_sessions:
      description: "個別セッション記録"
      columns:
        - id: "PK"
        - series_id: "FK → assessment_series"
        - session_number: "1-10"
        - phase: "rapport, history, relationship, emotion, integration"
        - date: "実施日"
        - duration_minutes: "実時間"
        - transcript_json: "対話記録（発話配列）"
        - safety_flags: "危機検出フラグ"
        - notes: "セッションメモ"

    08_schema_scores:
      description: "セッションごとのスキーマスコア"
      columns:
        - id: "PK"
        - session_id: "FK → sessions"
        - schema_id: "FK → schemas"
        - score: "0-6"
        - confidence: "0-1"
        - evidence_json: "検出根拠"

    09_coping_assessments:
      description: "セッションごとのコーピング評価"
      columns:
        - id: "PK"
        - session_id: "FK → sessions"
        - coping_style_id: "FK → coping_styles"
        - intensity: "強度 0-6"
        - evidence_json: "検出根拠"

    10_mode_observations:
      description: "セッション中のモード観察"
      columns:
        - id: "PK"
        - session_id: "FK → sessions"
        - mode_id: "FK → modes"
        - activation_level: "活性化度 0-6"
        - trigger_context: "トリガーとなった文脈"
        - timestamp_in_session: "セッション内タイミング"

    11_final_profiles:
      description: "10セッション完了後の統合プロファイル"
      columns:
        - id: "PK"
        - series_id: "FK → assessment_series"
        - generated_at: "生成日時"
        - schema_profile_json: "18スキーマの最終スコア"
        - coping_profile_json: "3スタイルの最終スコア"
        - mode_profile_json: "モードプロファイル"
        - clinical_notes: "臨床的所見"
        - recommendations: "推奨事項"

  relationships:
    - "clients 1:N assessment_series"
    - "assessment_series 1:N sessions"
    - "sessions 1:N schema_scores"
    - "sessions 1:N coping_assessments"
    - "sessions 1:N mode_observations"
    - "assessment_series 1:1 final_profiles"

  indexing_priorities:
    - "schema_scores(session_id, schema_id)"
    - "sessions(series_id, session_number)"
    - "assessment_series(client_id, status)"

