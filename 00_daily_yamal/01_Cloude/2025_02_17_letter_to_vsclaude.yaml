# ==========================================
# 1. Ko-fi開設報告
# ==========================================
kofi_launch:
  status: "開設完了"
  url: "https://ko-fi.com/yujiyamauchi"  # ※ユーザー名変更した場合は差し替え
  purpose:
    primary: "小遣い稼ぎ（国際的な支援受付）"
    secondary: "SoE応援団（国際的支持基盤）の拡大"
  language: "英語オンリー"
  categories:
    - "Advice"
    - "Education"
    - "Community"
    - "Science & Tech"
    - "Writing"
  bio: >
    What if welfare systems meant to empower people are actually a form of
    "social window dressing"?

    After 15+ years in disability employment support in Japan, I'm building
    SoE (Service of Empowerment) — an AI framework that applies the logic
    of financial auditing to human rights, treating agency as a real asset
    that can be measured, eroded, or restored. Making structural
    disempowerment visible and accountable.

  new_concepts_introduced:
    - term: "Social Window Dressing（社会の粉飾決算）"
      description: "福祉制度が実質的にケイパビリティを毀損しながら表面的にはエンパワメントを装う構造"
    - term: "Double-Entry Bookkeeping for Human Rights（権利の複式簿記化）"
      description: "Agency（主体性）をBS上の資産として扱い、構造的毀損をPLの損失として計上するフレーム"
    - term: "Financial Auditing logic applied to human rights"
      description: "Bio採用版。複式簿記をより広い読者向けに言い換えた表現"

  strategic_context: >
    エプスタイン事件の可視化が進む中、構造的搾取への関心が高まっている時勢を
    追い風として活用。ただしセンセーショナリズムは避け、ケイパビリティアプローチ
    視点から「機会の毀損の不可視性」を問題提起する方針。

