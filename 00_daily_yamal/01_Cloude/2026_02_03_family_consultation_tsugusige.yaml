# ============================================================
clinical_hypotheses:
  primary_question: >
    甥Aの「女性になりたい」は本来的な性別不合（Gender Incongruence）か、
    愛着障害・喪失反応・アイデンティティ拡散の表出か

  hypothesis_1_gender_incongruence:
    description: "本来的な性別不合が甥Bの死をきっかけに覚悟して打ち明けた"
    supporting_factors:
      - "長年抱えてきた可能性は排除できない"
      - "35歳での告白は「ようやく言えた」という解釈も可能"
    weakening_factors:
      - "思春期からの持続的性別違和の情報がない"
      - "20歳時のジャニーズ願望との構造的類似"

  hypothesis_2_attachment_identity_diffusion:
    description: "愛着障害に起因するアイデンティティ拡散の再燃"
    supporting_factors:
      - "20歳でジャニーズ、35歳で性別移行：『別の誰かになりたい』の反復パターン"
      - "兄・甥BがBPD：同一養育環境からの同型表出の可能性"
      - "甥Bの死（一昨年）：唯一の同性ロールモデル喪失"
      - "FtM従兄弟と仕事開始（一昨年から）：時期の重なり、新たな同一化対象"
      - "双子WをSIDSで喪失：『残った方』としての養育"
      - "父Eの完全不在：安定した男性像の欠如"
      - "奥さんも愛着障害傾向（Puuの見立て）：不安定な愛着同士のカップリング"
      - "18歳の引きこもり：アイデンティティ確立期の困難"
    bpd_spectrum_consideration: >
      BPDの中核症状である同一性障害（identity disturbance）として読める。
      ただしBPD診断基準の機械的適用ではなく、
      背後の愛着の質を見ることが重要。
    aai_classification: >
      成人愛着面接（AAI）の「未解決型（Unresolved）」の可能性。
      甥Bの死が未解決の喪失として処理しきれていない状態。
      未解決型は解離やアイデンティティ混乱と最も強く関連。

  hypothesis_3_combined:
    description: "器質的素因と環境因の複合"
    notes: >
      性別不合と愛着障害は排他的ではない。
      両方が存在する可能性もあり、その場合でも
      縁（環境因）の解きほぐしは必要。

