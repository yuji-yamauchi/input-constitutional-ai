      note: "愛着トラウマが重度の場合、アイデンティティの断片化として表出"

  adult_attachment_interview:
    framework: "Main & Goldwyn AAI分類"
    types:
      - "安定型（Secure-Autonomous）"
      - "とらわれ型（Preoccupied）"
      - "愛着軽視型（Dismissing）"
