# ============================================================
# 精神科医療への批判的視点
# ============================================================
psychiatric_critique:
  buddhist_metaphor: >
    精神科・心療内科は本来「因縁をときほぐす」役割を担うべき。
    しかし実態は「因の特定→薬物療法」に偏り、
    縁（なぜこの人のこの時期にこの症状が出たか）の
    丁寧な解きほぐしは構造的に省かれやすい。
  gender_clinic_structural_limit: >
    ジェンダークリニックも「性別不合かどうか」という因の鑑別には長けるが、
    その訴えがどんな縁の中から生まれてきたかをほぐす機能は
    診療の枠組み自体に組み込まれていない。
  puus_practice_as_alternative: >
    Puuの現場実践（ペルソナ仮説・2週間アセスメント・生活史の立体的読解）は、
    精神科が本来やるべき「縁のときほぐし」を
    福祉の現場で独自に実装してきたもの。
  soe_connection: >
    「支援とは何か」「搾取と紙一重の善意とは何か」という
    SoEの根本的問いと、甥Bへの対応歴が直結している。

# ============================================================
# 対応方針
# ============================================================
action_plan:
  current_stage: "本人からの相談待ち"
  principle: >
    本人から来ていない段階で動きすぎない。
    「周りが勝手に問題視して介入してくる」構造を避ける。
    バイスティックの原則：非審判的態度の維持。
  completed:
    - "母への伝達：適正な診断環境の重要性"
  if_contact_comes:
    dual_track_approach:
      track_1: "ジェンダークリニック（性別不合の鑑別）"
      track_2: "愛着・トラウマに強い精神科医または心理士（背景分析）"
    rationale: >
      中塚先生のところは「性別不合かどうか」の鑑別には最高の環境だが、
      「なぜ今この訴えが出てきたのか」の背景分析は別のラインが要る。
    confirmation_needed:
      - "どこでホルモン投与を受けているか"
      - "精神科診断を受けているか"
      - "奥さん・子どもたちの状況"
      - "本人の生活史詳細"
      - "FtM従兄弟との関係性の具体的内容"
  puus_unique_asset: >
    家系全体の因縁構造を把握しているのはPuuのみ。
    ジェンダークリニックにも一般精神科にもこの情報は集まらない。
    甥Bの対応歴、20歳時のジャニーズ願望、奥さんの愛着傾向、
    家系の器質的遺伝パターン等、すべてを統合して見れる唯一の存在。
  self_care_reminder: >
    Puuにとっても軽い作業ではない。
    「俺は俺じゃないの」という自身の原体験に触れる領域。
    抱え込み防止の意識が必要。

# ============================================================
# セッション中の重要な洞察
# ============================================================
key_insights:
  - topic: "因縁とエピジェネティクス"
    insight: >
      器質的遺伝（因）とACEs等の環境遺伝（縁）の関係が
      仏教的な因縁の構造と一致する。
      因だけ見れば「性別不合」と診断して終わり。
      縁まで見れば「なぜ今、この形で出てきたのか」が問える。

  - topic: "アイデンティティ拡散の反復パターン"
    insight: >
      20歳のジャニーズ願望と35歳の性別移行は、
      表面の内容は異なるが構造は同一：
      「今の自分ではない別の誰かになりたい」。
      外部モデルへの同一化によるアイデンティティ補完の試み。

  - topic: "同一化対象の変遷"
    insight: >
      甥B（唯一の男性ロールモデル）喪失後、
      FtM従兄弟が新たな同一化対象として出現。
      同一化のメカニズムは同じで、対象が変わっただけの可能性。

  - topic: "生者が死者の影を背負う家系構造"
    insight: >
      Puuは「長兄Cの生まれ変わり」、
      甥Aは「双子Wの残った方」、
      そして甥Bの死後のアイデンティティ空白。
      この家系に繰り返される構造。

  - topic: "必要とも不要とも言い切れない情報の価値"
    insight: >
      甥Bの対応歴は、ジェンダークリニック的には「不要」と判断されうるが、
      アセスメントの解像度を根本的に変える情報。
      Puuのペルソナ仮説アプローチでは「捨てないし、決めつけもしない」
      仮説材料として保持する。

