refined_architecture:
  
  core_principle: "当事者 vs それ以外"
  
  layer_A:
    name: "当事者"
    position: "データの主権者"
    rights:
      - "自分のデータを所有"
      - "アクセス権を付与/剥奪"
      - "削除・移行の決定権"
    db_concept: "全てのデータの帰属先"
    
  layer_B:
    name: "それ以外（代理者群）"
    position: "当事者から委任を受けた存在"
    includes:
      - "支援者"
      - "評価者"  
      - "制度・社会"
    common_feature: "当事者の許可がなければデータにアクセスできない"
    db_concept: "アクセス権限を持つビューワー"

structural_insight: |
  支援者も評価者も社会も、
  本質的には「当事者のために働く代理者」。
  
  違いは：
  - 距離感（直接支援 vs 間接評価 vs マクロ分析）
  - 許可されるデータの粒度（個別 vs 匿名集計）
  
  でも根本は同じ：
  「当事者から許可を得てデータに触れる」

quasi_mandate_contract_mapping:
  当事者: "委任者（本人）"
  それ以外: "受任者（善管注意義務を負う）"
  
  boundary: "許可/同意（consent）"

db_design_simplified:

  central_table:
    name: "clients（当事者）"
    role: "全データの帰属点"
    owns:
      - "プロフィール"
      - "支援記録"
      - "評価結果"
      - "アウトカム"
    
  access_table:
    name: "access_grants（アクセス許可）"
    role: "誰が何を見れるかの定義"
    columns:
      - "client_id: 当事者"
      - "grantee_id: 許可された人"
      - "grantee_role: supporter / evaluator / researcher"
      - "scope: どこまで見れるか"
      - "granted_at: いつから"
      - "revoked_at: いつまで（null=有効）"

  implication: |
    「それ以外」は細かくロール分けしても、
    DB上は「access_grants」で一元管理できる。
    
    支援者か評価者かは「role」カラムの値の違いだけ。

soe_as_measurement:
  what_this_enables: |
    「当事者のデータを、誰が、いつ、どの範囲で見たか」
    が全て記録される。
    
    これ自体が「支援の透明性」の測定装置になる。

next_question:
  q: "「それ以外」の中での権限の違いは、最初のPoCでどこまで作り込む？"
  
  options:
    minimal: "supporter のみ（評価者は後で）"
    moderate: "supporter + evaluator"
    full: "全ロール実装"
  
  my_suggestion: "minimal（支援者のみ）で十分"

access_hierarchy:
  
  owner:
    name: "当事者（本人）"
    data_access: "全て"
    anonymization: "不要（自分のデータ）"
    consent_required: false
    
  tier_1_direct_contract:
    name: "直接契約関係（就労支援事業所等）"
    relationship: "準委任契約の当事者"
    examples:
      - "就労移行支援事業所"
      - "就労継続支援A型/B型"
      - "相談支援事業所"
    data_access: "契約範囲内で詳細データ"
    anonymization: "不要（ただし範囲限定）"
    consent:
      type: "primary_opt_in"
      granularity: "項目別選択可"
      examples:
        - "基本情報: ✓"
        - "健康情報: ✓"
        - "家族構成: ✗"
        - "経済状況: ✓"
    
  tier_2_secondary_share:
    name: "契約経由の二次共有先"
    relationship: "直接契約者を通じた間接関係"
    examples:
      - "市区町村障害福祉課"
      - "ハローワーク"
      - "医療機関"
      - "他の支援機関（連携先）"
    data_access: "一次契約者が共有許諾した範囲のみ"
    anonymization: "部分的（必要最小限）"
    consent:
      type: "secondary_opt_in"
      condition: "一次契約のオプトインが前提"
      granularity: "共有先ごとに選択"
      examples:
        - "行政機関への共有: ✓"
        - "医療機関への共有: ✓"
        - "他支援機関への共有: ✗"
    
  tier_3_employer:
    name: "就職先企業"
    relationship: "支援の成果先（雇用契約）"
    examples:
      - "就職先企業の人事部"
      - "就職先の産業医"
      - "職場の上司（限定的）"
    data_access: "就労に必要な範囲のみ"
    anonymization: "高度（診断名等は選択的開示）"
    consent:
      type: "employer_opt_in"
      granularity: "非常に細かい"
      examples:
        - "配慮事項の共有: ✓"
        - "診断名の開示: ✗"
        - "通院頻度の共有: ✓"
        - "支援機関との連携許可: ✓"
    note: "本人が『何を開示するか』を完全にコントロール"
    
  tier_4_macro:
    name: "社会分析（マクロデータ）"
    relationship: "研究・政策立案目的"
    examples:
      - "厚労省の統計調査"
      - "学術研究"
      - "制度評価"
    data_access: "匿名化された集計データのみ"
    anonymization: "完全（k-匿名性等）"
    consent:
      type: "research_opt_in"
      granularity: "参加/不参加"
      examples:
        - "匿名統計への貢献: ✓"
        - "学術研究への提供: ✗"

db_design_for_consent:

  table_consent_categories:
    description: "同意カテゴリのマスタ"
    columns:
      - "id"
      - "tier: 1-4"
      - "code: direct_contract, secondary_share, employer, macro"
      - "name_ja: 表示名"
      - "description: 説明文"
      - "anonymization_level: none, partial, high, full"
      
  table_consent_items:
    description: "同意項目のマスタ（何を共有するか）"
    columns:
      - "id"
      - "category_id: FK"
      - "code: basic_info, health_info, family_info, etc."
      - "name_ja: 基本情報、健康情報、等"
      - "sensitivity_level: low, medium, high, critical"
      - "requires_explicit_consent: boolean"

  table_client_consents:
    description: "当事者ごとの同意状態"
    columns:
      - "id"
      - "client_id: 当事者"
      - "consent_item_id: 何について"
      - "grantee_type: tier (1-4)"
      - "grantee_id: 具体的な共有先（組織/個人）"
      - "granted: boolean"
      - "granted_at: timestamp"
      - "revoked_at: timestamp (null=有効)"
      - "granted_via: 同意取得方法（書面/アプリ/口頭）"
      
  table_data_access_log:
    description: "誰がいつ何を見たか"
    columns:
      - "id"
      - "client_id: 誰のデータを"
      - "accessor_id: 誰が"
      - "accessor_tier: どのレイヤーの人が"
      - "accessed_at: いつ"
      - "data_scope: 何を見たか"
      - "purpose: 目的"
    note: "透明性の測定装置"

anonymization_levels:

  level_0_none:
    tier: "1（直接契約）"
    method: "生データ（許可範囲内）"
    example: "山田太郎、35歳、統合失調症"
    
  level_1_partial:
    tier: "2（二次共有）"
    method: "部分マスキング"
    example: "山田T、30代、精神障害"
    
  level_2_high:
    tier: "3（就職先）"
    method: "本人選択的開示"
    example: "配慮事項：静かな環境、定期通院あり"
    
  level_3_full:
    tier: "4（マクロ）"
    method: "完全匿名化・集計"
    example: "30代男性、精神障害、就職率データに1件としてカウント"

soe_measurement_insight: |
  この同意構造自体が「本人主権の測定装置」になる。
  
  測定できること：
  - 当事者が実際にどの範囲で同意しているか
  - 同意なしのアクセスが発生していないか
  - 同意の撤回がどれくらい起きているか
  - 各tierでのデータ利用頻度
  
  「善意に依存しない」構造的保証。

poc_scope_question:
  q: "最初のPoCでは、どのtierまで実装する？"
  
  suggestion:
    phase_1: "tier_1（直接契約）のみ"
    reason: "当事者 ↔ 支援者 の基本構造を先に確立"
    
    phase_2: "tier_3（就職先）追加"
    reason: "就労支援の出口として重要"
    
    phase_3: "tier_2, tier_4"
    reason: "連携・研究は後から"

guardian_complexity:
  
  why_complex: |
    監護者・家族は「当事者のため」に行動するが、
    当事者本人ではない。
    
    本人主権との緊張が生じうる。

  types:
    legal_guardian:
      name: "法定代理人"
      examples:
        - "成年後見人"
        - "保佐人"
        - "補助人"
        - "未成年の親権者"
      authority: "法的に定義された代理権限"
      
    family_supporter:
      name: "家族（法的権限なし）"
      examples:
        - "同居の親"
        - "配偶者"
        - "きょうだい"
      authority: "法的権限はないが実質的影響力あり"
      
    informal_guardian:
      name: "事実上の監護者"
      examples:
        - "グループホームの世話人"
        - "長年の支援者"
      authority: "慣習的・信頼関係ベース"

soe_dilemma:
  
  tension_point: |
    「本人主権」を掲げるSoEにおいて、
    監護者は：
    
    A) 本人の意思を代弁・補助する存在？
    B) 本人の意思と対立しうる存在？
    C) 両方ありうる？
    
  real_scenarios:
    scenario_1:
      situation: "本人は就職したいが、家族は反対"
      question: "誰の意思を優先？"
      
    scenario_2:
      situation: "本人は情報開示を拒否、後見人は開示を求める"
      question: "誰の同意が有効？"
      
    scenario_3:
      situation: "本人の判断能力が変動する"
      question: "いつ、誰が、どう判断？"

positioning_options:

  option_a:
    name: "当事者レイヤーに含める"
    logic: "本人の意思を補完する存在として"
    risk: "本人主権が曖昧になる"
    
  option_b:
    name: "tier_0.5 として独立"
    logic: "当事者と直接契約の間の特別な位置"
    structure:
      - "tier_0: 当事者本人"
      - "tier_0.5: 監護者・家族"
      - "tier_1: 直接契約関係"
      - "..."
    merit: "特殊性を明示できる"
    
  option_c:
    name: "tier_1の一種として扱う"
    logic: "家族も『本人と契約関係を持つ者』として抽象化"
    risk: "家族と支援事業所を同列に扱う違和感"

my_suggestion:
  approach: "option_b（tier_0.5 として独立）"
  
  rationale: |
    監護者は「当事者の延長」でも「外部支援者」でもない。
    独自のレイヤーとして明示することで：
    
    1. 本人主権との関係を構造的に可視化できる
    2. 同意の優先順位を明確にできる
    3. 「本人 vs 監護者」の対立時の処理ルールを定義できる

consent_logic_with_guardian:

  principle: "本人意思の最大尊重"
  
  cases:
    
    case_1_full_capacity:
      condition: "本人に判断能力あり"
      rule: "本人の同意が全て"
      guardian_role: "参考意見・サポート"
      
    case_2_supported_decision:
      condition: "本人に部分的支援が必要"
      rule: "本人の意思 + 監護者の補助"
      guardian_role: "意思決定支援"
      note: "意思決定支援ガイドライン準拠"
      
    case_3_substituted_decision:
      condition: "本人の意思表明が困難"
      rule: "監護者が代理、ただし本人の推定意思を尊重"
      guardian_role: "代理決定（最小限）"
      safeguard: "本人の過去の意思・価値観を参照"

db_design_addition:

  table_guardians:
    description: "監護者・家族の登録"
    columns:
      - "id"
      - "client_id: 当事者"
      - "user_id: 監護者のユーザーID"
      - "relationship: parent, spouse, sibling, legal_guardian, etc."
