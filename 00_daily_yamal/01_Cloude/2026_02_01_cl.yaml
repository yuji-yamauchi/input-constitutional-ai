# SoE PoC 引継ぎファイル
# 作成日: 2026-02-01
# セッション: アクター構造・同意階層の設計

session_summary:
  topic: "SoEのアクター構造と同意（オプトイン）階層の設計"
  outcome: "6層のtier構造と同意マトリクスの確定"
  status: "設計完了・DB実装前"

# ============================================
# 確定したアクター構造（6層）
# ============================================

actor_tiers:
  
  tier_0:
    name: "当事者（本人）"
    role: "データ主権者・契約の委任者"
    consent: "不要（自己のデータ）"
    anonymization: "なし"

  tier_0_5:
    name: "監護者・家族"
    subtypes:
      - "法定代理人（後見人・保佐人・補助人）"
      - "家族（法的権限なし）"
      - "事実上の監護者（GH世話人等）"
    key_issue: "本人主権との緊張関係"
    db_tables:
      - "guardians"
      - "guardian_consents"
      - "consent_conflicts（本人vs監護者の対立記録）"

  tier_1:
    name: "直接契約関係（準委任契約）"
    examples:
      - "就労移行支援事業所"
      - "就労継続支援A型/B型"
      - "相談支援事業所"
      - "グループホーム"
    consent: "primary_opt_in（項目別選択可）"
    anonymization: "なし（範囲限定）"

  tier_2:
    name: "契約経由の二次共有先"
    subtypes:
      tier_2a_government:
        name: "行政機関"
        detail:
          - "基礎自治体（市区町村）: 障害福祉課等"
          - "広域自治体（都道府県）: 更生相談所等"
          - "国の機関: ハローワーク、障害者職業センター"
        note: "細分化は将来実装、PoCでは一括でOK"
      tier_2b_medical:
        name: "医療機関"
        examples: "主治医、産業医"
      tier_2c_other_support:
        name: "他支援機関"
        examples: "地域定着支援、発達障害者支援センター"
    consent: "secondary_opt_in（共有先ごと）"
    anonymization: "部分的"

  tier_3:
    name: "就職先"
    subtypes:
      - "人事部"
      - "産業医・産業保健スタッフ"
      - "直属上司（限定的）"
    consent: "employer_opt_in（非常に細かい項目別）"
    anonymization: "高度（本人が完全コントロール）"
    tool: "就労パスポート"

  tier_4:
    name: "社会分析（マクロデータ）"
    subtypes:
      - "研究機関（学術研究）"
      - "政策立案（行政統計）"
      - "共有財管理者（PHR基盤構想）"
    consent: "research_opt_in（参加/不参加）"
    anonymization: "完全（k-匿名性等）"

# ============================================
# 同意（オプトイン）の原則
# ============================================

consent_principles:
  
  core_rule: |
    各tierごとに別々のオプトインが必要。
    上位tierへの同意が下位tierへの同意を含意しない。
  
  per_tier_consent:
    tier_1: "契約時に項目別選択"
    tier_2: "共有先ごとに別途同意"
    tier_3: "就職時に細かく選択（診断名開示等）"
    tier_4: "研究参加の可否"

  anonymization_levels:
    level_0_none: "tier_1（生データ、範囲内）"
    level_1_partial: "tier_2（部分マスキング）"
    level_2_high: "tier_3（本人選択的開示）"
    level_3_full: "tier_4（完全匿名化・集計）"

# ============================================
# DB設計の方向性（未実装）
# ============================================

db_design_direction:
  
  core_tables:
    clients: "当事者（全データの帰属点）"
    guardians: "監護者・家族"
    organizations: "支援機関・企業等"
    users: "システム利用者（支援者等）"
    
  consent_tables:
    consent_categories: "同意カテゴリマスタ（tier別）"
    consent_items: "同意項目マスタ（何を共有するか）"
    client_consents: "当事者ごとの同意状態"
    guardian_consents: "監護者経由の代理同意"
    consent_conflicts: "本人vs監護者の意思対立記録"
    
  access_control:
    access_grants: "誰が何を見れるか"
    data_access_log: "誰がいつ何を見たか（透明性測定）"

  soe_measurement: |
    同意構造自体が「本人主権の測定装置」になる。
    - 同意の分布
    - 同意なしアクセスの有無
    - 同意撤回の頻度
    - 本人vs監護者の対立パターン

# ============================================
# PoC実装フェーズ
# ============================================

poc_phases:
  
  phase_1:
    scope: "tier_0 + tier_1"
    actors: "当事者 + 支援者（直接契約）"
    goal: "基本構造の確立"
    
  phase_2:
    add: "tier_0.5 + tier_3"
    actors: "監護者 + 就職先"
    goal: "就労支援の入口と出口"
    
  phase_3:
    add: "tier_2"
    actors: "行政・医療・他支援機関"
    goal: "連携機能"
    
  phase_4:
    add: "tier_4"
    actors: "研究・政策"
    goal: "マクロデータ接続"

