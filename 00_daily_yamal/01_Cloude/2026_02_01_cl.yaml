      - "resolution: client_priority, guardian_priority, mediated"
      - "resolution_rationale"
      - "resolved_at"
    note: "SoEの『測定装置』として極めて重要"

soe_measurement_value: |
  「本人 vs 監護者」の対立記録は、
  制度が本人主権をどこまで実現できているかの
  直接的な測定データになる。
  
  これこそが「簿外債務の可視化」。

