          準委任契約は「善管注意義務を負うが結果は保証しない」構造。
          「誓う」はそれを超え、結果保証はできないが意思の持続を宣言する。
          契約ではなく誓約。
      SoE_alignment: >
        SoEの根幹思想と直接対応。
        支援における「障害があるから支援する」（所与依存）vs
