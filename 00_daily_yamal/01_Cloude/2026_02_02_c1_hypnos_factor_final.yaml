# Part 5: 基本的人権 = 資本主義のOS
# ============================================================

rights_as_os:
  
  puu: >
    「格差は許容されるべきなのよね。資本主義だし。
    ただ基本的人権というお題目をお題目としてしまったら
    全て成り立たなくなるぞ」
  
  causal_chain:
    - "資本主義は契約を必要とする"
    - "契約の有効性は当事者の対等性を必要とする"
    - "対等性の最低保証 = 基本的人権"
    - "人権がお題目化 → 契約崩壊 → 市場崩壊 → 資本主義停止"
    
  thesis: >
    基本的人権 ≠ 弱者保護の道徳的装飾
    基本的人権 = 資本主義の動作要件（OSレベルのインフラ）
    OSは不要と言いながらアプリを動かそうとするようなもの
  
  libertarian_reframing: >
    「自由の制限」ではなく「自由の動作条件の維持」
    全政治的立場から受容可能なフレーミング
  
  applications:
    epstein: "16歳ひとり親少女 vs 億万長者 = 契約的対等性ゼロ = 資本主義OS破壊"
    welfare: "事業者 vs 自尊感情10%ile = 準委任契約対等性ゼロ = 署名は服従の記録"
  
  research_formulation: >
    「基本的人権の実効性 = 資本主義の耐震性。
    お題目化したとき、法治・市場・契約は確率論的に崩壊。
    Anomie/Hypnos Factor = 耐震性が閾値以下で発現する構造的現象。」

