# ============================================================
# Part 2: ヒュノプス因子の概念定義
# ============================================================

hypnos_factor:
  
  naming:
    origin: "ギリシャ神話ヒュプノス（眠りの神）"
    rationale: "法治的感性が眠る現象。Anomie Factor（無敵の人因子）の対概念"
    
  definition: >
    権利・資源の偏重が一定閾値を超えたとき、
    法治的感性・道徳認知回路が構造的に停止する現象。
    個人の道徳的欠陥ではなく、権利非対称性が閾値超過時に
    確率論的に発現する構造的認知変容。
    
  what_it_puts_to_sleep:
    - "法治的感性（法の下の平等への内的コミットメント）"
    - "道徳認知回路（相手を同じ人間と認識する回路）"
    - "制度的免疫（組織の自浄作用・内部告発機能）"
    - "人間認識回路（「娘と同年齢の少女＝同じ人間」認識）"
    
  properties:
    structural_not_moral: "善い人にも起きる認知変容"
    threshold_dependent: "閾値以下では発現しない・超えると確率論的に発現"
    scale_invariant: "福祉ミクロ搾取もエプスタインマクロ搾取も同一因子"
    affects_institutions: "MIT・司法・メディアなど制度全体が眠る"
    persists_despite_family: "娘がいても発現する"

  dual_framework:
    anomie_factor:
      direction: "底辺 → 社会破壊"
      trigger: "権利の絶対的欠如"
    hypnos_factor:
      direction: "頂点 → 他者の資源化"
      trigger: "権利・資源の過度な偏重"
    shared: "同一メカニズムの両極表現"

