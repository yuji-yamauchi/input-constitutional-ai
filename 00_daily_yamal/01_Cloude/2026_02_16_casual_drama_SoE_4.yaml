      「特別だから選ぶ」と「特別にするために誓う」の対比は、
      SoEの支援哲学を親密圏に拡張する際の鍵概念。
      「選ぶ」の消費的構造から「誓う」の不可逆的コミットメントへの
      補正は、準委任契約を超える「誓約」の射程を示唆する。

  - label: "優生思想の能動的否定"
    content: >
      無意識のデフォルトが優生思想寄りである以上、
      否定は能動的・意識的行為として継続的に必要

  - label: "表象と構造の乖離"
    content: >
      ドラマのキャスティングが構造的問題を中和する機能を持つことの批判的認識

  - label: "Input CAIの親密圏適用可能性"
    content: >
      事後的治療ではなく事前の環境側リスク検知としてのInput Constitutional AIは、
      親密圏における搾取予防にも原理的に適用可能である可能性

  - label: "就労＝手段、家族＝目的"
    content: >
      当事者の本質的ニーズは就労ではなく存在の基盤構築（パートナー・家族）。
      現行制度は手段を目的化しており、ICFの参加レベルに届いていない。

  - label: "愚行権＋リカバリー環境"
    content: >
      健常者も障害者も愚行権の行使の中で家族を形成している。
      差異はリカバリー環境の有無。SoEは愚行権行使の環境と
      リカバリー環境の双方を測定すべき。

  - label: "問いのリフレーミング：生殖権"
    content: >
      「不妊治療を否定すべきか」→「肯定するために何が環境として必要か」。
      障害者にだけ条件を課せば差別。全ての親に共通する問い。

  - label: "研究者の実存と理論の不可分性"
    content: >
      Yujiの海綿状血管腫＋ADHD、妻の癲癇、「産むな」という善意の優生思想。
      三人の子供を持つ選択が「特別にするために誓う」の実践であり、
      SoEの射程を親密圏に拡張する必然性の実存的根拠となっている。

