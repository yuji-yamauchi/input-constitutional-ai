      - item: "役員報酬月150万円の社保会社負担は年230万円超→法定福利費168万円と整合しない"
      - item: "営業権1000万円（のれん）→実質純資産は300万円程度に目減りする可能性"
      - item: "消費税の未払計上が貸借対照表から確認できない"
      - item: "弁当売上4278万円に対し原価率約43%（飲食業標準30〜35%より高い）"
      - item: "定員15名（A型最低定員20名との乖離）"
