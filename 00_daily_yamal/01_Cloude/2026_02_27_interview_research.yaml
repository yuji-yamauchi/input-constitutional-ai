      - item: "HPなし・送迎なし（2023年4月福山市資料より）"

    structural_hypothesis: >
      2020年コロナ禍に飲食業の打撃を受けた藤井剛がコンサルに唆されA型事業所を開設。
      初年度は特定求職者雇用開発助成金（特困金）＋労働局補助でウハウハ。
      助成金終了後に赤字転落。有限会社たんとの飲食事業と一体化した構造で、
      利用者が弁当製造労働力として機能している可能性。
      社保コスト回避のため週20時間未満設定の疑い（平均就労4〜5時間/日）。
      役員報酬は計上するが実払いできず役員借入金として処理している可能性。
      グループ合算では更に大きな赤字の可能性。

    cfo_assessment: >
      M&A対象として見た場合、営業権と国保連指定番号以外に価値なし。
      デューデリジェンスで社保・消費税・法人間取引を指定で指摘される案件。
      経営継続可能性に疑問。来期も同規模損失なら債務超過転落リスク。

