overview:
  summary: >
    就労継続支援A型・B型事業所のサービス管理責任者（サビ管）求人を対象に
    3社の面接・事前調査を実施。各法人の財務・構造・経営実態を多角的に分析。
    Puuの裏目標「日本の就労継続支援施設を10年後に0にする」の文脈における
    フィールドワークとして位置づける。

interview_1:
  company: "でじるみ岡山駅前"
  formal_name: "就労継続支援B型事業所 エンターテインメントアカデミー でじるみ岡山駅前"
  location: "岡山市北区駅元町22-13 西口駅前ビル2階"
  open_schedule: "2026年05月01日オープン予定"
  service_type: "就労継続支援B型"
  interview_time: "11:00〜12:30（約90分）"
  interviewers:
    - "オーナー"
    - "倉敷事業所 管理者兼サビ管"

  fc_structure:
    fc_honbu: "株式会社グローバルソリューション"
    honbu_profile: "投資ポートフォリオコンサル系企業。ISO 27001:2022認証取得（IS 743010）"
    royalty: "5%"
    fc_operator_kurashiki: "株式会社リガレックス（東京都台東区根岸3-25-6、代表：青山貞凡、設立2015/10/05）"
    rigarekkusu_note: "wamnet掲載あり・HP URL空欄。ペーパー的運営法人の可能性"
    fc_operator_okayama_ekimae: "不明（別法人の可能性あり）"

  site_observation:
    note: "面接前に現地確認。でじるみ岡山駅前の看板設置済み。右側にインターネットカフェの看板あり"
    hypothesis: "ネカフェ居抜き転用・ネカフェオーナーがFC加盟した可能性"

  wamnet_status: "未掲載（指定申請前または申請中の可能性）"

  concept:
    tagline: "好きを仕事に"
    focus: "イラスト・動画編集・グラフィックデザイン等クリエイティブ系"
    puu_assessment: "デジタルという蒔絵を巻いた従来型B型。コンセプトの衣であり支援の質変化なし"

  structural_analysis:
    fc_exploitation_model: >
      FC本部がロイヤリティ収益を得ながら、加盟オーナーに利用者集客・人材採用コストを転嫁。
      サビ管は専門職として全責任を負うが経営意思決定に関与できない。
      準委任契約の本来の意味が空洞化した構造。
    job_outsourcing: "FC本部がサビ管も外注している構造。専門性と裁量が切り離されている"
    fc_work_order: "FC本部が加盟店に制作案件を発注している可能性→仕事の蛇口も本部が支配"

  notable_conversation:
    kurashiki_sabikan_exchange:
      topic: "採用アセスメント手法・入浴支援事例"
      puu_method: >
        支援員のペルソナを父性・母性・兄性・姉性・弟性・妹性で仮定し
        必要な役割を考える。採用時に子育て経験確認。
        「1週間以上風呂に入らない当事者にどう支援するか」を面接質問として使用
      exchange: >
        倉敷サビ管から逆質問「ではあなたならどうしますか？」→
        Puuが男男の場合を例示で聞かれ、
        「メリットを感じないから入らないのか・デメリットを感じるから入らないのか・
        そもそも風呂に入れる環境なのかをアセスメントする」と回答→
        倉敷サビ管（。'-')(。,_,)ｳﾝｳﾝ

  condition:
    salary_estimate: "サビ管のみ月30万円程度なら検討余地あり"
    next_step: "条件提示待ち（先方も複数面接中）"

  puu_self_disclosure:
    - "大学院受験目指していることを伝達"
    - "複数社面接中であることを伝達"
    - "扱いにくい人材であることを事前に伝達"
    - "障害の定義が変わっていることを説明（伝わらなかった）"

