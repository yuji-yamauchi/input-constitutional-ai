  phase_3_structural_analysis:
    description: "アノミー因子とヒュノプス因子の対称構造の整理"
    symmetry:
      anomie_factor:
        direction: "下方逸脱"
        mechanism: "失うものがない → 法に服す動機がない"
        destruction: "社会的破壊が「下」から起きる"
        example: "無敵の人（西村博之命名のスラング）"
      hypnos_factor:
        direction: "上方逸脱"
        mechanism: "富が法を超える → 法に服す必要がない"
        destruction: "社会的破壊が「上」から起きる"
        example: "エプスタイン（68訴因→司法取引で消滅）"
    naming_rationale:
      hypnos: "ギリシャ神話の眠りの神"
      double_meaning:
        - "過剰な富が道徳的・法的感覚を『眠らせる』"
        - "社会全体がその異常を『眠ったまま』見過ごす"

  phase_4_paradigm_shift:
    title: "倫理から公衆衛生へ"
    robeyns_limitation:
      problem: "リミタリアニズムは規範的主張（べき論）"
      vulnerability: "リバタリアンには通じない：「なぜお前が俺の財産権に口を出すのか」"
    puu_transformation:
      insight: "富の偏重は現象であり、根本は権利の偏重"
      mechanism: "権利の偏重 → 合意済み社会基盤の脆弱化 → アノミー/ヒュノプスが繁殖"
      approach: "公衆衛生学的アプローチでリミタリアニズムを展開"
      key_shift: "normative（べき論）→ descriptive/predictive（である論・確率論）"

  phase_5_core_declaration:
    puu_statement: >
      俺は一貫して真理や預言を発していない。
      あくまで法治民主自由化学資本主義において
      合意した社会基盤が毀損し社会インフラが脆弱になる確率の話しかしてない
    significance: >
      この一文がヒュノプス因子の定義の核。
      これがなければ「道徳的リミタリアニズムの亜種」で片付けられる。
      これがあるから理論的に独立した位置を取れる。

  phase_6_robeyns_contact:
    idea: "Robeynsに直接メールを送るタイミングかもしれない"
    timing_rationale:
