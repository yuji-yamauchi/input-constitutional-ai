    note_for_robeyns: >
      Susanには現場言語が通じた。
      Robeynsは哲学者なので、最初の3行で
      「これは哲学的に新しい問いである」と認識させる必要あり。

# ==========================================
# 理論的構造（今夜の到達点）
# ==========================================
theoretical_structure:

  public_health_limitarianism:
    original_robeyns: "富の過剰は道徳的に正当化できない（規範的キャップ）"
    puu_version: "権利の偏重は合意済み社会基盤の耐久性を確率的に低下させる（記述的命題）"
    
    analogy:
      robeyns: "地震は悪だ（道徳的判断）"
      puu: "この建物の耐震強度は不足している（工学的記述）"
    
    advantage: >
      公衆衛生は相手の道徳的同意を必要としない。
      感染症対策に「ウイルスは倫理的に悪い」という合意は不要。
      「この条件下でウイルスが繁殖し社会基盤を脅かす」という疫学的事実があれば介入の正当性が成立。

  causal_chain:
    step_1: "権利の偏重（rights concentration）"
    step_2: "合意済み社会基盤（法治・契約・相互信頼）の脆弱化"
    step_3: "アノミー因子（下方）とヒュノプス因子（上方）の繁殖"
    step_4: "社会インフラの確率的崩壊"

  soe_integration:
    role: "社会の免疫系 / 疫学的サーベイランス装置"
    mechanism: >
      福祉サービスという具体的フィールドにおける
      アノミー因子・ヒュノプス因子のモニタリング。
      個別の支援がEmpowermentかExploitationかを測定することは、
      そのまま「この環境でどちらの因子が繁殖しているか」の検出になる。

  libertarian_response:
    ineffective: "富を制限すべき（リバタリアンは拒否）"
    effective: >
      権利の過度な偏重は、あなた自身が依拠する
      契約社会・法治社会の基盤を確率的に脆弱化させる。
      リバタリアン自身も法治と契約の有効性を前提にしている。

# ==========================================
# 批判的検討（Claude側から提起）
# ==========================================
critical_notes:

  public_health_danger:
    risk: >
      「社会の病理」を公衆衛生的に語ることは、
      優生思想やパターナリズムに転化した歴史的前例がある
      （ナチス社会衛生学、米国強制不妊手術、旧優生保護法）
    mitigation: >
      公衆衛生の対象を個人ではなく環境・構造に限定する設計。
      「この人がアノミー因子を持っている」ではなく
      「この環境がアノミー因子を生産している」
      ——ICFの環境因子モデルと一致。
    status: "博士論文レベルで理論的防御が必要"

  epstein_as_evidence:
    value: >
      2007年の68訴因→司法取引は、
      富による法治の無効化を文書で実証した歴史的データ。
      2026年1月のDOJ文書公開（350万ページ）により
      実証材料が爆発的に増加。
    timeliness: "この時事性は数ヶ月後には薄れる"

