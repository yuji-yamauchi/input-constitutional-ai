## ============================================================
## URLリストのフォーマット仕様
## ============================================================

url_list_format:
  file_extension: ".txt"
  encoding: "UTF-8"
  separator: "TAB (\\t)"
  columns:
    - name: "id_or_label"
      description: "arxiv ID（例: 2212.08073）またはラベル（例: scholar）"
      required: true
    - name: "url"
      description: "PDFの直接ダウンロードURL"
      required: true
    - name: "title"
      description: "論文タイトル（ファイル名に使用される）"
      required: true

  examples:
    arxiv: "2212.08073\thttps://arxiv.org/pdf/2212.08073\tConstitutional AI: Harmlessness from AI Feedback"
    scholar: "scholar\thttps://proceedings.neurips.cc/paper_files/paper/2022/file/xxxxx.pdf\tTraining LMs to follow instructions"
    other: "doi_10.1234\thttps://example.com/paper.pdf\tPaper Title Here"

  naming_convention:
    arxiv: "{arxiv_id}_{sanitized_title}.pdf"
    scholar: "extra_{sanitized_title}.pdf"
    other: "{id_or_label}_{sanitized_title}.pdf"

  notes:
    - "URLはPDFへの直リンクであること（HTMLページではなく）"
    - "arxiv.orgの場合: https://arxiv.org/pdf/XXXX.XXXXX（末尾に.pdfなくてもOK）"
    - "タイトル中の特殊文字（: / \\ ? * \" < > |）は自動的に除去される"
    - "ファイル名は最大100文字に切り詰められる"

## ============================================================
## URL収集時の注意事項
## ============================================================

url_collection_guidelines:
  preferred_sources:
    - domain: "arxiv.org"
      url_pattern: "https://arxiv.org/pdf/{id}"
      reliability: "最も安定。直リンクで確実にPDFが取得できる"
    - domain: "proceedings.neurips.cc"
      url_pattern: "https://proceedings.neurips.cc/paper_files/paper/{year}/file/{hash}-Paper.pdf"
      reliability: "安定。直リンク"
    - domain: "proceedings.mlr.press"
      url_pattern: "http://proceedings.mlr.press/v{vol}/{author}{year}a/{author}{year}a.pdf"
      reliability: "安定"
    - domain: "openreview.net"
      url_pattern: "https://openreview.net/pdf?id={id}"
      reliability: "概ね安定だがESETに誤検知される場合あり"

  avoid:
    - "HTMLページへのリンク（PDFではなくランディングページ）"
    - "認証が必要なURL（IEEE Xplore有料論文など）"
    - "リダイレクトが多段のURL（ai-plans.comなどミラーサイト）"
    - "Google Scholar/Semantic ScholarのキャッシュURL"

  eset_antivirus_note: |
    ユーザー環境にESET Internet Securityが稼働中。
    Pythonのurllib経由ダウンロード時に一部PDFが
    「PDF/Phishing.A.Gen」として誤検知・削除される場合がある。
    openreview.net等の一部ドメインで発生確認済み。
    → arxiv.orgのURLを優先的に使用することで回避可能。

