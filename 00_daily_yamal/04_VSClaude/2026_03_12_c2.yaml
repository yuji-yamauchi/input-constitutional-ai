fire_culture_note: |
  「正解のない問をどうアウトプットするか」の比較実験。
  4つのAIが同じ問いに異なる価値判断を返した。
  これは「AIの憲法が違う」ことの実証データであり、
  Input Constitutional AIの核心 —
  「記録段階で何を重視するかが権利保障を規定する」
  — を、AI自身の振る舞いで示した。

  Puuの結論は4AIのどれでもなく、
  「情報は開示して意思決定は委ねる。俺の意志も明示する」。
  SoEの実践者としていつも通りの回答。
  ただし「いつも通り」が本当にいつも通りかを
  検証するためにAI4台を回した — という構造自体が、
  SoEの自己言及パラドックスの新たな層を追加している。
