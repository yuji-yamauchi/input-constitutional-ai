      - "GitHub リポジトリ公開範囲の決定（01〜09フォルダ）"
      - "Google Analytics等のアクセス解析導入"

  # =================== セッションパターン ===================
  session_patterns:

    claude_code_strengths:
      - "ファイル作成・編集が直接的（コピペ不要）"
      - "ディレクトリ構造の一括管理"
      - "Git連携がシームレス"
      - "インフラ情報の即座な調査（nslookup等）"

    collaboration_dynamics:
      puu: "方向性決定・デザイン判断・画像素材提供・インフラ操作"
      claude_code: "コード生成・CSS調整・ワークフロー作成・手順説明"
      gemini: "画像生成（ロゴ・ヒーロービジュアル）"
      pattern: "三者協働による効率的プロダクション"

    context_limit_issue:
      description: "画像の蓄積によりClaude Codeのコンテキストが上限に達し、セッション終盤でエラー発生"
      error: "An image in the conversation exceeds the dimension limit for many-image requests (2000px)"
      impact: "GitHub承認作業とcommit/pushが未完了"
      lesson: "画像が多いセッションではコンテキスト消費に注意が必要"

