  # =================== ディレクトリ構成 ===================
  directory_structure:
    root: "13_d-rel-website/"
    children:
      "00_html/":
        - "index.html（メインサイトファイル）"
      "01_docs/":
        - "（空 — SoE論文PDF等を後で追加）"
      "02_images/":
        - "hero_visual.png（初期版 — 後にGemini新画像に差替え）"
        - "soe_framework.png"
        - "hypnos_factor.png"
        - "soe_concept_map.png（予備）"
        - "YouTubeチャンネルカードデザイン.png"
        - "Gemini_Generated_Image_fcm0s6fcm0s6fcm0.png（Ko-fi）"
        - "Gemini_Generated_Image_wv39wewv39wewv39.png（MENTA）"
        - "Gemini_Generated_Image_f81c0zf81c0zf81c.png（GitHub）"
        - "Gemini_Generated_Image_1gj9f91gj9f91gj9.png（d-relロゴ）"
        - "Gemini_Generated_Image_y66zdky66zdky66z.png（ヒーロービジュアル最終版）"

  # =================== DNS・インフラ設定 ===================
  infrastructure_setup:

    dns_configuration:
      step_1:
        action: "Aレコード追加"
        where: "お名前.com Navi DNS設定"
        nameservers: "01.dnsv.jp 〜 04.dnsv.jp（お名前.com DNS）"
        record:
          type: "A"
          host: "d-rel.jp"
          value: "[REDACTED]"
        result: "http://d-rel.jp でサイト表示成功"

      step_2:
        action: "ネームサーバーをRSプランに切り替え"
        reason: "無料SSL（Let's Encrypt）にはRS指定ネームサーバーが必要"
        new_nameservers:
          - "ns-rs1.gmoserver.jp"
          - "ns-rs2.gmoserver.jp"

      step_3:
        action: "Microsoft 365 DNSレコードをRS側に再登録"
        records:
          - type: "MX"
            value: "drel-jp0c.mail.protection.outlook.com"
            priority: 0
          - type: "CNAME"
            host: "autodiscover"
            value: "autodiscover.outlook.com"
          - type: "TXT"
            value: "MS=ms67042428"
          - type: "TXT"
            value: "v=spf1 include:spf.protection.outlook.com ~all"
        result: "メール送受信確認OK（Microsoft 365正常動作）"

    ssl:
      status: "未完了 — ネームサーバー反映待ち"
      method: "お名前.com RS 無料SSL（Let's Encrypt）"
      next_action: "NS反映後に再申し込み（翌日以降）"

    github_actions:
      workflow_file: ".github/workflows/deploy-website.yml"
      trigger: "push to main（13_d-rel-website/ 配下の変更時）"
      action: "FTP-Deploy-Action v4.3.5"
      secrets:
        FTP_PASSWORD: "登録済み（GitHub Repository Secrets）"
      deployment:
        html: "00_html/ → /d-rel.jp/"
        images: "02_images/ → /d-rel.jp/images/02_images/"

  # =================== デザイン変遷 ===================
  design_evolution:
    phase_1:
      name: "初期版（ダークテーマ）"
      background: "#0a0a0a（真っ黒）"
      font_jp: "Noto Sans JP"
      accent: "#4a9eff（青）"

    phase_2:
      name: "暖色系変更"
      background: "#faf6f1（クリーム）"
      font_jp: "BIZ UDGothic（UD書体）"
      accent: "#c46a3a（テラコッタ）"
      trigger: "Puuのリクエスト — 柔らかい暖色系 + ユニバーサルフォント"

    phase_3:
      name: "最終版（赤み強め暖色）"
      background: "#f8ede0"
      hero: "Geminiロゴ+ヒーロー統合画像"
      trigger: "ロゴ・ヒーロー画像統合 + 背景色の赤み調整"

  # =================== Gemini連携 ===================
  gemini_collaboration:
    images_generated:
      1_logo:
        prompt_summary: "d-relロゴタイプ、横長バナー、PNG透過、テラコッタ+ダークブラウン、構造線モチーフ"
        output: "Gemini_Generated_Image_1gj9f91gj9f91gj9.png"

      2_hero_visual:
        prompt_summary: "ヒーローセクション用キービジュアル、'Specifications can be rewritten'、暖色系構造線、ロゴと統一トーン"
        output: "Gemini_Generated_Image_y66zdky66zdky66z.png"

    existing_images_reused:
      - "Ko-fi: コーヒー＆研究ノート画像"
      - "MENTA: ノートPC＆メンタリング画像"
      - "GitHub: 鍵付き本＆封蝋（Ko-fi Members Only）"
      - "YouTube: チャンネルカードデザイン（ダークブルー）"

  # =================== 学びと発見 ===================
  learnings:

    puu_first_hp_experience:
      motivation: "LLMを使えばHP作成が簡単にできるという体験"
      outcome: "構想→実装→公開→インフラ設定を1日で完了"
      key_insight: "HTML/CSS/JSの知識がなくてもLLMとの協働で実用サイトが作れる"

    technical_discoveries:
      - "CSS Variables（:root）でサイト全体のテーマを一元管理できる"
      - "BIZ UDGothicはGoogleFontsで無料利用可能なUD書体"
      - "GitHub ActionsでFTP自動デプロイが可能"
      - "ネームサーバー変更時はMXレコード再登録が必要（メール途絶防止）"
      - "お名前.com RS無料SSLはRS指定ネームサーバーが前提条件"

    platform_limitations:
      ko_fi: "APIは限定的、投稿自動化は困難"
      note: "公式APIなし、手動投稿のみ"
      menta: "APIなし、手動のみ"
      youtube: "YouTube Data APIで動画情報更新は可能"
      conclusion: "d-rel.jpをハブとし、各プラットフォームへは手動投稿が現実的"

    design_decision:
      github_link: "リポジトリ直リンクは個人情報リスクあり → プロフィールページのみ"
      location_removal: "岡山県笠岡市在住 → 削除（プライバシー保護）"
      about_position: "Communityの下に移動（活動情報を先に見せる構成）"

  # =================== 未完了タスク ===================
  pending_tasks:

    immediate:
      - task: "SSL証明書申し込み"
        status: "NS反映待ち（翌日以降に再試行）"
        condition: "ネームサーバーがns-rs1/ns-rs2に完全反映後"

      - task: "Git commit & push"
        status: "セッション終了時にClaude Codeがコンテキスト上限に達し未実行"
        content: "13_d-rel-website/ + .github/workflows/"

    short_term:
      - "ヒーロー画像のバランス最終調整"
      - "01_docs/ にSoE論文PDF等を追加"
      - "コンテンツ充実（各セクションのテキスト精緻化）"
      - "OGP画像設定（SNSシェア時のサムネイル）"
      - "favicon設定"
      - "Ko-fi「Start sharing!」完了（別アカウントでアクセス）"

    medium_term:
