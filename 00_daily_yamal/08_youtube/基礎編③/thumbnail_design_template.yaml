# ============================================
# YouTube研修動画 サムネイルデザイン テンプレート
# ============================================
# 用途: Gemini / ChatGPT / Canva AI / 画像生成AI へのプロンプト
# シリーズ: d-rel.jp 障害福祉 研修動画シリーズ

template:
  series_name:"障害福祉サービス　研修動画シリーズ"
  source: "NotebookLM Audio Overview"
  channel_brand: "d-rel.jp"

  # ------------------------------------------
  # 画像仕様
  # ------------------------------------------
  image_spec:
    size: "1280x720px（YouTube推奨）"
    format: "PNG or JPG"
    safe_zone: "テキストは左右80px・上下60px内側に収める（モバイル対応）"

  # ------------------------------------------
  # レイアウト構成（統一ルール）
  # ------------------------------------------
  layout:
    structure: "左右分割 or 中央集中"
    elements:
      - name: "シリーズ帯"
        position: "上部"
        content: "障害福祉 研修シリーズ"
        style: "小さめ・控えめ・白文字 or 薄色"

      - name: "メインタイトル"
        position: "中央〜左寄せ"
        style: "太字・大文字・最大3行・視認性最優先"
        font: "ゴシック体（Noto Sans JP Bold 推奨）"
        max_chars_per_line: 10

      - name: "キーワード吹き出し"
        position: "右下 or 左下"
        style: "1〜2個の重要キーワードをバッジ風に配置"
        purpose: "スクロール中に目を引くフック"

      - name: "ナンバリング"
        position: "左上 or 右上"
        style: "Vol.01 / Vol.02 形式"
        purpose: "シリーズものであることを視覚的に示す"

      - name: "ブランドロゴ"
        position: "右下隅"
        content: "d-rel.jp"
        style: "小さく控えめ・白 or グレー"

  # ------------------------------------------
  # カラーパレット（統一）
  # ------------------------------------------
  color_palette:
    # 暖色系（推奨・メイン）
    warm:
      background_base: "#F5E6D3（クリーム・ベージュ）"
      accent_primary: "#E07A5F（コーラル）— 注目・転換"
      accent_secondary: "#C0724A（テラコッタ）— 温かみ・歴史"
      text_primary: "#3D2B1F（ダークブラウン）"
      text_sub: "#8B7D6B（ウォームグレー）"
      keyword_badge: "#81B29A（セージグリーン）— ポジティブな変化"
      numbering: "#C0724A（テラコッタ）"
    # 寒色系（サブ・法制度テーマ向け）
    cool:
      background_base: "#1A2A44（ダークネイビー）"
      accent_primary: "#2E86DE（ブルー）— 信頼・制度"
      text_primary: "#FFFFFF（白）"
      text_sub: "#BDC3C7（ライトグレー）"
      keyword_badge: "#27AE60（グリーン）"

  # ------------------------------------------
  # デザイン原則
  # ------------------------------------------
  design_principles:
    - "文字は最大3行、画面の1/3程度に抑える（余白を活かす）"
    - "暖色系ベースで親しみやすさを優先"
    - "丸ゴシック体で柔らかい印象に（硬いゴシックは避ける）"
    - "イラスト・アイコンは最小限（ごちゃつかせない）"
    - "毎回同じレイアウト構造で統一感を出す"
    - "カラーアクセントで各回のテーマを差別化"
    - "人物写真は使わない（NotebookLM生成のため）"
    - "余白を多めに取り、ゆったりした印象を出す"
    - "福祉の現場の人が手に取りやすい柔らかさを意識"

  # ------------------------------------------
  # 背景パターン（各回共通の選択肢）
  # ------------------------------------------
  background_options:
    - "ダークネイビー単色 + 薄いグラデーション"
    - "抽象的な幾何学模様（薄く）"
    - "テーマに関連するアイコンをウォーターマーク的に配置"

# ============================================
# 個別サムネイル指示
# ============================================

thumbnails:

  vol_01:
    number: "Vol.01"
    video_title: "障害制度の進化：個人の問題から社会の課題へ"
    thumbnail_spec:
      main_title:
        line_1: "障害は"
        line_2: "どこにある？"
      accent_color: "#2E86DE（ブルー）"
      keyword_badges:
        - "医学モデル → 社会モデル"
      background_icon: "矢印（転換を示す）"
      tone: "問いかけ — 視聴者の常識を揺さぶる"

    prompt_for_ai: |
      YouTube動画のサムネイル画像を作成してください。

      【サイズ】1280x720px
      【背景】ダークネイビー(#1A2A44)にブルー(#2E86DE)のグラデーション
      【レイアウト】
      - 左上: 「Vol.01」小さく白文字
      - 上部帯: 「障害福祉 研修シリーズ」小さく薄いグレー文字
      - 中央: メインテキスト「障害は\nどこにある？」
        太字ゴシック体、白、大きく目立つように
      - 右下: キーワードバッジ「医学モデル → 社会モデル」
        グリーン(#27AE60)背景の角丸バッジ
      - 右下隅: 「d-rel.jp」小さく白文字
      【スタイル】プロフェッショナル、クリーン、教育的。
      イラストや人物写真は不要。テキストベースのデザイン。

  vol_02:
    number: "Vol.02"
    video_title: "保護から権利へ：日本の障害者法150年の大転換"
    thumbnail_spec:
      main_title:
        line_1: "150年の"
        line_2: "大転換"
      accent_color: "#F39C12（オレンジ）"
      keyword_badges:
        - "措置 → 契約 → 権利"
      background_icon: "年表風の矢印 or タイムライン"
      tone: "歴史のスケール感 — 150年という重みを伝える"

    prompt_for_ai: |
      YouTube動画のサムネイル画像を作成してください。

      【サイズ】1280x720px
      【背景】暖色系グラデーション。
      ベース: 温かみのあるベージュ〜クリーム(#F5E6D3)
      アクセント: 柔らかいテラコッタ(#C0724A)〜コーラル(#E07A5F)
      全体的に柔らかく親しみやすい雰囲気。
      【レイアウト】
      - 左上: 「Vol.02」小さく、テラコッタ色、丸みのある囲み
      - 上部: 「障害福祉 研修シリーズ」小さく控えめ、ダークブラウン文字
      - 中央やや左: メインテキスト
        「保護から権利へ」中サイズ、ダークブラウン(#3D2B1F)
        「150年の大転換」やや大きめ、「大転換」だけコーラル(#E07A5F)
        文字サイズは画面の1/3程度に抑え、余白を活かす
        丸ゴシック体（Rounded Mplus 1c Bold 推奨）
      - 右下: キーワード「措置 → 契約 → 権利」
        柔らかいグリーン(#81B29A)背景の角丸バッジ
      - 右下隅: 「d-rel.jp」小さくグレー
      【スタイル】
      - 温かく親しみやすい。硬い印象を避ける
      - 福祉の現場の人が手に取りやすい柔らかさ
      - 余白を多めに取り、ゆったりしたレイアウト
      - イラストや人物写真は不要。テキストベースだが温かみのある配色で
      - 背景に淡い幾何学模様やドット柄をうっすら入れてもOK

