# ==========================================
# 補足: Anthropicスキルガイドの研究的示唆
# ==========================================

research_implications:
  description: |
    Anthropicスキルガイドは、SoEプロジェクトのスキル化に直接活用可能。
    特にNotebookLMスクリプト生成やSoE整合性チェックを
    SKILL.md形式でパッケージ化することで再利用性が向上する。

  potential_skills:
    - name: "soe-evidence-review"
      purpose: "メソッド別エビデンスレビューの自動生成"
      trigger: "ユーザーが特定の介入手法のエビデンスを求めた時"
    - name: "notebooklm-script-generator"
      purpose: "NotebookLM用教育スクリプトの自動生成"
      trigger: "ユーザーがNotebookLM用台本を作成したい時"
    - name: "soe-consistency-checker"
      purpose: "SoE理論構造の整合性チェック"
      trigger: "新しい概念追加時のハレーション検知"

  loop_feature_note: |
    Claude Code v1.0.33（2026-03-07）で /loop コマンドが追加。
    定期実行によるSoE整合性監視やYAML構造チェックの自動化に活用可能。

