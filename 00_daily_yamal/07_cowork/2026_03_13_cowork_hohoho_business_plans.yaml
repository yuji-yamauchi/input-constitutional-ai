# =====================================================================
# ナラティブ転換の理論的メモ
# =====================================================================
narrative_evolution:
  observation: |
    3バージョンの制作過程で、HOHOHOの本質的価値が段階的に明確化された。
    v1(OpenAI向け): インフラ×AI×データの技術訴求
    v2(行政・大学向け): 制度設計×責任構造×公共性の訴求
    v3(ポジティブ増幅): 市民の感情×ウェルビーイング×好循環の訴求
    最終的に「壊れているを見つける」→「愛されているを見つける」への転換は、
    HOHOHOの最も本質的な再定義となった。
  soe_parallel: |
    この転換は、SoE研究における「欠損モデル（何ができないか）」から
    「ケイパビリティモデル（何ができるか）」への転換と構造的に同型。
    HOHOHOのポジティブ増幅ナラティブは、都市インフラ版の
    ケイパビリティ・アプローチと位置づけ可能。
    ただし、この接続を論文で用いるには更なる理論的精緻化が必要。
