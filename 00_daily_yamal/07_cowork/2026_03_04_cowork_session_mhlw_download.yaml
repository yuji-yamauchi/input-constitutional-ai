# ==========================================
# エラー分析
# ==========================================

error_analysis:
  error_message: "RPC error -1: failed to ensure virtiofs mount: Plan9 mount failed: bad address"
  root_cause: |
    Cowork VMのVirtioFS/Plan9ファイルシステム共有レイヤーが
    アイドルまたは長時間稼働後にstaleになる既知バグ（Windows版）
  github_issues:
    - "https://github.com/anthropics/claude-code/issues/26554"
    - "https://github.com/anthropics/claude-code/issues/27576"
    - "https://github.com/anthropics/claude-code/issues/28890"
    - "https://github.com/anthropics/claude-code/issues/29587"
  workarounds:
    - "Claude Desktopを完全終了→再起動（タスクトレイから）"
    - "%APPDATA%\\Claude\\vm_bundles\\claudevm.bundle を削除して再ダウンロード強制"
    - "PowerShell管理者権限でHypervisorPlatformが有効か確認"
  assessment: |
    Coworkはまだベータ段階。長時間タスクや大量ファイル操作は
    VMリソース上限に達しやすい。Anthropic側の修正待ちの部分が大きい。

# ==========================================
# 再開時の手順
# ==========================================

resume_plan:
  step_1: "Claude Desktop再起動"
  step_2: "Coworkタブが表示されることを確認"
  step_3: "Chrome拡張の再接続確認"
  step_4: "00_URL_index.md を参照してダウンロード未完了の回を特定"
  step_5: "各回の資料ページを開き、PDFリンクを取得→ダウンロード"
  alternative: |
    VMが不安定な場合は、Pythonスクリプト（requests + BeautifulSoup）で
    ローカルから直接ダウンロードする方が確実。
    00_URL_index.md のURL一覧をスクリプトに食わせる形で対応可能。

# ==========================================
# 所感
# ==========================================

observations:
  cowork_strengths:
    - "Chrome拡張経由でのページアクセス・データ抽出は非常に優秀"
    - "フォルダ構造の自動作成・URL一覧のMarkdown生成もスムーズ"
    - "web_fetchでブロックされるドメインもChrome経由で突破可能"
    - "対話的にタスクを進められるUXは直感的"
  cowork_limitations:
    - "VM環境の安定性が不十分（VirtioFS/Plan9の既知バグ）"
    - "長時間タスク・大量ファイル操作でクラッシュしやすい"
    - "エラー復旧に完全再起動が必要（セッション状態が失われる）"
    - "ベータ段階のため本番業務への依存はリスクあり"
