  output:
    - file: 申請書類統合一覧_岡山市_完全版_20260302.xlsx
      sheets:
        - 書類一覧（50文書）
        - マスタ項目（33フィールド）
        - ファイル対応表（25件）

# ─────────────────────────────────────────
# Phase 4: 入力統合ブック（1st attempt）
# ─────────────────────────────────────────
phase4_input_workbook_v1:
  action: 1つのExcelで完結する入力統合ブック作成
  user_request: |
    入力シート1枚に入力すると他の添付資料が自動で埋まる仕組み
  user_choice:
    approach: 最小限から始める（法人・事業所・管理者/サビ管）
    sheet_count: 主要書類のみ（10枚程度）
  result: MergedCell エラーで失敗
  error: "AttributeError: 'MergedCell' object attribute 'value' is read-only"
  cause: merge_cells() を呼んだ後に値を書き込もうとした

# ─────────────────────────────────────────
# Phase 5: MergedCellエラー修正 → 完成（今回セッション）
# ─────────────────────────────────────────
phase5_fix_and_complete:
  action: スクリプト全面書き直し（値書込→merge の順序徹底）
  output:
    - file: 指定申請_入力統合ブック_岡山市B型_20260302.xlsx
      sheets: 12
      formulas: 62
      errors: 0  # recalc.py 検証済み
      structure:
        - ★入力シート（5セクション・ドロップダウン付き）
        - 様式第1号_指定申請書
        - 付表10-1_記載事項
        - 役員等名簿
        - 誓約書_別紙2
        - 経歴書_管理者
        - 経歴書_サビ管
        - 就任承諾書
        - 苦情解決措置_様式6
        - 設備一覧_様式2
        - 建築物協議_様式2-3
        - 社保確認票

# ─────────────────────────────────────────
# Phase 6: 書式保持版への方針転換（今回セッション）
# ─────────────────────────────────────────
phase6_format_preservation:
  trigger: |
    ユーザー指摘「行政書類はセルの大きさ違ってても突き返される」
  decision:
    before: openpyxl でゼロから書式を再現（→ 微妙にズレるリスク）
    after: 公式ファイルそのものをテンプレートとして使い、データセルだけ数式に差し替え
  approach:
    - 過去申請の公式 .xls ファイルを xlrd で読み込み
    - openpyxl で .xlsx に変換（書式・セル結合・列幅・行高を保持）
    - ★入力シートを先頭に配置
    - 数式リンクは Claude in Excel で直接セルを見ながら設定
  output:
    - file: 指定申請_様式統合ブック_岡山市B型_20260302.xlsx
      sheets: 31
      structure:
        - 1. ★入力シート（セル参照ガイド付き）
        - 2-31. 公式様式シート（18ファイル・30シート）
      included_forms:
        - 様式第1号（指定申請書）+ 記入例
        - 様式第1号別紙1
        - 付表10-1（就労継続支援記載事項）
        - 参考様式1（平面図）
        - 参考様式2（設備・備品等一覧表）
        - 参考様式2-2（消防法適用確認）
        - 参考様式3（経歴書）
        - 参考様式3-2（就任承諾書）
        - 参考様式4（実務経験証明書）
        - 参考様式5（実務経験見込証明書）
        - 参考様式6（苦情解決措置の概要）
        - 参考様式7（主たる対象者を特定する理由）
        - 参考様式8（関係機関との連携）
        - 参考様式12（原本証明）
        - 別紙2-1（勤務体制及び勤務形態一覧）
        - 別紙6（就労移行の状況）
        - 別紙8（利用予定者名簿）
        - 別紙9（目標工賃・工賃実績報告）

# ─────────────────────────────────────────
# 技術的な問題と対応
# ─────────────────────────────────────────
technical_issues:
  - issue: I/Oエラー（cowork配下へのフォルダコピー）
    resolution: ユーザーがチャットに直接アップロード

  - issue: .doc ファイルの読み取り不可（antiword/LibreOffice変換失敗）
    resolution: PDF変換版をユーザーがアップロード

  - issue: MergedCell write エラー
    resolution: 値書込→merge_cells の順序を徹底したスクリプト書き直し

  - issue: LibreOffice .xls→.xlsx 変換が VM 上で動作せず
    resolution: xlrd→openpyxl で Python のみで変換（書式保持）

  - issue: ファイル名が長すぎる（54-2 参考様式11-2...）
    resolution: 当該ファイルをスキップ

