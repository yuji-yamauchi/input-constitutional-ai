    screenshot_capture: "不安定（NotebookLMが重い、頻繁にタイムアウト）"
    audio_overview_generation: "未到達"
  conclusion: |
    NotebookLMはページが重く、Chrome拡張との相性が悪い。
    完全自動化は現時点で困難。手動運用が安定。
