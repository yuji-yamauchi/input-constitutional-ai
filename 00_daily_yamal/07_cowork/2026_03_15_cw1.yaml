fire_culture_note: |
  このセッションは、Puuの研究戦略の転換点となる議論だった。
  「海外アカデミアは目的ではなく、日本の就労継続支援の構造を変えるための武器調達先」
  という再定義により、研究・実践・マネタイズ・N氏との関係が一本の線に統合された。
  「絶対的不幸をなくす」が研究の根っこであり、目黒区事件が原体験。
  「視界の範囲が世界」が存在論的起点。
  言葉の精密化は未完だが、問いの火種は記録された。再燃可能。
