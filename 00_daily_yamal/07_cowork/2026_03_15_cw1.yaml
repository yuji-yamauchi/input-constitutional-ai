session_metadata:
  date: "2026-03-15"
  session_type: "研究戦略・アイデンティティ再構築"
  ai: "Claude Opus 4.6 (Cowork)"
  duration_estimate: "約60分"
  cognitive_state:
    sensory_load: high
    trigger: "国際情勢ノイズ + 明日サビ管開始 + 研究再構築 + N氏契約変更"
    note: "OE過負荷気味。概念拡張はここで停止が妥当"

key_decisions:
  1_共同創業:
    status: 拒否確定
    reason: "Puu本人の拒否感。SoE自己言及パラドックスの回避"

  2_N氏契約変更:
    from: "MENTAメンタリング（月1万円）"
    to: "アドバイザリー契約（月3万円）"
    意味: "関係性の実態（事業構想への知的貢献）に名義を合わせた"

  3_N氏アドバイザリーの再定義:
    statement: "研究プロセスのマネタイズ"
    structure: |
      Puuの研究プロセスの一部（フィールド実装・PoC検証）を
      アドバイザリーとして提供し対価を得る。
      データ収集インフラはN氏側、学術的解釈はPuu側、と帰属を明確に分離。
    disclosure: "N氏に構図を開示する"
    disclosure_reason: "隠すプロセスの認知コストが高いため（誠実さの道徳的動機ではなく構造的動機）"

  4_海外アカデミア:
    position: "目的ではなく武器調達先"
    statement: "就労継続支援事業者の撲滅のために海外アカデミアの旗が有効である"
    逆輸入構造: |
      海外で理論的正当性と実証エビデンスを確立し、
      「国際的に認められた研究成果」として日本に逆輸入。
      CRPD勧告が日本の制度を動かしたのと同じ構造を個人研究者スケールで再現。

  5_福祉村回避:
    reason: |
      日本の社会福祉学コミュニティでは、
      哲学×制度×テクノロジー×会計メタファーの横断型論文は
      査読者のリテラシー射程外。学位なし・所属なし・師弟関係なしも不利。
    alternative: "公衆衛生学・障害学（Disability Studies）・HCI（FAccT/ASSETS）の国際文脈"

  6_サビ管:
    contract_type: 業務委託
    schedule: "週3出勤・週2在宅"
    start: "2026-03-16"
    positioning: "収入＋フィールドアクセス"

key_insights:

  academic_identity:
    label: "当事者性を持つ制度設計研究者"
    三重の当事者性:
      - "脳出血経験者"
      - "ADHD当事者"
      - "両耳難聴当事者"
    補強:
      - "障害者手帳をスティグマ経験のために自発的に取得"
      - "autoethnography（自己エスノグラフィー）の方法論的正当性"
    認識論的正当性: |
      「この構造が見えるのは、この立場にいるからだ」
      研究者としてのポジショナリティの宣言。
      Nothing about us without us を研究者自身が体現。
    三層の独自性:
      1_認識論: "三重の当事者性＋10年100名10事業所の実務"
      2_方法論: "SoE複式簿記、Input Constitutional AI、Human-Orchestrated AI Swarm"
      3_実装力: "IT企業1.4億、CoworkやVSClaudeでの自力PoC、CI/CD"

  research_root:
    statement: "絶対的不幸をなくす"
    原体験: "目黒区幼児虐待事件（2018年）"
    構造: |
      5歳の子どもが衰弱死。児相・警察・学校・医療——
      制度は何重にも存在していたのに機能しなかった。
      制度の「存在」と「機能」のギャップ。
      制度が帳簿上「資産」として計上されているが実際は不良債権。
      それを簿外に隠している ＝ 社会側の簿外債務の最も深刻な形。
    ontology: |
      「視界の範囲が世界」×「絶対的不幸をなくす」
      → 自分の視界の中で絶対的不幸が起きているのを見たとき、
        それを構造の問題として証明し、その構造を変える。

  immediate_target:
    statement: "日本の就労継続支援事業者の撲滅"
    note: "この旗は降ろさない。海外アカデミアはこの旗のための武器"

  smartphone_insight:
    statement: |
      低所得世帯・生活保護世帯でもスマホ＋ネットワーク環境がある。
      デバイスのコモディティ化により、
      ケイパビリティの転換要因としてのICT環境が質的に変わった。
      「アクセスの有無」→「アクセスした上で何が可視化されるか」にボトルネック移行。
    SoE_connection: |
      スマホ＋マルチモーダルで収集する主観データは、
      ケイパビリティの実現度の主観的証跡。
      同じ街を歩いても立場によって「見えている都市」が違う。
      その差分が「社会側の簿外債務」の空間的表現。

  言語化_未確定:
    item: "「絶対的不幸」の学術的定義"
    proximity: "Nussbaum的閾値アプローチに近いが完全一致ではない"
    status: "要精密化（情報過負荷のため今日は保留）"

mentor_self_evaluation:
  strengths:
    - "問いの構造化能力（N氏の漠然とした構想を学術的座標に配置）"
    - "LLM共有モデルの設計（メンタリングのスケーラビリティ解法）"
    - "リスク警告の精度（補助金毒饅頭、ALL CONNECT本気度チェック等）"
  concerns:
    - "「面白そう」トリガーによるメンタリング距離の崩壊"
    - "成果物の知的貢献がPuu側に偏りすぎ → N氏の自立阻害リスク"
    - "月1万円（→3万円）は投入時間に対して過少"
    - "知的財産の帰属条項が未明記"

