# ============================================================
# アーキテクチャ設計
# ============================================================
architecture:
  normalization_layer:
    purpose: "4つのLLMの異なるYAML構造を共通スキーマに変換"
    handled_formats:
      - "rating: '高' (Claude形式)"
      - "level: '高' (ChatGPT/Gemini形式)"
      - "直接文字列 (フラット形式)"
    level_map:
      非常に高: 90
      高: 80
      やや高: 65
      中程度: 50
      やや低: 35
      低: 20

  mapping_layer:
    purpose: "Big Five + HPI → RPG Core Stats への加重平均変換"
    formulas:
      STR: "Ambition×0.6 + Conscientiousness×0.4"
      INT: "Openness×0.5 + Inquisitive×0.3 + Learning×0.2"
      MEN: "Neuroticism反転×0.5 + Adjustment×0.5"
      DEX: "Prudence×0.5 + Conscientiousness×0.3 + InterpersonalSensitivity×0.2"
      VIT: "Adjustment×0.4 + Conscientiousness×0.4 + Neuroticism反転×0.2"
      CHR: "Extraversion×0.4 + Agreeableness×0.3 + Sociability×0.3"
    design_principle: |
      加重平均の係数は恣意的であるが、完全に公開されている。
      Mappingタブで全計算式を当事者が検証可能。
      これがInput Constitutional AIの原理的立場。

  skill_generation:
    method: "HPI/BF上位スコアから自動でUR/SRスキルカード生成"
    top_skill: "UR（最高スコア特性）"
    second_skill: "SR（次点スコア特性）"

  environment_mapping:
    method: "employment_considerations → ICF環境因子への自動分類"
    facilitators: "strengths"
    barriers: "challenges / accommodations"

# ============================================================
# SoE理論との整合
# ============================================================
soe_alignment:
  input_constitutional_ai:
    implementation: "Mappingタブで変換ロジックを完全公開"
    principle: "ブラックボックスな評価は構造的搾取の温床"

  本人主権:
    implementation: "「このプロファイルデータの所有者はあなた自身です」表示"

  llm_as_gauge:
    implementation: "Cross-LLM Compareモードで同一人物のLLM間差異を可視化"
    insight: |
      同一人物に対するLLM間の評価差異は、
      LLMが「測定装置（gauge）」として持つ固有のバイアスを反映。
      差異自体がメタデータであり、複数観測の重ね合わせとして解釈すべき。

  grain_based_cognition:
    implementation: "特性にmacro/meso/microのgrain levelタグ付与"

  capability_approach:
    implementation: "Environmentタブの促進因子/阻害因子可視化"

# ============================================================
# 技術的課題と解決
# ============================================================
issues_and_fixes:
  1_jsx_browser_error:
    problem: "JSXファイルをブラウザで直接開けない（file:///プロトコルエラー）"
    cause: "JSXはReactのビルドツールが必要。ブラウザは生JSXを理解しない"
    fix: "React + Babel StandaloneをCDNから読み込むスタンドアロンHTML版を作成"

  2_cowork_file_path:
    problem: "computer:///sessions/... リンクがVM内パスのためWindows側で到達不能"
    learning: "Coworkの選択フォルダに保存してWindows側から直接開く方がユーザー体験が良い"

