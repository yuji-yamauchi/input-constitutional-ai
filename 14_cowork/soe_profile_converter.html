<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoE Profile Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0c0f1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// --- Level Normalization ---
const LEVEL_MAP = {
  "非常に高": 90, "極めて高": 90,
  "高": 80, "やや高": 65,
  "中程度": 50, "中": 50,
  "やや低": 35, "低": 20, "非常に低": 10,
};
const parseLevel = (v) => {
  if (typeof v === "number") return v;
  if (typeof v === "string") {
    for (const [k, n] of Object.entries(LEVEL_MAP)) {
      if (v.includes(k)) return n;
    }
  }
  return 50;
};

// --- Normalize Assessment → Common Schema ---
const normalize = (raw) => {
  const bf = raw.big_five || {};
  const getBF = (trait) => {
    const t = bf[trait];
    if (!t) return { value: 50, notes: "" };
    if (typeof t === "string") return { value: parseLevel(t), notes: bf.notes || "" };
    return { value: parseLevel(t.rating || t.level || t), notes: t.notes || "" };
  };
  const hpi = raw.hpi_proxy || {};
  const getHPI = (trait) => {
    const t = hpi[trait];
    if (!t) return { value: 50, notes: "" };
    if (typeof t === "string") return { value: parseLevel(t), notes: "" };
    return { value: parseLevel(t.rating || t.level || t), notes: t.notes || "" };
  };
  const mbti = raw.mbti || {};
  const emp = raw.employment_considerations_ja || {};
  return {
    meta: raw.meta || {},
    bigFive: {
      openness: getBF("openness"), conscientiousness: getBF("conscientiousness"),
      extraversion: getBF("extraversion"), agreeableness: getBF("agreeableness"),
      neuroticism: getBF("neuroticism"),
    },
    hpi: {
      adjustment: getHPI("adjustment"), ambition: getHPI("ambition"),
      sociability: getHPI("sociability"), interpersonal_sensitivity: getHPI("interpersonal_sensitivity"),
      prudence: getHPI("prudence"), inquisitive: getHPI("inquisitive"),
      learning_approach: getHPI("learning_approach"),
    },
    mbti: { type: mbti.estimated_type || "N/A", confidence: mbti.confidence_level || mbti.confidence || "N/A", notes: mbti.notes || "" },
    employment: {
      strengths: Array.isArray(emp.strengths) ? emp.strengths : [],
      challenges: emp.challenges || emp.accommodations || [],
      optimal_roles: emp.optimal_roles || emp.recommended_work_environments || [],
    },
  };
};

// --- Map → SoE Profile ---
const toSoEProfile = (norm, personName, source) => {
  const bf = norm.bigFive;
  const hpi = norm.hpi;
  const stats = {
    STR: { value: Math.round(hpi.ambition.value * 0.6 + bf.conscientiousness.value * 0.4), label: "実行力", desc: "Ambition(" + hpi.ambition.value + ") × Conscientiousness(" + bf.conscientiousness.value + ")", sources: ["HPI:Ambition", "BF:Conscientiousness"] },
    INT: { value: Math.round(bf.openness.value * 0.5 + hpi.inquisitive.value * 0.3 + hpi.learning_approach.value * 0.2), label: "分析力", desc: "Openness(" + bf.openness.value + ") × Inquisitive(" + hpi.inquisitive.value + ")", sources: ["BF:Openness", "HPI:Inquisitive", "HPI:Learning"] },
    MEN: { value: Math.round((100 - bf.neuroticism.value) * 0.5 + hpi.adjustment.value * 0.5), label: "精神耐久", desc: "Neuroticism反転(" + (100 - bf.neuroticism.value) + ") × Adjustment(" + hpi.adjustment.value + ")", sources: ["BF:Neuroticism(inv)", "HPI:Adjustment"] },
    DEX: { value: Math.round(hpi.prudence.value * 0.5 + bf.conscientiousness.value * 0.3 + hpi.interpersonal_sensitivity.value * 0.2), label: "器用さ", desc: "Prudence(" + hpi.prudence.value + ") × Conscientiousness(" + bf.conscientiousness.value + ")", sources: ["HPI:Prudence", "BF:Conscientiousness", "HPI:InterpSens"] },
    VIT: { value: Math.round(hpi.adjustment.value * 0.4 + bf.conscientiousness.value * 0.4 + (100 - bf.neuroticism.value) * 0.2), label: "持続力", desc: "Adjustment(" + hpi.adjustment.value + ") × Conscientiousness(" + bf.conscientiousness.value + ")", sources: ["HPI:Adjustment", "BF:Conscientiousness"] },
    CHR: { value: Math.round(bf.extraversion.value * 0.4 + bf.agreeableness.value * 0.3 + hpi.sociability.value * 0.3), label: "対人力", desc: "Extraversion(" + bf.extraversion.value + ") × Agreeableness(" + bf.agreeableness.value + ")", sources: ["BF:Extraversion", "BF:Agreeableness", "HPI:Sociability"] },
  };
  const allTraitScores = [
    { name: "探究者", score: hpi.inquisitive.value, rarity: "UR", desc: "未知の構造を発見し体系化する", mechanism: "Inquisitive + Learning の連動", buff: "知的刺激のある環境で覚醒", debuff: "反復作業で急速に消耗" },
    { name: "構造化思考", score: bf.openness.value, rarity: "SR", desc: "複雑な情報を枠組みに変換する", mechanism: "Openness + Conscientiousness の相乗", buff: "抽象概念を扱う場面で最大発揮", debuff: "具体的手順の説明で停滞" },
    { name: "対人共鳴", score: Math.round((bf.agreeableness.value + hpi.interpersonal_sensitivity.value) / 2), rarity: "SR", desc: "他者の構造的状況を理解する", mechanism: "Agreeableness + InterpersonalSensitivity", buff: "1対1の信頼関係で深い理解", debuff: "大集団で情報過多に" },
    { name: "推進力", score: hpi.ambition.value, rarity: "SR", desc: "目標に向かって長期的に前進する", mechanism: "Ambition + Adjustment の基盤", buff: "価値観と一致する目標で覚醒", debuff: "意味を感じない業務で急減" },
  ];
  allTraitScores.sort((a, b) => b.score - a.score);
  const skills = {
    ur: { ...allTraitScores[0], rarity: "UR" },
    sr: { ...allTraitScores[1], rarity: "SR" },
  };
  const traits = [
    { name: "開放性", icon: "\u2728", buff: bf.openness.notes || "新しい概念への探究心が強い", debuff: "拡散的になり収束が遅れることがある", grainLevel: "macro", value: bf.openness.value },
    { name: "誠実性", icon: "\uD83D\uDCCB", buff: bf.conscientiousness.notes || "計画・構造化能力が高い", debuff: "柔軟性が犠牲になることがある", grainLevel: "meso", value: bf.conscientiousness.value },
    { name: "外向性", icon: "\uD83D\uDDE3\uFE0F", buff: bf.extraversion.notes || "対話を通じてエネルギーを得る", debuff: "静寂を必要とする時間も重要", grainLevel: "meso", value: bf.extraversion.value },
    { name: "協調性", icon: "\uD83E\uDD1D", buff: bf.agreeableness.notes || "他者への配慮と共感性", debuff: "論理的整合性と調和のバランス", grainLevel: "micro", value: bf.agreeableness.value },
    { name: "情動性", icon: "\uD83D\uDD25", buff: bf.neuroticism.notes || "感受性の高さが洞察を生む", debuff: "ストレス環境での消耗が大きい", grainLevel: "micro", value: bf.neuroticism.value },
  ];
  const emp = norm.employment;
  const environment = {
    facilitators: emp.strengths.map(s => typeof s === "string" ? s : s.title || s.description || "").slice(0, 6),
    barriers: (emp.challenges || []).map(c => typeof c === "string" ? c : c.title || c.description || "").slice(0, 6),
  };
  const avgStat = Math.round(Object.values(stats).reduce((s, v) => s + v.value, 0) / 6);
  return { name: personName, title: norm.mbti.type, level: Math.round(avgStat * 0.5 + 10), source, generatedFrom: (norm.meta.assessor || norm.meta.generator || source) + " Assessment", lastUpdated: norm.meta.date || "N/A", stats, skills, traits, environment, mbti: norm.mbti, bigFive: norm.bigFive, hpi: norm.hpi };
};

// ============================================================
// Raw Assessment Data

  employment_considerations_ja: { strengths: ["複雑な情報の構造化・要約能力", "高い論理的思考力と客観的視点", "言語化能力の高さ"], challenges: ["曖昧な指示よりも明確な目的が必要", "ルーチンワークより知的刺激のある業務"] },
};

const ALL_PROFILES = [
  { id: "puu_claude", label: "Puu (Claude)", person: "Puu", raw: RAW_CLAUDE_PUU, source: "Claude Opus 4.5" },
  { id: "puu_gpt", label: "Puu (ChatGPT)", person: "Puu", raw: RAW_GPT_PUU, source: "ChatGPT" },
  { id: "mentee_gemini", label: "Mentee (Gemini)", person: "Mentee N-shi", raw: RAW_GEMINI_MENTEE, source: "Gemini" },
  { id: "mentee_gpt", label: "Mentee (GPT)", person: "Mentee N-shi", raw: RAW_GPT_MENTEE, source: "GPT" },
];
const PROFILES = ALL_PROFILES.map(p => ({ ...p, normalized: normalize(p.raw), profile: toSoEProfile(normalize(p.raw), p.person, p.source) }));

// Colors
const C = { bg: "#0c0f1a", card: "#131829", cardLight: "#1a2035", accent: "#f0c040", blue: "#4a90d9", green: "#50c878", red: "#e05555", purple: "#9b6dff", cyan: "#40d0d0", pink: "#e080a0", orange: "#ff8c42", text: "#e8e8f0", textDim: "#8890a8", textMuted: "#555a70", border: "#1e2440", srColor: "#d4af37", urColor: "#ff6ec7" };

// --- StatHexagon ---
const StatHexagon = ({ stats, compareStats }) => {
  const entries = Object.entries(stats);
  const cx = 120, cy = 120, r = 85;
  const getPoint = (i, val) => {
    const angle = (Math.PI * 2 * i) / entries.length - Math.PI / 2;
    const dist = (val / 100) * r;
    return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)];
  };
  const bgPts = entries.map((_, i) => getPoint(i, 100).join(",")).join(" ");
  const midPts = entries.map((_, i) => getPoint(i, 50).join(",")).join(" ");
  const dataPts = entries.map(([, s], i) => getPoint(i, s.value).join(",")).join(" ");

  return (
    <svg viewBox="0 0 240 240" style={{ width: "100%", maxWidth: "280px" }}>
      <polygon points={bgPts} fill={C.border} stroke={C.textMuted} strokeWidth="0.5" />
      <polygon points={midPts} fill="none" stroke={C.textMuted} strokeWidth="0.3" strokeDasharray="3,3" />
      {entries.map((_, i) => { const [x, y] = getPoint(i, 100); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={C.textMuted} strokeWidth="0.3" />; })}
      {compareStats && (() => {
        const cEntries = Object.entries(compareStats);
        const cPts = cEntries.map(([, s], i) => getPoint(i, s.value).join(",")).join(" ");
        return <polygon points={cPts} fill={C.cyan + "15"} stroke={C.cyan} strokeWidth="1.5" strokeDasharray="4,3" />;
      })()}
      <polygon points={dataPts} fill={C.accent + "25"} stroke={C.accent} strokeWidth="2" />
      {entries.map(([key, s], i) => { const [x, y] = getPoint(i, 115); return <text key={key} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={C.text} fontSize="10" fontWeight="700">{s.label}</text>; })}
      {entries.map(([, s], i) => { const [x, y] = getPoint(i, s.value); return <circle key={i} cx={x} cy={y} r="3" fill={C.accent} />; })}
    </svg>
  );
};

// --- CompareRadar ---
const CompareRadar = ({ profiles }) => {
  const colors = [C.accent, C.cyan, C.green, C.pink];
  const statKeys = ["STR", "INT", "MEN", "DEX", "VIT", "CHR"];
  const labels = { STR: "実行力", INT: "分析力", MEN: "精神耐久", DEX: "器用さ", VIT: "持続力", CHR: "対人力" };
  const cx = 140, cy = 140, r = 100;
  const getPoint = (i, val) => { const angle = (Math.PI * 2 * i) / 6 - Math.PI / 2; const dist = (val / 100) * r; return [cx + dist * Math.cos(angle), cy + dist * Math.sin(angle)]; };
  const bgPts = statKeys.map((_, i) => getPoint(i, 100).join(",")).join(" ");
  const midPts = statKeys.map((_, i) => getPoint(i, 50).join(",")).join(" ");
  return (
    <div>
      <svg viewBox="0 0 280 280" style={{ width: "100%", maxWidth: "360px", margin: "0 auto", display: "block" }}>
        <polygon points={bgPts} fill={C.border} stroke={C.textMuted} strokeWidth="0.5" />
        <polygon points={midPts} fill="none" stroke={C.textMuted} strokeWidth="0.3" strokeDasharray="3,3" />
        {statKeys.map((_, i) => { const [x, y] = getPoint(i, 100); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={C.textMuted} strokeWidth="0.3" />; })}
        {profiles.map((prof, pi) => {
          const pts = statKeys.map((k, i) => getPoint(i, prof.profile.stats[k].value).join(",")).join(" ");
          return <polygon key={pi} points={pts} fill={colors[pi] + "15"} stroke={colors[pi]} strokeWidth="2" strokeDasharray={pi > 0 ? "4,3" : "none"} />;
        })}
        {statKeys.map((k, i) => { const [x, y] = getPoint(i, 118); return <text key={k} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={C.text} fontSize="11" fontWeight="700">{labels[k]}</text>; })}
      </svg>
      <div style={{ display: "flex", gap: "12px", justifyContent: "center", marginTop: "12px", flexWrap: "wrap" }}>
        {profiles.map((prof, pi) => (
          <div key={pi} style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "11px", color: C.textDim }}>
            <div style={{ width: "14px", height: "3px", background: colors[pi], borderRadius: "2px" }} />
            {prof.label}
          </div>
        ))}
      </div>
    </div>
  );
};

// --- SkillCard ---
const SkillCard = ({ skill }) => {
  const isUR = skill.rarity === "UR";
  const color = isUR ? C.urColor : C.srColor;
  return (
    <div style={{ background: "linear-gradient(135deg, " + color + "10, " + C.card + ")", border: "1px solid " + color + "40", borderRadius: "14px", padding: "18px", position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: 0, right: 0, background: color, color: "#000", padding: "3px 14px", borderRadius: "0 14px 0 10px", fontSize: "11px", fontWeight: "900", letterSpacing: "1px" }}>{skill.rarity}</div>
      <div style={{ fontSize: "18px", fontWeight: "800", color, marginBottom: "6px" }}>{skill.name}</div>
      <div style={{ fontSize: "13px", color: C.text, marginBottom: "10px", lineHeight: "1.5" }}>{skill.desc || skill.description}</div>
      <div style={{ fontSize: "11px", color: C.textDim, marginBottom: "8px", lineHeight: "1.6" }}>{skill.mechanism}</div>
      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
        <div style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: C.green + "15", color: C.green, border: "1px solid " + C.green + "30" }}>{skill.buff || skill.context_buff}</div>
        <div style={{ fontSize: "11px", padding: "4px 10px", borderRadius: "6px", background: C.red + "15", color: C.red, border: "1px solid " + C.red + "30" }}>{skill.debuff || skill.context_debuff}</div>
      </div>
    </div>
  );
};

// --- TraitRow ---
const TraitRow = ({ trait, expanded, onToggle }) => {
  const barColor = trait.value >= 70 ? C.green : trait.value >= 50 ? C.accent : trait.value >= 35 ? C.orange : C.red;
  return (
    <div>
      <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "12px 14px", borderRadius: "10px", cursor: "pointer", background: expanded ? C.cardLight : "transparent", transition: "background 0.2s" }}>
        <div style={{ width: "36px", height: "36px", borderRadius: "8px", background: C.purple + "15", border: "1px solid " + C.purple + "30", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "18px" }}>{trait.icon}</div>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontWeight: "700", color: C.text, fontSize: "14px" }}>{trait.name}</span>
            <span style={{ fontSize: "14px", fontWeight: "800", color: barColor }}>{trait.value}</span>
          </div>
          <div style={{ height: "3px", background: C.border, borderRadius: "2px", marginTop: "4px", overflow: "hidden" }}>
            <div style={{ width: trait.value + "%", height: "100%", background: barColor, borderRadius: "2px", transition: "width 0.5s" }} />
          </div>
          <div style={{ fontSize: "10px", color: C.textMuted, marginTop: "2px" }}>grain: {trait.grainLevel}</div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 14px 12px 62px", display: "flex", flexDirection: "column", gap: "6px" }}>
          <div style={{ fontSize: "12px", padding: "8px 12px", borderRadius: "8px", background: C.green + "08", borderLeft: "3px solid " + C.green, color: C.textDim, lineHeight: "1.5" }}>
            <span style={{ color: C.green, fontWeight: "700", fontSize: "10px" }}>BUFF</span><br />{trait.buff}
          </div>
          <div style={{ fontSize: "12px", padding: "8px 12px", borderRadius: "8px", background: C.red + "08", borderLeft: "3px solid " + C.red, color: C.textDim, lineHeight: "1.5" }}>
            <span style={{ color: C.red, fontWeight: "700", fontSize: "10px" }}>DEBUFF</span><br />{trait.debuff}
          </div>
        </div>
      )}
    </div>
  );
};

// --- CompareTable ---
const CompareTable = ({ profiles }) => {
  const bfKeys = ["openness", "conscientiousness", "extraversion", "agreeableness", "neuroticism"];
  const bfLabels = { openness: "開放性", conscientiousness: "誠実性", extraversion: "外向性", agreeableness: "協調性", neuroticism: "情動性" };
  const hpiKeys = ["adjustment", "ambition", "sociability", "interpersonal_sensitivity", "prudence", "inquisitive", "learning_approach"];
  const hpiLabels = { adjustment: "適応", ambition: "野心", sociability: "社交", interpersonal_sensitivity: "感受性", prudence: "慎重さ", inquisitive: "探究", learning_approach: "学習" };
  const cellStyle = (val) => ({ padding: "6px 8px", fontSize: "12px", textAlign: "center", fontWeight: "700", color: val >= 70 ? C.green : val >= 50 ? C.accent : val >= 35 ? C.orange : C.red });
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px" }}>
        <thead>
          <tr style={{ borderBottom: "1px solid " + C.border }}>
            <th style={{ padding: "8px", textAlign: "left", color: C.textDim, fontWeight: "600" }}>Trait</th>
            {profiles.map(p => <th key={p.id} style={{ padding: "8px", textAlign: "center", color: C.textDim, fontWeight: "600", fontSize: "10px" }}>{p.source}</th>)}
          </tr>
        </thead>
        <tbody>
          <tr><td colSpan={profiles.length + 1} style={{ padding: "8px 8px 4px", color: C.purple, fontWeight: "700", fontSize: "11px" }}>Big Five</td></tr>
          {bfKeys.map(k => (
            <tr key={k} style={{ borderBottom: "1px solid " + C.border + "30" }}>
              <td style={{ padding: "6px 8px", color: C.text, fontSize: "12px" }}>{bfLabels[k]}</td>
              {profiles.map(p => <td key={p.id} style={cellStyle(p.normalized.bigFive[k].value)}>{p.normalized.bigFive[k].value}</td>)}
            </tr>
          ))}
          <tr><td colSpan={profiles.length + 1} style={{ padding: "12px 8px 4px", color: C.cyan, fontWeight: "700", fontSize: "11px" }}>HPI Proxy</td></tr>
          {hpiKeys.map(k => (
            <tr key={k} style={{ borderBottom: "1px solid " + C.border + "30" }}>
              <td style={{ padding: "6px 8px", color: C.text, fontSize: "12px" }}>{hpiLabels[k]}</td>
              {profiles.map(p => <td key={p.id} style={cellStyle(p.normalized.hpi[k].value)}>{p.normalized.hpi[k].value}</td>)}
            </tr>
          ))}
          <tr><td colSpan={profiles.length + 1} style={{ padding: "12px 8px 4px", color: C.pink, fontWeight: "700", fontSize: "11px" }}>MBTI</td></tr>
          <tr style={{ borderBottom: "1px solid " + C.border + "30" }}>
            <td style={{ padding: "6px 8px", color: C.text, fontSize: "12px" }}>Type</td>
            {profiles.map(p => <td key={p.id} style={{ padding: "6px 8px", textAlign: "center", color: C.text, fontWeight: "700", fontSize: "12px" }}>{p.normalized.mbti.type}</td>)}
          </tr>
        </tbody>
      </table>
    </div>
  );
};

// ============================================================
// Main App
// ============================================================
function App() {

}
