# ==========================================
# 最終対応の意図分析
# ==========================================

final_response_analysis:
  
  decision: "MENTAの枠では対応しない"
  
  reasoning:
    - issue: "借金155万円、大学休学（実質中退）、家族関係不明"
      risk: "闇バイト予備軍リスク"
      note: "MENTAのメンタリングの範囲ではない"
    
    - issue: "就労支援との報酬比較"
      comparison: |
        就労移行支援：1人につき月額約16万円
        MENTA：3,000円
      note: "この領域をMENTAの価格でやるべきではない"
  
  conditions_set:
    condition_1:
      name: "3,000円の支払い"
      purpose: "クレカが使えるかのテスト"
      note: "払えるかどうかで本気度を測る"
    
    condition_2:
      name: "両親も参加するビデオ通話"
      purposes:
        - "本人だけでは判断能力が怪しい"
        - "家族を巻き込むことで本人の『逃げ』を防ぐ"
        - "家族関係が『促進因子』か『阻害因子』かを確認"
        - "本人だけの問題ではないことの可視化"
      note: "両親が出てこれないなら、そこで終了"
    
    condition_3:
      name: "ビデオ通話"
      purpose: "テキストでは見えない部分を確認"
      note: "通常はビデオ通話を避けているが、このケースでは必要"
  
  structure: |
    「助けて」に応えつつ、適切な枠組みに誘導する対応。
    
    善意で無料対応するのではなく、
    「この条件を満たせるなら動く」という契約ベース。
    
    条件を満たせない場合は、それ以上は動かない。
    これは「冷たさ」ではなく「適切な枠組み」の設定。

# ==========================================
# 結論
# ==========================================

conclusion:
  decision: "条件付き対応提示・待機"
  
  status: |
    「助けて」は来た。
    ただしMENTAの枠では対応しない。
    
    条件を提示：
    ・3,000円の支払い（クレカテスト）
    ・両親も参加するビデオ通話
    
    この条件を満たせば動く。
    満たせなければ終了。
    
    ボールは大崎さん側。
  
  value_as_data:
    - "フリーライダーの交渉パターンのケーススタディ"
    - "『言い換え』のパターン分析"
    - "メンタリングの境界線を考える上での重要事例"
    - "現実乖離型の自己肯定の構造分析"
    - "双極性障害（躁鬱）傾向の観察所見"
    - "「助けて」のトリガー設計の実践例"
    - "MENTAの枠を超えるケースへの対応設計"
    - "条件付き対応（両親参加）の設計例"
  
  lesson_learned: |
    「毎回一歩踏み込んでくる」パターンは、
    交渉術ではなく「物理的に払えない」サインである可能性がある。
    
    クレジットカード決済ができない状態で
    「契約を検討したい」と称するのは、
    構造的に詐欺に近い行動パターン。
    
    ただし本人に悪意の自覚がないケースが多く、
    「なんとかなる」思考で行動している。
    
    双極性障害（躁鬱）傾向がある場合、
    躁状態では「困っている」自覚が薄く、
    「助けて」のトリガーが引かれない。
    
    「助けて」が来ても、MENTAの枠を超えるケースがある。
    その場合は「条件を満たせば動く」という設計で対応。
    
    両親参加を条件にすることで：
    ・本人だけの問題ではないことを可視化
    ・家族関係が促進因子か阻害因子かを確認
    ・本人の「逃げ」を防ぐ
    
    善人ではないからこそ、契約ベースで動く。
    善意で動くと、相手の意思決定を奪う。
    適切な枠組みに誘導することが、本当の支援。
