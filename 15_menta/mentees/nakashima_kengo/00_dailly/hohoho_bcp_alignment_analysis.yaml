# ==========================================
# 福井市BCP × HOHOHO 有意性分析
# ==========================================
# 作成日: 2026-01-26
# 用途: HOHOHOの行政BCP補完価値の構造化
# 参照資料: 
#   - 福井市震災時業務継続計画（第6版）
#   - HOHOHO提案資料（福井信用金庫向け/えちぜん鉄道向け）
# ==========================================

meta:
  version: "1.0"
  created: "2026-01-26"
  purpose: "HOHOHOの行政BCP補完価値を構造的に整理"
  target_document: "福井市震災時業務継続計画（第6版）"

# ------------------------------------------
# 福井市BCPの前提条件
# ------------------------------------------
bcp_assumptions:
  
  disaster_scenario:
    name: "福井平野東縁断層帯地震"
    condition: "冬の朝5時、風速10m/s"
    max_intensity: "震度7"
  
  damage_estimates:
    buildings:
      total_collapse: 16911
      half_collapse: 24773
      total_buildings: 118377
    casualties:
      deaths: 1012
      severe_injuries: 1042
      light_injuries: 5395
    infrastructure:
      water_outage_households: 87972
      water_outage_rate: "91.7%"
      power_outage_houses: 43504
      power_outage_rate: "31.4%"
    evacuees:
      max_evacuees: 117535
      evacuation_rate: "44.0%"
  
  staff_assembly:
    within_3_hours:
      personnel: 458
      rate: "19.9%"
    within_1_day:
      personnel: 1145
      rate: "49.9%"
    within_3_days:
      personnel: 1444
      rate: "62.9%"
    within_2_weeks:
      personnel: 2241
      rate: "97.6%"
    note: "参集不能率40%を前提（国土交通省基準）"
  
  lifeline_recovery:
    electricity: "7日間停止"
    water: "28日で復旧作業完了"
    city_gas: "30日で復旧作業完了"
    phone: "4〜5日程度で回復、輻輳は半日程度"

# ------------------------------------------
# BCPの構造的課題
# ------------------------------------------
bcp_structural_challenges:
  
  challenge_1:
    name: "発災初期の人員不足"
    description: |
      発災3時間以内の参集率は19.9%（458名）。
      限られた人員で被災状況把握・応急対応を行う必要がある。
    bcp_reference: "第2章 3.職員の参集予測"
    hohoho_response: |
      平時からの「現状把握データ」により、
      発災後の現地確認工数を削減。
      「まず見に行く」を減らし、判断可能な状態を事前に作る。
  
  challenge_2:
    name: "車両パトロールの限界"
    description: |
      車両中心のパトロールでは視点が限定される。
      歩行者目線の初期変状（側溝、標識、防護柵等）は拾いにくい。
    bcp_reference: "第4章 1.人員体制"
    hohoho_response: |
      歩行調査による「車では見逃されがちな初期リスク」の検出。
      調査手段の補完関係（車両=広域・顕在化リスク、歩行=狭域・初期リスク）。
  
  challenge_3:
    name: "市民通報の構造的限界"
    description: |
      市民通報（LINE等）は明確な危険箇所への即時共有に有効だが、
      位置特定・説明・写真準備が必要。
      「今すぐ危険」と感じない事象は通報に至りにくい。
    bcp_reference: "（HOHOHO資料より補足）"
    hohoho_response: |
      専門的観測者による継続的・構造化された情報提供。
      損傷 × 人流 × 周辺条件の複合評価により「本来の優先度」を可視化。
  
  challenge_4:
    name: "情報システムの脆弱性"
    description: |
      停電時、ネットワーク損傷時には情報システムが利用不能。
      非常用コンセントの容量にも制約がある。
    bcp_reference: "第4章 3.電力、6.情報システム"
    hohoho_response: |
      紙ベースでも使える「現地印刷用シート」の提供。
      オフライン環境でも活用可能なデータ形式。

# ------------------------------------------
# BCPの「非常時優先業務」との接点
# ------------------------------------------
priority_business_alignment:
  
  total_priority_businesses: 735
  
  within_3_hours:
    business_count: 217
    relevant_examples:
      - "災害対策本部の設置"
      - "被災状況の把握"
      - "避難誘導"
      - "初動体制の確立"
    hohoho_contribution: |
      事前の劣化データベースとの差分で「新規損傷」を迅速特定。
      発災前のベースラインがあることで、発災後の変化を即座に把握可能。
  
  within_1_day:
    business_count: 139
    relevant_examples:
      - "応援要請依頼"
      - "職員の安否確認"
    hohoho_contribution: |
      優先度付きデータにより「どこから対応すべきか」を即座に提示。
      応援部隊への情報提供資料として活用。
  
  within_3_days:
    business_count: 130
    relevant_examples:
      - "支援物資の受入開始"
      - "広報の実施"
    hohoho_contribution: |
      ヒートマップによる危険エリアの可視化・市民周知。
      「ここは通行注意」「この道は迂回」の判断材料。
  
  within_2_weeks:
    business_count: 170
    relevant_examples:
      - "復旧・復興に係る業務の本格化"
    hohoho_contribution: |
      修繕優先順位の判断材料として活用。
      「どこから直すか」の説明材料が揃う。
  
  within_1_month:
    business_count: 79
    relevant_examples:
      - "通常業務への移行"
    hohoho_contribution: |
      継続的な状態監視により、復旧完了の確認。
      「通常状態に戻ったか」のエビデンス。

# ------------------------------------------
# 災害時応援協定との連携可能性
# ------------------------------------------
cooperation_agreement_alignment:
  
  highly_relevant:
    
    - agreement_partner: "(一社)福井地区建設業会"
      current_scope: "公共土木施設の応急対策業務"
      hohoho_value: |
        「どこが・どう壊れているか」の事前データ提供。
        応急対策の優先順位付けと現場指示の効率化。
    
    - agreement_partner: "福井県安全施設技術研究会"
      current_scope: "道路および道路交通安全施設の応急対策業務"
      hohoho_value: |
        まさにHOHOHOの主対象領域。
        標識・ガードレール・防護柵等の劣化データを直接活用。
    
    - agreement_partner: "(一社)福井県電業協会"
      current_scope: "公共施設等の電気設備の応急対策業務"
      hohoho_value: |
        電柱・標識等の劣化情報。
        電気設備周辺の路面・側溝状態との複合情報。
  
  moderately_relevant:
    
    - agreement_partner: "(一社)福井県建築工業会"
      current_scope: "公共建築物の応急対策、応急危険度判定"
      hohoho_value: |
        建築物周辺の路面・外構の事前状態把握。
        危険度判定前の一次スクリーニング材料。
    
    - agreement_partner: "福井管工事業協同組合"
      current_scope: "ガス・上下水道復旧作業等の協力"
      hohoho_value: |
        側溝・マンホール蓋等の劣化情報。
        地下埋設物への影響予測の参考材料。

# ------------------------------------------
# HOHOHOのBCPにおける位置づけ
# ------------------------------------------
hohoho_positioning:
  
  core_concept: |
    「非常時優先業務の前工程を平時から準備する、予防的情報インフラ」
  
  value_proposition:
    - dimension: "時間軸の補完"
      description: |
        BCPが想定する「発災後の対応」に対し、
        HOHOHOは「発災前の状態把握」を担う。
    
    - dimension: "人的資源の補完"
      description: |
        参集率の低さを「事前データ」で補う。
        限られた人員を「判断」に集中させ、「確認」の工数を削減。
    
    - dimension: "情報品質の補完"
      description: |
        単体の損傷情報ではなく、
        「損傷 × 人流 × 周辺条件」の複合評価を提供。
        「なぜここから対応すべきか」の説明可能性を担保。
  
  lifecycle_integration:
    
    - phase: "平時"
      hohoho_role: "定期的な現状把握データの蓄積・更新"
      bcp_connection: "第5章 1.平常時からの意識づけ"
    
    - phase: "発災前（警戒期）"
      hohoho_role: "優先対応箇所の事前特定"
      bcp_connection: "第1章 5.計画の発動及び解除"
    
    - phase: "発災直後"
      hohoho_role: "差分比較による新規損傷の迅速特定"
      bcp_connection: "第3章 非常時優先業務の選定"
    
    - phase: "復旧期"
      hohoho_role: "修繕優先順位の判断材料"
      bcp_connection: "第4章 11.災害時応援協定"
    
    - phase: "見直し期"
      hohoho_role: "「どこが壊れやすいか」の傾向分析"
      bcp_connection: "第5章 3.継続的な向上と見直し"

# ------------------------------------------
# 定量的効果の仮説
# ------------------------------------------
quantitative_hypothesis:
  
  note: "以下は論理的推定であり、実証データではない"
  
  hypothesis_1:
    metric: "現地確認工数の削減"
    baseline: "発災後、対象箇所すべてに職員を派遣"
    with_hohoho: "事前データにより優先順位付けされた箇所から対応"
    estimated_effect: "初動48時間の現地確認工数を30-50%削減"
  
  hypothesis_2:
    metric: "応援部隊への情報提供時間"
    baseline: "現地確認→情報整理→提供（数時間〜1日）"
    with_hohoho: "既存データに発災後差分を追記して即時提供"
    estimated_effect: "情報提供までのリードタイムを50%以上短縮"
  
  hypothesis_3:
    metric: "修繕優先順位の説明可能性"
    baseline: "担当者の経験則に依存"
    with_hohoho: "損傷レベル × 人流 × 周辺条件のスコアリング"
    estimated_effect: "議会・市民への説明材料が即座に準備可能"

# ------------------------------------------
# 提言：BCP連携の具体的アクション
# ------------------------------------------
recommendations:
  
  short_term:
    timeframe: "6ヶ月以内"
    actions:
      - action: "HOHOHOデータ形式のBCP対応化"
        description: |
          現地印刷用シートをBCP様式と整合させる。
          停電時・システム停止時にも使える形式を確保。
      
      - action: "福井県安全施設技術研究会との事前共有"
        description: |
          協定先への平時からの情報共有を開始。
          発災時のデータ活用手順を事前に合意。
  
  mid_term:
    timeframe: "1年以内"
    actions:
      - action: "BCP業務実施マニュアルへの組み込み"
        description: |
          「被災状況の把握」業務マニュアルに
          「HOHOHOデータとの差分確認」手順を追記。
      
      - action: "職員防災訓練での活用"
        description: |
          訓練シナリオにHOHOHOデータの活用を組み込み。
          「データがある場合」と「ない場合」の対応時間を比較検証。
  
  long_term:
    timeframe: "2年以上"
    actions:
      - action: "BCPの正式な補完資源として位置づけ"
        description: |
          「第4章 業務継続のための資源の確保状況」に
          「事前状態把握データ」として明記。
      
      - action: "他自治体へのモデル展開"
        description: |
          福井市での実績を基に、
          県内他市町・北陸3都市への横展開を検討。

# ------------------------------------------
# 備考・注意事項
# ------------------------------------------
notes:
  - |
    本分析はHOHOHOの「可能性」を構造化したものであり、
    福井市との正式な協議・合意を経たものではない。
  - |
    定量的効果の仮説は論理的推定であり、
    実証には実際のPoCまたはシミュレーションが必要。
  - |
    BCPは「福井市震災時業務継続計画（第6版）」を参照。
    水道・下水道BCPは別計画として存在するが、本分析では対象外。
