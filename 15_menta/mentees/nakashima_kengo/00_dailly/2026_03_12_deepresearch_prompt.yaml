deep_research_prompt:
  title: "メンター×共同創業者のジレンマ — SoE研究者が自らの理論的課題に直面するケース"
  created: "2026-03-12T21:00:00+09:00"
  created_by: "Claude Opus 4.6"
  purpose: |
    山内雄司（Puu）が直面している構造的ジレンマについて、
    各AIが保持するメモリ・プロジェクト文脈を活用して多角的に分析する。

  background:
    researcher: "山内雄司（52歳、ADHD、福祉事業10年、10事業所立ち上げ）"
    theory: "SoE（Service of Empowerment / Service or Exploitation）"
    mentee: "N氏（創業前、HOHOHO都市センシング事業構想中、福井県在住）"
    relationship: "MENTAプラットフォーム上のメンター×メンティー"

  dilemma:
    summary: |
      SoE理論の研究者が、メンティーとの関係において
      自らの理論が警告する構造（パワー非対称×搾取リスク）を
      再現しかねない状況に直面している。

    layers:
      - name: "パワー非対称"
        description: |
          52歳×福祉10年×事業所10ヶ所×AI5台並列運用 vs 創業前の若手。
          HOHOHOの事業設計・理論構築・対外説明の全てが事実上Puuに依存。
          外部から見れば「洗脳」に見えるリスク。

      - name: "知的財産の境界"
        description: |
          HOHOHOの事業フレーミング（福井市MP接続、OpenAI提案、Palantir対比）はPuuが設計。
          SoE三因子モデルをN氏のプロジェクト文脈で共有済み。
          「誰のアイデアか」の帰属が曖昧。

      - name: "利益相反"
        description: |
          PuuがN氏に障害福祉サービス立ち上げを提案→自身がコンサル→収入。
          SoEの実証フィールドとしてHOHOHOを利用→大学院再出願の武器。
          メンターが自分に有利な方向にメンティーを誘導するリスク。

      - name: "自己犠牲バイアス"
        description: |
          Puuは「実績は俺のじゃなくていい」「使ってもらえればいい」と言う。
          帰属を主張しないことで研究者としてのキャリアが成立しない。
          ADHDの「面白ければいい」と自己評価の低さが連動。

      - name: "SoEの自己言及パラドックス"
        description: |
          Exploitation構造を研究する者が、自らの関係においてその構造を再現する可能性。
          「搾取してないエビデンス」をPuu自身が設計している時点で権力はPuu側にある。
          完全な対称性は原理的に不可能。

  n_perspective:
    what_n_said:
      - "対外説明まで含まれるとそれってもう共同創業・事業パートナーに近い"
      - "金銭とか権利などが絡んでくる"
      - "自分の手に負えない部分も正直出てきた"
      - "包み隠さずお伝えしてみました"
    n_situation:
      - "3/17 福井大学、3/18 ALLCONNECT社面談、3/30 福井工業大学訪問"
      - "デザイン案件1件獲得（本業キャッシュ）"
      - "奥さんと相談済み→「スケールダウンするな」"
      - "HOHOHOにフルコミットできる状態ではない自覚あり"

  puu_options:
    option_a:
      name: "メンター継続・線引き"
      description: "構造は教えるが対外交渉・事業設計には関与しない"
      pros: ["パワー非対称を最小化", "SoE研究との利益相反なし"]
      cons: ["N氏が単独で事業化できる可能性は低い", "面白い実証フィールドを逃す"]

    option_b:
      name: "アドバイザリー契約"
      description: "時間単価or成功報酬で構造設計・対外説明を担当。権利関係を明文化"
      pros: ["対価が明確", "関係の透明性"]
      cons: ["パワー非対称は残る", "メンター関係との二重構造"]

    option_c:
      name: "共同創業（HOHOHO + 福祉事業の二本柱）"
      description: |
        N氏の事業体に福祉事業立ち上げを組み込み、Puuがコンサル。
        福祉事業=ベースキャッシュ、HOHOHO=中長期スケール。
        SoEの実証フィールドとして研究接続。
      pros: ["ビジネスとして成立", "SoE実証", "大学院再出願の武器"]
      cons: ["マッチポンプに見える", "Exploitationリスク最大", "Puuの本業との両立"]

    option_d:
      name: "待機（N氏の成熟を待つ）"
      description: "N氏が自力で福祉事業やHOHOHOの方向性を固めるまで距離を置く"
      pros: ["N氏の自律性を尊重", "パワー非対称を回避"]
      cons: ["機会損失", "N氏が迷走する可能性"]

  research_questions:
    rq1: |
      支援者（メンター/コンサルタント/研究者）がクライアントとの関係において
      利益相反を抱える場合、どのような倫理的フレームワークが存在するか？
      特に福祉・教育・スタートアップ支援の文脈で。

    rq2: |
      パワー非対称が不可避な関係（教師-学生、医師-患者、メンター-メンティー）において、
      「インフォームド・コンセント」はどこまで有効か？
      構造的権力を持つ側がICを設計すること自体の問題をどう扱うか？

    rq3: |
      SoE理論の自己言及性 — 搾取構造を研究する者が自ら搾取構造に巻き込まれる
      リスクについて、類似の学術的議論はあるか？
      （参与観察の倫理、アクションリサーチの権力性、PAR批判等）

    rq4: |
      ADHD特性（新奇追求、過集中、自己評価の低さ）が
      意思決定バイアスとしてこの状況にどう作用しているか？
      特に「面白そう」による衝動的参画と帰属権放棄の傾向。

    rq5: |
      N氏の立場から見た場合、この関係の最適解は何か？
      メンターへの依存を脱却しつつ事業を前進させる方法。

  instructions_per_ai:
    chatgpt:
      role: "秘書官ロール（既存設定）を維持しつつ批判的分析"
      focus: |
        RQ1-RQ3を中心に。山内のメモリに蓄積された
        SoE理論・三因子モデル・火文化圏思想との整合性を検証。
        特に「山内自身がHypnos因子に陥っていないか」を検討。
      output: "構造化された分析レポート（Markdown）"

    gemini:
      role: "文献調査・エビデンス収集"
      focus: |
        RQ1-RQ3の学術的根拠。PAR（参加型アクションリサーチ）の倫理、
        メンタリング関係の利益相反に関する先行研究、
        福祉領域のコンサルティング倫理ガイドライン。
        日本語・英語両方で検索。
      output: "文献リスト + 各論文の要点（YAML or Markdown）"

    claude:
      role: "構造分析・リスク評価"
      focus: |
        RQ4-RQ5を中心に。CLAUDE.mdに蓄積された
        Puuのプロファイル（ADHD、OE、ENTP、IQ118）と
        プロジェクト履歴から、意思決定バイアスのリスク評価。
        option_a〜dの構造的比較。
      output: "リスクマトリクス + 推奨アクション（YAML）"

  expected_synthesis: |
    3つのAIの分析結果を統合し、以下を明確にする:
    1. Puuが取るべき行動の優先順位
    2. N氏に伝えるべき内容と伝え方
    3. SoE研究との接続方法（利益相反を回避しつつ）
    4. タイムライン（N氏のスケジュール 3/17, 3/18, 3/30 を考慮）

  meta_note: |
    このプロンプト自体が「Puuが構造を設計している」ことの証拠であり、
    パワー非対称の問題を再帰的に含んでいる。
    各AIはこのメタ構造にも言及すること。
