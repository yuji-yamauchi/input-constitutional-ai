ui_features:
  input_flow:
    - 写真アップロード
    - ナラティブ入力（200文字）
    - 感情タグ選択
    - 位置情報（オプトイン）
    - AI追加質問
  design_goal:
    - 歩く → 感じる → 言語化 → AI補助
    - 言語化が苦手な人でも参加可能

database:
  platform: Supabase
  type: PostgreSQL
  purpose:
    - 投稿データ保存
    - 感情タグ
    - 位置情報
    - AI生成ナラティブ
  advantages:
    - Postgresベース
    - API自動生成
    - GIS対応（PostGIS）
    - PoCに適したサブスクDB

development_tools:
  claude_max_plan:
    cost: 約100USD/月
    yen_estimate: 約15000〜17000円
  tools_used:
    - Claude Code
    - Excel in Claude
    - VSCode Claude integration
    - GitHub管理
    - Python / HTML生成
    - Whisper（音声文字起こし）
    - Cowork（ローカルファイル整理）
    - Chrome操作による情報収集

ai_role_structure:
  development_ai:
    model: Claude
    role: 開発・コード生成・作業支援
  user_facing_ai:
    model: GPT
    role: 市民インターフェース
  reasoning:
    - GPTは一般ユーザー層に広く普及
    - SNS利用層（Xなど）との親和性が高い

