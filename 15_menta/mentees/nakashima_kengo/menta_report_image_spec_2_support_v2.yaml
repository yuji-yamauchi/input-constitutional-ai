image_spec:
  version: 2
  purpose: "MENTA実績報告 - 対応した内容セクション用画像（ビジュアル強化版）"
  target_audience: "MENTAで新規メンティーを探している起業志望者"
  tone: "プロフェッショナルかつ視覚的に達成感が伝わる"

  canvas:
    width: 1200
    height: 950
    background: "#FFFFFF"
    format: PNG
    font: "Noto Sans JP Bold / 游ゴシック Bold（日本語）、Helvetica Neue（英数字）"

  layout:
    header:
      label_badge:
        text: "SUPPORT"
        background: "#e8f8e8"
        text_color: "#27ae60"
        font_size: 14
        style: rounded_pill
      title:
        text: "対応した内容"
        font_size: 28
        font_weight: bold
        color: "#1a1a2e"
      subtitle:
        text: "3ヶ月間の支援内容（2026年1月〜3月）"
        font_size: 13
        color: "#888888"
      accent_line:
        type: gradient
        colors: ["#27ae60", "#6dd5a0", "#27ae60"]
        thickness: 3

    main_content:
      type: "vertical_timeline"
      timeline_line:
        color_gradient: ["#27ae60", "#2d8fba"]
        width: 4
        position: left_60px
      dot_style:
        shape: circle
        border_color: "#27ae60"
        border_width: 3
        fill: white
        size: 16

      cards:
        card_style:
          background: "#fafffe"
          border: "1px solid #e0f0e8"
          corner_radius: 12
          shadow: "0 3px 12px rgba(0,0,0,0.06)"
          padding: 20
          min_height: 100

        items:
          - number: 1
            number_style:
              shape: circle
              background: "#27ae60"
              text_color: white
              size: 30
            title: "事業構想の構造化"
            title_color: "#1a1a2e"
            title_size: 17
            title_weight: bold
            body: "現場観察データ(367件)を起点に事業コンセプトを整理。「誰のどの課題を解くか」へ再定義"
            body_color: "#555555"
            body_size: 12

            visual:
              type: icon_composition
              position: right_side_of_card
              opacity: 0.85
              description: |
                散らばったデータ点（小さな丸6〜8個、#ccc）が
                中央のフレーム（四角枠、#27ae60）に収束していくイメージ。
                フレーム内にはグリッド線（構造化の暗示）。
                収束矢印は3本程度（曲線矢印、薄緑）。
              meaning: "バラバラだったデータが構造に収まる"
              svg_sketch: |
                <!-- 散らばるデータ点 -->
                <circle cx="15" cy="15" r="4" fill="#ddd"/>
                <circle cx="5" cy="45" r="4" fill="#ddd"/>
                <circle cx="25" cy="65" r="4" fill="#ddd"/>
                <circle cx="110" cy="10" r="4" fill="#ddd"/>
                <circle cx="120" cy="55" r="4" fill="#ddd"/>
                <!-- 収束矢印 -->
                <path d="M20,18 Q40,30 50,35" stroke="#a5d6a7" stroke-width="1.5" fill="none" marker-end="arrowhead"/>
                <path d="M15,48 Q35,42 50,40" stroke="#a5d6a7" stroke-width="1.5" fill="none" marker-end="arrowhead"/>
                <path d="M105,15 Q85,28 78,35" stroke="#a5d6a7" stroke-width="1.5" fill="none" marker-end="arrowhead"/>
                <!-- 構造フレーム -->
                <rect x="48" y="28" width="35" height="30" rx="4" stroke="#27ae60" stroke-width="2" fill="#f0faf0"/>
                <line x1="48" y1="38" x2="83" y2="38" stroke="#c8e6c9" stroke-width="1"/>
                <line x1="48" y1="48" x2="83" y2="48" stroke="#c8e6c9" stroke-width="1"/>
                <line x1="62" y1="28" x2="62" y2="58" stroke="#c8e6c9" stroke-width="1"/>

          - number: 2
            title: "事業計画書・提案書の作成支援"
            title_color: "#1a1a2e"
            title_size: 17
            body: "読み手別に複数バージョン作成。LLM活用の資料作成ワークフローも共有"
            body_color: "#555555"
            body_size: 12

            visual:
              type: icon_composition
              position: right_side_of_card
              description: |
                書類アイコン3枚が扇状に広がる（少しずつ角度をずらす）。
                各書類に異なるラベルタグ:
                 - 左: 青タグ「金融」
                 - 中: 緑タグ「行政」
                 - 右: オレンジタグ「企業」
                書類にはテキスト行（横線2〜3本）が入っている。
              meaning: "読み手別に複数バージョンが存在する"
              svg_sketch: |
                <!-- 書類3枚（扇状） -->
                <g transform="rotate(-10, 40, 50)">
                  <rect x="20" y="10" width="40" height="55" rx="3" fill="white" stroke="#ddd" stroke-width="1.5"/>
                  <line x1="28" y1="22" x2="52" y2="22" stroke="#eee" stroke-width="1.5"/>
                  <line x1="28" y1="30" x2="48" y2="30" stroke="#eee" stroke-width="1.5"/>
                  <rect x="20" y="10" width="20" height="6" rx="2" fill="#5b9bd5"/>
                  <text x="30" y="15" font-size="5" fill="white" text-anchor="middle">金融</text>
                </g>
                <g>
                  <rect x="35" y="8" width="40" height="55" rx="3" fill="white" stroke="#ddd" stroke-width="1.5"/>
                  <line x1="43" y1="22" x2="67" y2="22" stroke="#eee" stroke-width="1.5"/>
                  <line x1="43" y1="30" x2="63" y2="30" stroke="#eee" stroke-width="1.5"/>
                  <rect x="35" y="8" width="20" height="6" rx="2" fill="#66bb6a"/>
                  <text x="45" y="13" font-size="5" fill="white" text-anchor="middle">行政</text>
                </g>
                <g transform="rotate(10, 70, 50)">
                  <rect x="50" y="10" width="40" height="55" rx="3" fill="white" stroke="#ddd" stroke-width="1.5"/>
                  <line x1="58" y1="22" x2="82" y2="22" stroke="#eee" stroke-width="1.5"/>
                  <line x1="58" y1="30" x2="78" y2="30" stroke="#eee" stroke-width="1.5"/>
                  <rect x="50" y="10" width="20" height="6" rx="2" fill="#ffa726"/>
                  <text x="60" y="15" font-size="5" fill="white" text-anchor="middle">企業</text>
                </g>

          - number: 3
            title: "B2G営業戦略の設計"
            title_color: "#1a1a2e"
            title_size: 17
            body: "学生・大学・メディアを入口とした関係構築ルート設計。企業面談→社内検討へ"
            body_color: "#555555"
            body_size: 12

            visual:
              type: icon_composition
              position: right_side_of_card
              description: |
                ネットワーク図。中央に「You」の小さな丸（#27ae60）。
                そこから3本の線が伸び、それぞれの先に:
                 - 学生アイコン（帽子付き丸）
                 - 大学アイコン（建物）
                 - メディアアイコン（マイク/カメラ）
                さらにそれぞれから点線が「行政」の四角に向かう（間接アプローチの暗示）。
              meaning: "直接アプローチではなく、迂回ルートで行政に到達する戦略"
              svg_sketch: |
                <!-- 中心 You -->
                <circle cx="20" cy="40" r="8" fill="#27ae60"/>
                <text x="20" y="43" font-size="6" fill="white" text-anchor="middle">You</text>
                <!-- 学生 -->
                <circle cx="60" cy="15" r="6" fill="#81d4fa"/>
                <text x="60" y="18" font-size="5" fill="#333" text-anchor="middle">学</text>
                <line x1="28" y1="35" x2="54" y2="18" stroke="#aaa" stroke-width="1.5"/>
                <!-- 大学 -->
                <rect x="54" y="35" width="14" height="10" rx="2" fill="#ce93d8"/>
                <text x="61" y="43" font-size="5" fill="white" text-anchor="middle">大</text>
                <line x1="28" y1="40" x2="54" y2="40" stroke="#aaa" stroke-width="1.5"/>
                <!-- メディア -->
                <circle cx="60" cy="65" r="6" fill="#ffab91"/>
                <text x="60" y="68" font-size="5" fill="#333" text-anchor="middle">媒</text>
                <line x1="28" y1="45" x2="54" y2="62" stroke="#aaa" stroke-width="1.5"/>
                <!-- 行政（ゴール） -->
                <rect x="95" y="30" width="22" height="18" rx="3" stroke="#e74c3c" stroke-width="1.5" fill="#fff5f5"/>
                <text x="106" y="42" font-size="6" fill="#c0392b" text-anchor="middle">行政</text>
                <!-- 点線（迂回到達） -->
                <line x1="66" y1="15" x2="95" y2="35" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
                <line x1="68" y1="40" x2="95" y2="40" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
                <line x1="66" y1="65" x2="95" y2="48" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

          - number: 4
            title: "法務・契約の整理"
            title_color: "#1a1a2e"
            title_size: 17
            body: "NDA、準委任契約 vs 請負契約、士業独占業務の範囲など起業の法務基盤を整理"
            body_color: "#555555"
            body_size: 12

            visual:
              type: icon_composition
              position: right_side_of_card
              description: |
                盾アイコン（セキュリティ/保護の暗示）。
                盾の中にチェックマーク。
                盾の横に書類アイコン（契約書）+ ペンアイコン。
                全体色: 緑〜青のトーン。
              meaning: "法務基盤が整い、守りが固まった状態"
              svg_sketch: |
                <!-- 盾 -->
                <path d="M40,10 L60,10 L62,35 Q50,55 38,35 Z" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
                <path d="M45,28 L50,34 L58,20" stroke="#27ae60" stroke-width="2.5" fill="none"/>
                <!-- 契約書 -->
                <rect x="72" y="15" width="30" height="40" rx="3" fill="white" stroke="#ddd" stroke-width="1.5"/>
                <line x1="78" y1="25" x2="96" y2="25" stroke="#eee" stroke-width="1.5"/>
                <line x1="78" y1="32" x2="96" y2="32" stroke="#eee" stroke-width="1.5"/>
                <line x1="78" y1="39" x2="90" y2="39" stroke="#eee" stroke-width="1.5"/>
                <!-- ペン -->
                <line x1="98" y1="50" x2="108" y2="38" stroke="#27ae60" stroke-width="2"/>
                <polygon points="108,38 110,36 106,36" fill="#27ae60"/>

          - number: 5
            title: "ビジネスモデルの事実検証"
            title_color: "#1a1a2e"
            title_size: 17
            body: "DeepResearchによる監査。構造的リスク特定と戦略軌道修正を実行"
            body_color: "#555555"
            body_size: 12

            visual:
              type: icon_composition
              position: right_side_of_card
              description: |
                虫眼鏡アイコンがグラフ（棒グラフ3本）を検査している。
                グラフの1本に×印（リスク検出）。
                虫眼鏡のレンズ内に「!」マーク。
                横に方向転換の曲がり矢印（軌道修正の暗示）。
              meaning: "検証→リスク発見→方向転換のプロセス"
              svg_sketch: |
                <!-- 棒グラフ -->
                <rect x="15" y="35" width="12" height="30" rx="2" fill="#c8e6c9"/>
                <rect x="32" y="20" width="12" height="45" rx="2" fill="#ef9a9a"/>
                <text x="38" y="17" font-size="10" fill="#e74c3c" text-anchor="middle">×</text>
                <rect x="49" y="30" width="12" height="35" rx="2" fill="#c8e6c9"/>
                <!-- 虫眼鏡 -->
                <circle cx="80" cy="30" r="14" stroke="#555" stroke-width="2" fill="rgba(255,255,255,0.8)"/>
                <line x1="90" y1="40" x2="100" y2="52" stroke="#555" stroke-width="3"/>
                <text x="80" y="35" font-size="14" fill="#e67e22" text-anchor="middle" font-weight="bold">!</text>
                <!-- 軌道修正矢印 -->
                <path d="M105,25 Q115,25 115,40 Q115,55 105,55" stroke="#27ae60" stroke-width="2" fill="none" marker-end="arrowhead"/>

    footer:
      type: "llm_support_bar"
      background: "#f0f4ff"
      corner_radius: 14
      padding: 20
      heading:
        text: "24時間支援体制（LLM共有）"
        font_size: 16
        font_weight: bold
        color: "#2d5fba"

      visual:
        description: |
          4つの円アイコンが横並び。各円の中に頭文字。
          円の間を点線で接続（ネットワーク/連携の暗示）。
          中央下に小さなテキスト:「メンター不在時もAIが一次対応」
        icons:
          - label: "C"
            caption: "Claude"
            color: "#6366f1"
          - label: "G"
            caption: "ChatGPT"
            color: "#10a37f"
          - label: "Ge"
            caption: "Gemini"
            color: "#4285f4"
          - label: "M"
            caption: "メンター"
            color: "#2d5fba"
        connector:
          type: dashed_line
          color: "#ccc"
          between_all_icons: true
        sub_text:
          text: "メンター不在時もAIが一次対応"
          font_size: 10
          color: "#999"

  design_notes:
    - "各カードのビジュアルは右側に配置。テキスト左:ビジュアル右の比率は約7:3"
    - "タイムラインの縦線+ドットは必ず残す。進行感と順序性を示す重要要素"
    - "ビジュアルの色は緑系トーン（#27ae60, #a5d6a7, #c8e6c9）で統一。成功/前進を暗示"
    - "LLMアイコンの円には各サービスのブランドカラーを使う"
    - "フォントは必ず Noto Sans JP Bold を使用すること（文字化け防止）"
