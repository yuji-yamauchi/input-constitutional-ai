meeting_record:
  topic: HOHOHO構想ディスカッション整理
  participants:
    - 中島健吾
    - 山内雄司
    - ChatGPT（秘書官）

summary:
  overview: >
    HOHOHOは「都市の違和感を集める仕組み」として整理された。
    市民の日常体験（ポジネガ含む違和感）を収集し、
    LLMによって都市課題へ翻訳、大学の研究による客観エビデンス化を経て、
   自治体の予防保全政策や国費事業に接続する構造として整理された。

context_background:
  infrastructure_problem:
    description: >
      日本の道路インフラ維持管理市場は2030年代にピークを迎え
      約195兆円規模とされる。
      技術者減少の中で効率的な予防保全計画が求められている。
  national_policy:
    description: >
      国からの交付金（年間約3000億円）は
      客観的エビデンスに基づく予防保全計画を持つ自治体へ
      優先配分される方向にある。

local_evidence:
  fukui_case:
    description: >
      福井市で実施した歩行調査により
      375件のインフラ異常・危険箇所を検知。
    implication:
      - 車両点検では発見できない危険が存在
      - 歩行体験はインフラ予兆データになり得る

core_concept:
  hohoho_definition: >
    市民の日常生活で感じる都市の違和感を集め、
    LLMで都市課題に翻訳し、大学の研究と自治体政策へ
    接続する市民参加型都市センシングシステム。

citizen_signal:
  description: 市民が感じる違和感の構成
  components:
    - 危険
    - 不便
    - 不安
    - 快適
    - 嬉しい
    - 発見
  interpretation: >
    市民の感情や体験はインフラ問題の早期シグナルとなる。

system_flow:
  steps:
    - 市民が都市の違和感を報告
    - LLMがナラティブを都市課題に翻訳
    - 大学がデータ分析し客観エビデンス化
    - 自治体が予防保全計画に活用
    - 国費事業・交付金に接続

key_insight:
  difference_from_iot:
    iot_model: 都市の物理状態を測定
    hohoho_model: 都市の人間体験を測定
  explanation: >
    IoTは状態データを収集するのに対し、
    HOHOHOは市民の体験・感情を都市知能として活用する。

organization_discussion:
  nakajima_view:
    description: >
      人間関係を大切にするプロジェクト型志向。
      単独事業ではなく人を巻き込む形を想定。
  yamauchi_view:
    description: >
      起業者と雇用者のコミットメント差を考慮し、
      人を役割リソースとして整理できないと
      代表が疲弊するリスクを指摘。
  chatgpt_view:
    description: >
      HOHOHOは単一企業プロダクトではなく
      ネットワーク型プロジェクトの性格が強い。

team_structure_idea:
  initial_phase:
    members:
      - 中島: ビジョン / 現場 / 自治体接続
      - 大学: 研究 / エビデンス
      - AI: ナラティブ翻訳
      - エンジニア: 技術実装
  nature: >
    最初は雇用ではなく
    外部パートナー型チームの可能性が高い。

leadership_risk:
  yamauchi_advice:
    description: >
      創業者は仕事へのコミットが極端に高くなる。
      雇用者との熱量差を理解しないと疲弊する。
  family_test:
    description: >
      風呂敷を広げて家族に説明し
      応援してもらえるかは一つの判断材料。

project_character:
  nature:
    - スタートアップ
    - 社会プロジェクト
    - 都市インフラ研究
  comment: >
    HOHOHOは技術主導ではなく
    現場体験から生まれたプロジェクト。

origin_strength:
  description: >
    散歩体験から始まり375件の実データを取得している点は
    机上のアイデアではなく現場起点の証拠となる。

secretary_observation:
  main_point: >
    HOHOHOの核心は
    「生活の違和感からインフラ予兆を検知する仕組み」。

next_discussion_topics:
  - HOHOHOの事業スケール
  - 大学連携の具体化
  - 自治体PoC設計
  - プロジェクト体制

meeting_record:
  topic: HOHOHO構想 / 事業化・プラットフォーム選択・資金戦略

participants:
  - 中島健吾
  - 山内雄司
  - ChatGPT（秘書官）

current_concept:
  hohoho_definition: >
    市民の日常生活で感じる違和感（危険・不便・快適などの体験）
    を収集し、LLMによって都市課題へ翻訳し、
    研究・政策へ接続する都市知能生成システム。

  novelty:
    description: >
      IoTのような物理センサーではなく、
      人間の観察・感情・体験を都市データとして扱う点。

  conceptual_structure:
    - 市民
    - 観察
    - 感情 / 違和感
    - HOHOHO収集
    - LLM翻訳
    - 意味抽出
    - 研究（大学）
    - 政策 / 都市改善

discussion_points:

  github_vs_notion:
    notion_role:
      purpose:
        - 思考整理
        - 議論ログ
        - 構想メモ
      nature: 内部思考ツール

    github_role:
      purpose:
        - 構想公開
        - 憲法 / プロンプト管理
        - YAML
        - 研究思想共有
      nature: 外部公開・国際コミュニティ接続

    tentative_structure:
      - Notion: 思考・議論
      - GitHub: 構造・思想・仕様

  hohoho_positioning:
    interpretation: >
      技術スタートアップというより
      社会システム型プロジェクトの側面が強い。

    implication:
      - 実装まで時間がかかる可能性
      - 研究・制度との接続が重要

  funding_strategy:

    yamauchi_view:
      concern: >
        初手で補助金・助成金に依存すると
        事業が制度要件に引っ張られる可能性。

      metaphor: 毒饅頭リスク

    structural_risk:
      flow:
        - 補助金
        - 採択要件に最適化
        - 本来の仮説検証が遅れる

    recommendation:
      sequence:
        - 小規模実証
        - 仮説の再現性確認
        - 研究連携
        - 制度資金

  mentor_advice:
    yamauchi_message:
      points:
        - LLM事業は道なき道になりやすい
        - 収益化まで時間がかかる可能性
        - 一度動き出すと時間のコントロールが難しい

      suggestion:
        - 家族（奥様）と相談して意思決定

secretary_observation:

  hohoho_core:
    statement: >
      都市を「状態」ではなく
      「人間の体験」で観測する仕組み。

  functional_roles:
    human: 観察 / 違和感 / 問い
    llm: 言語化 / 構造化 / 知識接続

  interpretation: >
    HOHOHOはHuman Sensor Networkとして
    都市の認知多様性をデータ化する試み。

next_topics:
  - HOHOHOのPoC設計
  - 大学との研究連携領域
  - GitHubリポジトリ構造
  - プロジェクト体制

meeting_record:
  date: 2026-03-12
  project: HOHOHO
  participants:
    - 山内雄司
    - 中島健吾
    - ChatGPT（議事録）

agenda:
  - HOHOHO事業構想
  - LLM活用とGitHub運用
  - 軽量モデルと本構想
  - 都市計画との整合性
  - OpenAI連携可能性
  - SoE研究議論
  - 起業意思決定

discussion:

  hohoho_core_concept:
    definition: >
      市民の歩行体験・違和感・感情などの主観データを
      LLMによって構造化し都市知能データへ変換する都市観測システム。

    structure:
      - human_observation
      - narrative
      - llm_analysis
      - urban_intelligence

    novelty:
      - IoTセンサーではなくHuman Sensor
      - 都市の状態ではなく都市体験の観測
      - 市民ナラティブの構造化

  platform_strategy:

    notion:
      role:
        - 思考整理
        - 議論ログ
        - 仮説管理

    github:
      role:
        - 構想公開
        - 憲法・プロトコル管理
        - LLM関連研究共有

    conclusion: >
      内部思考はNotion、
      外部公開・研究接続はGitHubという二層構造。

  llm_business_context:

    observation: >
      LLMは既知知識処理に強く、
      人間は課題設定・意味発見に強い。

    structure:
      human:
        - observation
        - problem_framing
      llm:
        - knowledge_processing
        - structure_analysis

  lightweight_model_strategy:

    phase1:
      description: >
        市民参加前に中島自身または委託観察による
        交通インフラ異常データ収集。

      flow:
        - 現地観察
        - 異常記録
        - データ整理
        - 行政共有

    phase2:
      description: >
        LLM解析を組み込みHOHOHO完全モデルへ拡張。

  urban_plan_alignment:

    reference:
      document: 福井市都市計画マスタープラン

    key_connection:
      concept: 歩行者視点

    interpretation:
      - HOHOHOは都市計画の実装ツール
      - 市民歩行データによる都市観測

  openai_strategy:

    reasoning:
      - テック企業は新規性評価が中心
      - アカデミアは正統性評価が中心

    proposed_order:
      - OpenAI
      - 研究機関
      - 行政

    proposal_theme:
      concept: Human Sensor Network for Urban AI

  urban_meta_cognition_concept:

    definition: >
      個人のメタ認知ではなく、
      市民ナラティブとLLM分析を統合した
      地域社会レベルのメタ認知。

    structure:
      - human_perception
      - collective_narrative
      - llm_analysis
      - urban_meta_cognition

  social_signal_possibility:

    hypothesis:
      - 不安
      - 不満
      - 孤立
      - 社会ストレス

    potential_use:
      - 行政アウトリーチ
      - 都市リスク兆候検知

    risk:
      - 監視社会誤解
      - 誤判定
      - 倫理問題

    required_design:
      - opt_in
      - anonymization
      - aggregate_analysis

  soe_research_discussion:

    origin:
      field: 障害福祉

    soe_meaning:

      empowerment:
        definition: Service of Empowerment

      exploitation:
        definition: Service of Exploitation

    research_question: >
      福祉サービスは当事者のエンパワメントになっているのか、
      それとも給付費構造による搾取になっているのか。

    framing: 社会実験

  three_factor_model:

    anomie_factor:
      cause: 富の不足
      effect:
        - 規範崩壊
        - 下層自己認識
        - 思考停止

    hubris_factor:
      cause: 富の過剰
      effect:
        - 権力逸脱
        - 法超越意識

    hypnos_factor:
      meaning: 社会の眠り
      effect:
        - 無関心
        - 思考停止
        - 法治麻痺

  entrepreneurship_discussion:

    issue:
      - 起業初期のキャッシュ問題
      - HOHOHOスケールダウン案

    spouse_feedback:
      message: >
        キャッシュのためにHOHOHOを
        スケールダウンするべきではない。

    conclusion:
      decision: >
        HOHOHOの理想構造は維持する。

      strategy:
        - ビジョンは大きく
        - 実装は段階的

  project_roles:

    yamauchi:
      role:
        - 理論
        - 研究
        - 社会構造分析

    nakajima:
      role:
        - 実装
        - 起業
        - フィールド

    hohoho:
      role:
        - 都市観測
        - LLM統合
        - 社会実装

key_takeaways:

  - HOHOHOは都市インフラ点検ではなく都市知能基盤
  - 市民観察 + LLM分析による都市メタ認知
  - OpenAI連携の可能性
  - 福井都市計画との整合性
  - HOHOHO構想はスケールダウンしない方針

next_steps:

  - HOHOHO軽量モデル設計
  - OpenAI提案整理
  - 大学共同研究可能性検討
  - GitHub構想整理
  - ALLCONNECT面談