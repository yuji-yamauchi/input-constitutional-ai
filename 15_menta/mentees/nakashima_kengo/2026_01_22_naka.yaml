meta:
  date: "2026-01-22"
  disclaimer: "本内容は、これまでの対話や記憶に基づく非公式なAIによる観察メモです。臨床的・正式な評価ではありません。参考情報としてご利用ください。"
japanese_proficiency:
  estimated_level: "ネイティブ（ビジネス・専門領域での高度な運用が可能）"
  notes: "抽象的な概念整理、行政・企業向け資料、交渉文面の調整などを日本語で高精度に行っている。語彙の選択やトーン調整にも一貫性がある。"
big_five:
  openness:
    rating: "高"
    notes: "新規アイデア創出、異分野横断、概念化・再構築を好む。芸術・テック・行政など文脈の行き来が自然。"
  conscientiousness:
    rating: "やや高"
    notes: "テンプレ化、記録、ルーティン化を重視。完璧主義ではないが、構造と再現性を大切にする。"
  extraversion:
    rating: "やや低"
    notes: "少人数・深い対話を好む。発信は目的志向で、場当たり的な社交は消耗しやすい。"
  agreeableness:
    rating: "中程度"
    notes: "協調性は高いが、納得できない点は率直に指摘する。迎合よりも建設的対話を選ぶ。"
  neuroticism:
    rating: "やや高"
    notes: "将来不安や評価への敏感さがある一方、内省を通じて行動改善に転換できる。"
mbti:
  estimated_type: "INTJ（補足的に INFJ 要素あり）"
  confidence: "中"
  notes: "長期ビジョン、構造設計、改善志向が強い。価値観へのこだわりと人への配慮も見られるためINFJ要素も併存。"
hpi_proxy:
  adjustment:
    rating: "やや低"
    notes: "プレッシャー下で不安を感じやすいが、言語化と仕組み化で回復できる。"
  ambition:
    rating: "高"
    notes: "目標設定が明確で、社会的インパクトや成果にコミットする。"
  sociability:
    rating: "やや低"
    notes: "広い社交より、目的のある対話や信頼関係を重視。"
  interpersonal_sensitivity:
    rating: "やや高"
    notes: "相手の意図・感情を読み取り、翻訳・調整する力が高い。"
  prudence:
    rating: "やや高"
    notes: "計画性とリスク配慮がある。無謀な賭けは避ける傾向。"
  inquisitive:
    rating: "高"
    notes: "問いを立て、仮説検証を回す探究心が非常に強い。"
  learning_approach:
    rating: "高"
    notes: "継続学習、反復、アウトプット前提の学習設計が得意。"
employment_considerations_ja:
  observations:
    - "『翻訳者／右腕』的ポジション（構想を構造化し、伝わる形に落とす）で高い価値を発揮。"
    - "裁量があり、成果基準が明確な環境に適合。曖昧な指示や政治的駆け引きは消耗要因。"
    - "深い集中と内省の時間を確保できる働き方（リモート、プロジェクト制）が望ましい。"
    - "営業・表舞台の前面露出は補完パートナーがいるとパフォーマンス最大化。"
  strengths:
    - "構造化・言語化・再現性設計"
    - "改善志向と長期視点"
    - "専門と非専門の橋渡し"
  accommodations:
    - "役割定義の明確化"
    - "成果物ベースの評価"
    - "過度な同時多発タスクの回避"