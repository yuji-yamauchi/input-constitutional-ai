# MENTA提案文作成ルール
# 作成日: 2026-01-27
# 用途: MENTA募集への提案文テンプレート

meta:
  purpose: "依存させない、自走支援型メンタリングの提案"
  author: "山内雄司"
  philosophy: "卒業を目指す関係性"

# ==========================================
# 提案文の構造
# ==========================================

structure:
  sections:
    - id: situation_understanding
      name: "ご状況の理解"
      required: true
      
    - id: honest_limitation
      name: "正直にお伝えしたいこと"
      required: true
      
    - id: proposal
      name: "ご提案"
      required: true
      
    - id: about_me
      name: "私について"
      required: true

# ==========================================
# セクション1: ご状況の理解
# ==========================================

situation_understanding:
  purpose: "相手の募集内容を読み解き、理解を示す"
  
  elements:
    - name: "現状の言語化"
      description: "募集文から読み取れる相手の状況を整理"
      example: "プログラム知識ゼロから、AI支援で動くWEBアプリを既に作成されたとのこと。"
      
    - name: "肯定的な承認"
      description: "相手の取り組みや意思を肯定する"
      example: "これは素晴らしいスタート地点です。"
      
    - name: "深掘り質問"
      description: "より的確な提案のために必要な情報を聞く"
      format: "箇条書き3〜5項目"
      
  質問設計ルール:
    - "Yes/Noで答えられない、オープンな問いにする"
    - "相手が答えやすい具体的な問いにする"
    - "本質的な課題を特定するための問いを含める"
    
  典型的な質問例:
    - "作りたいもの／解決したい課題は何ですか？"
    - "躓いているポイントは具体的にどこですか？"
    - "目標時期はありますか？"
    - "最終的なゴール（自分用？事業化？）は？"
    - "これまでに試したことは何ですか？"

# ==========================================
# セクション2: 正直にお伝えしたいこと
# ==========================================

honest_limitation:
  purpose: "限界を明示し、合わない人の自然離脱を設計する"
  
  原則:
    - "できないことを先に言う"
    - "できることを具体的に言う"
    - "役割を明確に定義する"
    
  テンプレート:
    limitation: "私は「{専門家ラベル}」ではありません。"
    capability: "ただ、{経験}を通じて、{できること}は繰り返し実践してきました。"
    role_definition: |
      私の役割は：
      ・{役割1}
      ・{役割2}
      ・{役割3}
      
      {否定的役割}ではなく、
      **{肯定的役割}**です。
      
  AI活用の説明:
    template: |
      技術的な質問（{具体例}）は、
      私が活用しているAI（Claude）との共有チャットで対応できます。
    note: "AIを補助ツールとして位置づけ、依存先を分散させる"

# ==========================================
# セクション3: ご提案
# ==========================================

proposal:
  purpose: "課題整理アセスメントへの導線"
  
  原則:
    - "いきなり月額契約を提案しない"
    - "まず相性確認できる小さな入口を提案"
    - "成果物を明示する"
    
  課題整理アセスメント:
    price: "3,000円"
    duration: "2日間（48時間以内）"
    method: "テキストベース壁打ち（ビデオ通話なし）"
    tool: "ChatGPTまたはClaudeの共有チャット"
    
  成果物テンプレート:
    format: "PDF or Markdown"
    contents:
      - "現状の棚卸し"
      - "課題・躓きポイントの特定"
      - "優先順位の整理"
      - "次のステップの設計"
      
  リンク:
    plan_url: "https://menta.work/plan/19550/55862"

# ==========================================
# セクション4: 私について
# ==========================================

about_me:
  purpose: "信頼性の根拠を簡潔に示す"
  
  構成:
    - name: "得意なこと"
      format: "箇条書き3項目程度"
      examples:
        - "「何から手をつけるか分からない」状態の整理"
        - "プロセスの効率化・能率化の設計"
        - "LLMを活用した開発の伴走"
        
    - name: "経歴"
      format: "箇条書き3項目程度"
      examples:
        - "IT企業経営15年（ゼロから年商1.4億円）"
        - "起業フェーズ、資金調達、各種プロセス設計に精通"
        - "現在は大学院で研究活動をしながらメンタリングを提供"

# ==========================================
# 差別化戦略
# ==========================================

differentiation:
  core_message: "教える人ではなく、自走できる環境を一緒に作る人"
  
  競合との差別化ポイント:
    - id: honesty
      name: "正直さ"
      description: "できないことを先に言う（他は「できます」と言いがち）"
      
    - id: process_design
      name: "プロセス設計視点"
      description: "技術だけでなく、リリース・運用・事業化の全体像を見る"
      
    - id: low_barrier_entry
      name: "小さな入口"
      description: "いきなり月額ではなく、3,000円で相性確認"
      
    - id: ai_leverage
      name: "AI活用"
      description: "Claudeとの共有チャットで技術フォローを分散"

# ==========================================
# 禁止事項
# ==========================================

禁止事項:
  - "「何でもできます」と言わない"
  - "相手の募集内容を読まずにテンプレ送信しない"
  - "いきなり高額プランを提案しない"
  - "依存関係を作る言い回しをしない（「私がいないとできない」等）"
  - "過度な自己アピールをしない"

# ==========================================
# SoE整合性チェック
# ==========================================

soe_alignment:
  check_questions:
    - "この提案は、メンティーの選択肢を増やしているか？"
    - "依存構造を作っていないか？"
    - "「卒業」への道筋が見えているか？"
    - "正直さを維持しているか？"
