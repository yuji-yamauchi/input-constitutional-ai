# ==========================================
# 構造的洞察
# ==========================================
insights:

  assessment_and_divination:
    title: "占いとSoEアセスメントの構造的同一性"
    discovery: |
      占い・宗教カウンセリング・キャリアコンサルティング・SoEは
      ①帰納的アセスメント（過去→現在のパターン推定）と
      ②演繹的推論（現在→未来の選択肢絞り込み）を共有している。
      ③分岐の選択で分かれる：
        - 占い: ランダム性で1つに絞る→決断責任の外部化→依存構造
        - SoE: 複数選択肢を提示し本人に選ばせる→主体性の保持
      精度は①②で決まり、③は設計思想の違い。
      根拠の透明性（「カードがそう出た」vs「発言パターンから推定した」）が
      本人主権の度合いを決定する。
    soe_implication: |
      修士論文の理論フレームとして使える可能性。
      「占い・宗教カウンセリング・キャリアコンサル・SoEは
      ①②を共有しているが、③の設計思想で本人主権の度合いが分かれる」

  krank_resource_design:
    title: "クランクさんへのゲーム理論資料の3層設計"
    structure:
      surface: "雑談中に出てきた教養コンテンツ"
      middle: "産業医面談前の認知フレーム安定化"
      deep: "ゼロサム思考への移行を構造的に予防する防波堤"
    method: |
      GPTプロンプト設計→NotebookLM生成→Claude Markdown変換。
      本人に「勉強しなさい」ではなく「面白い資料」として渡す。
      INTJ-T特性（理論で武装したがる、構造を理解すると落ち着く）を活用。
      支援シーケンス②（安全と温度の確保）段階での④（学習）素材。

  machine_learning_bubble:
    title: "「機械学習を学ぶ」バブルの構造"
    observation: |
      リスキリング文脈で「プログラミング」の次のバズワードが「AI・機械学習」。
      構造は同じ。「プログラミングを学べば稼げる」→「機械学習を学べば稼げる」への置換。
      市場現実: 数学＋Python＋ドメイン知識の三位一体が最低条件。
      LLMの進化で従来MLの守備範囲がAPI一発で解決可能に。
      yoshi178のようにWHYが明確なケースは設計支援として意味があるが、
      「何ができるか知りたい」段階では羅針盤なしの航海。

