# ==========================================
# セッション中の議論・洞察
# ==========================================

discussions:
  
  - topic: "プラン閲覧→契約のコンバージョン"
    insight: |
      プラン表示回数は安定（12〜34回/日）、動画再生もある。
      「見られてはいる」段階。課題はコンバージョン。
      「課題整理が必要だと気づいていない人」がボリュームゾーン。
      アウトバウンド（募集案件への提案）が正しいアプローチ。

  - topic: "大崎さんとのやり取り"
    insight: |
      「考えを整理する」ではなく「判断基準の設計」を求めている。
      可逆性・検証コスト・撤退基準の3つの判断フレームを提示。
      「確信を持ってから動く」は幻想、
      「確信がないまま動ける基準を持つ」が現実解。
      年齢・家族構成・収入源の確認が精度を上げる。

  - topic: "プロンプトエンジニアリングとは"
    insight: |
      世間のナラティブは「業務効率化」「年収アップ」。
      現実は単体での求人はほぼなく、エンジニアの付随スキルか社内DX推進の一部。
      本当に価値があるのはWHY（何を聞くか）と監査設計（検証できるか）。
      HOW（プロンプトの書き方）より希少価値が高い。

