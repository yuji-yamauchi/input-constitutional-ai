# ==========================================
# 構造的洞察
# ==========================================
structural_insights:

  gpt_shared_chat_pattern:
    title: "GPT共有チャットによる独占業務回避＋SoE実装パターン"
    description: |
      センシティブな内容や独占業務に抵触しそうな領域：
      YujiがGPTに質問→GPTがYujiに回答→メンティーは閲覧→判断は本人
      
      クランクさんケース（傷病歴の開示義務・産業医面談の制度整理）で実証済み。
      hosiさんケース（住宅ローン控除・確定申告）でも同パターン適用。
      
      制約（税理士法・独占業務）がSoEを実現するという逆説：
      法的制約により「本人が自分で理解して判断する」設計が強制される。

  how_layer_model:
    title: "HOWの階層モデル"
    description: |
      HOWには2層がある：
      1. 認知的HOW（調べる、計算する、分析する、書く）→ LLMがほぼ全代替
      2. 物理的HOW（運ぶ、作る、据え付ける、対面で会う）→ ロボットコストがまだ高い領域のみ残存
      
      「人間がやるべきHOW」は、ロボティクスのコストカーブより下の物理作業だけ。
      それ以外は全部LLMに渡せる。
    implication: "メンターに残る価値はWHY（選択する力の整理）のみ"

  why_and_agi:
    title: "WHY = LLMの先にあるもの = AGI"
    description: |
      現在のLLMはConstitutionを「与えられて」動く。
      AGIは自分でWHYを「生成」する＝自分でConstitutionを書ける存在。
      
      SoEがメンティーに対してやっていること：
      「自分のConstitutionを自分で書けるようになる支援」
      
      SoEの到達点とAGIの定義が構造的に同じ場所を指している。
    scope: "博士の射程。修士では旗を立てるのみ"
    connection: "Input Constitutional AI → SoE → AGI定義"

  excel_culture:
    title: "日本のExcel文化とLLM"
    description: |
      日本のExcel文化は業務フロー・帳票・データ管理・報告書を全てExcelに集約する。
      これがExcel in Claudeとの親和性を異常に高めている。
      
      Power Pivotを学びたい人の背景：
      「Excelの延長線上でデータ分析をやりたい」であり、Python/Rには移行しない。
      AccessにもPower Pivotにも行かない。Excel方眼紙の中で全部やる。
      
      LLMの登場でExcel内拡張の天井が一気に上がった。
      VBAもPower Queryも、LLMが書いてエラーチェックして解決までしてくれる。
      
      HOWは「LLMに聞きながら」ではなく「LLMが勝手にやってくれる」が実態。
    soe_connection: |
      「HOWがLLMで代替可能になったとき、人間のメンターに残る価値はWHYの整理」
      このフレームはExcel文化圏の人たちに刺さる可能性が高い。

