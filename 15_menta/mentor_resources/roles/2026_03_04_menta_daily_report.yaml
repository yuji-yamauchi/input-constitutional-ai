# ==========================================
# 本日の学び・原則更新
# ==========================================

learnings:
  
  monthly_contract_pattern:
    title: "月額契約に至る人の共通構造"
    factors:
      - "生活がかかっている（趣味ではなく生計に直結）"
      - "本業がある（副業・事業転換のリスク制約が明確）"
      - "自分の中にコア資産を持っている（中島：除雪×歩行、松尾：急性期×ACLS）"
      - "HOWは持っているがWHYの壁打ち相手が必要"
    anti_pattern:
      - "テンプレ募集＝切実さが見えない"
      - "情報ゼロ＝具体的に踏み込めない→汎用提案→響かない"
    proposal_key: "提案文に「あなた固有の情報」を織り込むこと"
  
  legal_risk_check:
    title: "独占業務・非弁行為の線引き標準化"
    principle: "「できる」と「やっていい」は違う"
    checklist:
      - scope: "税務の具体的仕訳指導"
        law: "税理士法"
        safe: "一般論の説明、プロンプト指導、専門家への橋渡し"
        out: "個別具体的な仕訳判断・代行"
      - scope: "法律相談・契約書レビュー"
        law: "弁護士法"
        safe: "一般的な制度説明、専門家紹介"
        out: "個別案件への法的判断"
      - scope: "労務・社会保険の手続き"
        law: "社労士法"
        safe: "制度概要の説明"
        out: "具体的な届出・手続き代行"
      - scope: "医療行為・診断"
        law: "医師法"
        safe: "一般的な健康情報"
        out: "診断・処方・治療方針の判断"
    trigger_case: "tamaya案件（freee売掛金消し込み）で初稿が税理士法に抵触するリスクを山内氏が指摘"
  
  proposal_quality_improvement:
    title: "Muratake提案文の書き直しから得た教訓"
    before: "テンプレ的なmismatch→リダイレクト提案"
    after: "松尾パターン適用（相手固有の情報を織り込み、コア資産を名指しで認める）"
    key_phrases:
      - "何度離れてもそこに戻ってきている。これは本物の軸"
      - "ここが今、一番の壁ではないでしょうか"
      - "買い手の具体市場（出版・ゲーム・教育・グッズ）を提示"

  見送り判断基準:
    title: "yuki watanabe案件から得た見送り基準"
    red_flags:
      - "「初回無料」「複数人話してみて」→ メンターの時間を無料消費する構造"
      - "「人生計画」「ライフコーチング」→ メンタリングではなく依存構造を作りやすい領域"
      - "SoEの観点：自走ではなく依存を前提とした関係設計"

