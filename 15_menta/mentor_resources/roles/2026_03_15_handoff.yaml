# ==========================================
# セッション引継ぎYAML
# 作成日: 2026-03-15
# 用途: Claudeセッション間の文脈転送
# ==========================================

session:
  date: "2026-03-15"
  purpose: "MENTA返信文作成チャット"
  status: "稼働中・引継ぎ"

# ==========================================
# 確定済みルール
# ==========================================

rules:
  confirmed:
    - "判定メモ・確認なし → 提案文を直接出力する"
    - "基本は全案件に提案文を送る"
    - "定型文ベースで案件ごとに■ご状況の理解と■私についてを調整"
    - "■ご提案は定型文踏襲（3,000円アセスメント＋URL固定）"

  base_template: |
    はじめまして。ご募集内容を拝見しました。
    ———
    ■ ご状況の理解
    （案件に応じて調整）
    ———
    ■ 私について
    IT企業を15年経営し、年商1.4億円まで成長させた経験があります。
    また、税務会計事務所で3年半の実務経験、
    障害福祉サービス事業の立ち上げ10施設の経験もあり、
    起業・独立は実務で繰り返してきた領域です。
    私ができるのは：
    ・事業計画の構造レビュー（数字の妥当性、リスクの見落とし）
    ・「誰に、何を、いくらで売るか」の設計
    ・起業に伴う実務の整理（法人設計、資金繰り、営業導線）
    この考え方を3分ほどでお話ししています：
    https://youtu.be/UYPliXPrp_Y
    ———
    ■ ご提案
    まずは3,000円/2日間の課題整理アセスメントで
    相性を確認していただけます：
    https://menta.work/plan/19550/55862
    テキストベースの壁打ちで、ビデオ通話はありません。
    （A〜D質問 or 締め文句を案件に応じて調整）
    ご質問があればお気軽にどうぞ。

# ==========================================
# 案件タイプ別の調整パターン
# ==========================================

proposal_patterns:

  qualified_question_first:
    description: "情報不足・守備範囲内 → A〜D質問先行"
    adjustment: "■ご状況の理解にA〜D選択肢を設置"
    example_cases:
      - "しま菜の花（ビジネス/マネジメント・テンプレ）"
      - "もりこう（マーケティング・テンプレ）"

  mismatch_redirect:
    description: "プログラミング・技術指導 → HOW直球・守備範囲外を正直開示"
    adjustment: |
      ■ご状況の理解冒頭に「技術指導は守備範囲外」を明示。
      「何のために学ぶか・学ぶべきか任せるべきか」の判断整理なら接続可と添える。
    ■私について調整: "「コードを書く人ではなく、何を作るかを決める側として15年エンジニアを発注・活用」に変更"
    example_cases:
      - "Hiro0114（プログラミング）"
      - "田村亮一（AI・機械学習）"

  free_consultation_redirect:
    description: "「無料相談→継続検討」構造 → 正直に断りつつ3,000円に誘導"
    adjustment: |
      ■ご状況の理解に「無料相談は行っていない理由」を一言添える。
      3,000円アセスメントが相性確認の場として機能することを強調。
    example_cases:
      - "A.I（社内SE・エンジニアキャリア）"

  motivate_redirect:
    description: "「モチベートしてほしい」→ 依存構造リスク・正直開示"
    adjustment: |
      ■ご状況の理解に「モチベートを目的としていない理由」を一言。
      背景に「判断に迷っている課題」があれば接続可と添える。
    example_cases:
      - "なおつ（ビジネス/その他）"

