meta:
  purpose: |
    厚労省 社会保障審議会（障害者部会）第94回〜第141回の
    議事録・資料PDF一括ダウンロードタスクの引き継ぎ。
    Coworkセッションで「URL抽出」まで完了。
    残りは「ローカルでのPDFダウンロード実行」。
  safety_rules:
    - "既存ファイルを上書きしない"
    - "不明点はユーザーに確認してから実行"
    - "ファイル削除は絶対に行わない"

# ==========================================
# プロジェクト構成
# ==========================================
project:
  base_path: "C:\\Users\\USER\\Desktop\\cowork\\00_sauce\\01_mhlw_records\\01_Social Security Council"
  source_url: "https://www.mhlw.go.jp/stf/shingi/shingi-hosho_126730_old2.html"
  scope: "第94回〜第141回（全50回分）"

  folder_structure:
    description: |
      50個のフォルダが作成済み。命名規則: YYYY_MM_DD_[回数]
      番号なし回は _extra サフィックス。
    example_folders:
      - "2024_07_04_141"
      - "2021_12_16_extra"
      - "2019_06_24_94"

  generated_files:
    - file: "00_URL_index.md"
      description: "全50回の議事録URL・資料URLをMarkdown表形式で記載"
      status: "完成"

    - file: "pdf_urls.txt"
      description: |
        全447件のPDF直リンク一覧（TSV形式: folder_name\tpdf_url）。
        Chrome拡張経由でmhlw.go.jpから同一ドメインfetch()で抽出。
        ※ Chromeのダウンロードフォルダに保存済み。
        ※ 01_Social Security Council フォルダへのコピーが必要。
      status: "Chrome DLフォルダにあり → 要コピー"
      format: "TSV（タブ区切り）: フォルダ名<TAB>PDF_URL"
      lines: 447

    - file: "download_pdfs.py"
      description: |
        requests + BeautifulSoup でHTMLページからPDFリンクを抽出してDLするスクリプト。
        ※ Cowork VM内ではmhlw.go.jpがプロキシでブロックされるため動作せず。
        ※ ローカル実行専用。pdf_urls.txtがあれば下記のps1の方が簡便。
      status: "完成（代替手段として保存）"
      dependencies: "pip install requests beautifulsoup4"

    - file: "download_all_pdfs.ps1"
      description: |
        PowerShellスクリプト。pdf_urls.txtを読み込み、
        各PDFを対応フォルダにダウンロードする。
        既存ファイルスキップ・リトライ・ログ出力対応。
      status: "完成（推奨実行手段）"
      usage: |
        cd "C:\Users\USER\Desktop\cowork\00_sauce\01_mhlw_records\01_Social Security Council"
        .\download_all_pdfs.ps1 -DryRun    # 確認のみ
        .\download_all_pdfs.ps1             # 本番実行
        .\download_all_pdfs.ps1 -StartFrom 100  # 途中再開

    - file: "README_404_pages.md"
      description: "404だった4回分の記録と代替取得方法のメモ"
      status: "完成"

    - file: "download_log.txt"
      description: "Cowork VM内でのdry-run テストログ（参考）"
      status: "参考情報"

