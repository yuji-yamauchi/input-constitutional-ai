# ==========================================
# 未完了タスク（ここから対応）
# ==========================================
remaining:

  - task: "pdf_urls.txt をプロジェクトフォルダにコピー"
    priority: "HIGH"
    detail: |
      Chromeのダウンロードフォルダ（通常 C:\Users\USER\Downloads\）から
      01_Social Security Council フォルダにコピーする。
      ※ これがないとps1スクリプトが動かない。
    command: |
      copy "C:\Users\USER\Downloads\pdf_urls.txt" "C:\Users\USER\Desktop\cowork\00_sauce\01_mhlw_records\01_Social Security Council\"

  - task: "PowerShellスクリプトでPDF一括ダウンロード実行"
    priority: "HIGH"
    detail: |
      447件のPDFを各対応フォルダにダウンロードする。
      まず -DryRun で確認後、本番実行。
      所要時間目安: 447件 × 約1秒 = 約8分。
    commands:
      dry_run: |
        cd "C:\Users\USER\Desktop\cowork\00_sauce\01_mhlw_records\01_Social Security Council"
        .\download_all_pdfs.ps1 -DryRun
      execute: |
        .\download_all_pdfs.ps1
    notes:
      - "既存ファイルは自動スキップされるので中断→再開が安全"
      - "download_log.txt に実行ログが出力される"

  - task: "404ページ4回分のPDF取得"
