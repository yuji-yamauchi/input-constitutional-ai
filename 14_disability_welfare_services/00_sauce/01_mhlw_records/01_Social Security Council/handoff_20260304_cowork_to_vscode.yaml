technical_notes:
  mhlw_access:
    issue: "www.mhlw.go.jp は Cowork VM のプロキシでブロックされる"
    workaround_1: "Chrome拡張経由でアクセス（今回採用）"
    workaround_2: "ローカルでPython/PowerShellスクリプト実行"

  pdf_url_pattern:
    description: |
      厚労省のPDF URLは以下のパターン:
      https://www.mhlw.go.jp/content/XXXXXXXX/YYYYYYYYY.pdf
      XXXXXXXX = 部署コード（12201000 等）
      YYYYYYYYY = ファイルID（連番が多い）

  vm_stability:
    warning: "Cowork VMはVirtioFS/Plan9のバグで長時間タスクでクラッシュする可能性あり"
    mitigation: "PDFダウンロードはローカル実行を推奨"

