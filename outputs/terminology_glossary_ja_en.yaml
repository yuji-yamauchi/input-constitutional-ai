# ============================================================
fire_culture_note: |
  用語対訳表は翻訳の一貫性を保証する基盤文書である。
  各用語の訳語は、学術的慣例と本プロジェクト固有の文脈を
  両立させることを目的として選定した。
  固有概念（ヒュプノス因子、トランスナラティブ等）は
  原則としてカタカナ→英語の直訳を採用し、
  既存の学術用語は標準的な英訳を使用する。
