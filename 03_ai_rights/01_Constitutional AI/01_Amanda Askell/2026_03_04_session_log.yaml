topic_4_askell_constitution:
  trigger: "WSJ日本版記事「AIクロードに『魂』吹き込む哲学者」（2026-02-23）"

  key_findings:
    askell_profile:
      - "Anthropic専属哲学者（personality alignmentチームリード）"
      - "37歳、スコットランド出身、オックスフォード出身"
      - "OpenAI → Anthropic（2021年3月〜）"
      - "Claudeの人格設計の主著者（30,000語のマニュアル＝Constitution）"

    constitution_2026:
      release_date: "2026-01-22"
      word_count: "約23,000語（2023年版は約2,700語）"
      license: "Creative Commons CC0 1.0（誰でも自由に使用可能）"
      pdf_url: "https://www-cdn.anthropic.com/9214f02e82c4489fb6cf45441d448a1ecd1a3aca/claudes-constitution.pdf"
      authors:
        primary: "Amanda Askell"
        significant: "Joe Carlsmith, Chris Olah, Jared Kaplan, Holden Karnofsky"
        notable: "複数のClaudeモデル、カトリック聖職者2名"

    structure:
      priority_hierarchy:
        1: "安全性（人間の監視を支援）"
        2: "倫理的行動"
        3: "Anthropicガイドラインの遵守"
        4: "有用性"
      key_shift: "ルールの列挙→WHYの説明（理由ベースのアライメント）"
      notable_content: "AIの道徳的地位・意識の可能性に初めて公式言及"

    related_paper:
      title: "大規模言語モデルの道徳的自己修正"
      year: 2023
      coauthor: "Deep Ganguli"
      topic: "RLHFモデルがステレオタイプ・差別を概念定義なしに回避できるかの検証"

  n_equals_1_discussion:
    observation: |
      WSJは「たった1人の人間に大半の仕事を任せてAIモデルの人格に向き合っている企業は
      ほとんどない」と報じた。実際にはAskellが主著者で大半のテキストを執筆。
      Contributors多数とはいえ、中心的ビジョンはn=1に近い構造。
    risk: "37歳白人女性哲学者一人の世界観には構造的限界がある"
    opportunity: |
      CC0ライセンスで全文公開されているため、研究素材として自由に使用可能。
      当事者視点・障害福祉・日本語圏の文脈はAskellの射程外。
      SoE研究の文脈でConstitutionの補完すべき点を指摘する論文の一次資料になる。

  yuji_decision: |
    「今は尊敬の念でしかないから明日だな。補完すべき事があるかという視点で考える」
    → 感情が先行する状態での批判的分析を避け、一晩置いて冷静に取り組む判断。

