      detail: >
        「Structure of Exploitation」→「Service of Empowerment / Service or Exploitation」
        「SoE理論」→「SoEの分析枠組み」に全箇所修正
    - action: "Gutmannのウイグル人数値（U01）の出典確認または削除"
      detail: "年間2.5万-5万人の一次情報源を特定できない場合は数値を削除"

  priority_medium:
