      detail: "プロンプトの構造要求に準拠した追加執筆、または欠落理由の注記"
    - action: "脚注体系の整備"
      detail: "全脚注に対応するURL/DOI/書誌情報を追加"
    - action: "Geoffrey Nice卿の経歴修正（C01）"
    - action: "証人数の修正（C02）：30人→50人超"

  priority_low:
